<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Top Clans Filter</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0f141b;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #ff9b96;
      --hover: #1f2630;
      --danger: #f85149;
      --danger-bg: rgba(248,81,73,0.12);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: none; }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .site-logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .site-logo {
      display: block;
      width: 76px;
      height: auto;
      border-radius: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .github-btn {
      display: inline-block;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      white-space: nowrap;
    }

    .menu-bar {
      max-width: 1280px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
      line-height: 1;
    }

    .menu-btn.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(88,166,255,0.08);
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 24px 28px;
    }

    .status {
      margin-bottom: 18px;
      border-radius: 10px;
      padding: 14px 16px;
      display: none;
    }

    .status.info {
      display: block;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    .status.error {
      display: block;
      border: 1px solid var(--danger);
      background: var(--danger-bg);
      color: #ffb4ad;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }

    .card-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: 20px;
      font-weight: 700;
      outline: none;
    }

    .card-input:focus {
      border-color: var(--link);
      background: var(--hover);
    }

    .controls-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:hover {
      border-color: var(--link);
      background: var(--hover);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .section-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      text-align: left;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.02);
    }

    .numeric {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .sort-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }

    .sort-btn.numeric {
      text-align: right;
    }

    .sort-btn:hover,
    .sort-btn.active {
      color: var(--text);
    }

    .sort-mark {
      margin-left: 4px;
      color: var(--link);
      font-size: 11px;
    }

    .clan-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
    }

    .clan-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .empty-state {
      color: var(--muted);
      padding: 20px 18px;
    }

    .row-error {
      color: var(--danger);
      font-size: 12px;
      font-weight: 400;
      margin-top: 4px;
      max-width: 340px;
      white-space: normal;
    }

    .card-help {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.3;
    }

    @media (max-width: 1050px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      header { padding: 14px 16px 10px; }
      main { padding: 16px; }
      .title-wrap h1 { font-size: 24px; }
      .cards { grid-template-columns: 1fr; }
      .controls-row { justify-content: stretch; }
      .controls-row .btn { width: 100%; }
      .card-input { font-size: 18px; }
      .menu-bar { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="site-logo-link" href="index.html" aria-label="c0ld home">
        <img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld">
      </a>
    </div>

    <div class="menu-bar">
      <a class="menu-btn" href="index.html">c0ld Leaderboard</a>
      <a class="menu-btn" href="clans.html">Clans Leaderboard</a>
      <a class="menu-btn" href="clan-filter.html">Clan Filter</a>
      <a class="menu-btn active" href="top-clan-filter.html">Top Clan Filter</a>
      <a class="menu-btn" href="live-clan.html">Clan Lookup</a>
      <a class="menu-btn" href="servers.html">Servers</a>
      <a class="menu-btn" href="macros.html">Macros</a>
    </div>
  </header>

  <main>
    <div id="status" class="status"></div>

    <section class="cards">
      <div class="card">
        <div class="label">Current Battle</div>
        <div class="value" id="card-battle">—</div>
      </div>

      <div class="card">
        <div class="label"># of Top Clans</div>
        <input id="top-input" class="card-input" type="text" value="10" />
      </div>

      <div class="card">
        <div class="label">72.5M+</div>
        <input id="high-input" class="card-input" type="text" value="72.5M" />
      </div>

      <div class="card">
        <div class="label">70M & Below</div>
        <input id="low-input" class="card-input" type="text" value="70M" />
      </div>
    </section>

    <div class="controls-row">
      <button id="refresh-btn" class="btn" type="button">Refresh</button>
    </div>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Top Clans Filtered</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr id="table-head-row">
              <th>Rank</th>
              <th>Clan</th>
              <th class="numeric">Points</th>
              <th class="numeric">72.5M+</th>
              <th class="numeric">72.5M-70M</th>
              <th class="numeric">Under 70M</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="6" class="empty-state">No data loaded yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const THRESHOLDS_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/top-clan-thresholds";
    const LEGACY_WORKER_URL = "https://top-clan-thresholds.opal-dde.workers.dev/";
    let currentPayload = null;
    let sortState = { key: "high", direction: "desc" };
    const DEFAULT_CLAN_ICON =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
          <rect width="64" height="64" rx="12" fill="#21262d"/>
          <path d="M20 44V24l12-6 12 6v20l-12 6-12-6z" fill="#6e7681"/>
        </svg>
      `);

    const STORAGE_KEYS = {
      top: "ps99_top_clan_member_thresholds_top",
      high: "ps99_top_clan_member_thresholds_high",
      low: "ps99_top_clan_member_thresholds_low"
    };

    function htmlEscape(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function stripZeros(value) {
      return String(value).replace(/\.00$/, "").replace(/(\.\d*[1-9])0+$/, "$1");
    }

    function formatCompactNumber(value) {
      if (value === null || value === undefined || value === "") return "—";
      const n = Number(value);
      if (Number.isNaN(n)) return "—";

      const abs = Math.abs(n);

      if (abs >= 1e12) return stripZeros((n / 1e12).toFixed(2)) + "T";
      if (abs >= 1e9) return stripZeros((n / 1e9).toFixed(2)) + "B";
      if (abs >= 1e6) return stripZeros((n / 1e6).toFixed(2)) + "M";
      if (abs >= 1e3) return stripZeros((n / 1e3).toFixed(2)) + "K";

      return String(Math.round(n));
    }

    function fmtShortNumber(value) {
      if (value === null || value === undefined || value === "") return "—";
      const n = Number(value);
      if (Number.isNaN(n)) return "—";

      const abs = Math.abs(n);
      if (abs >= 1e12) return stripZeros((n / 1e12).toFixed(2)) + "T";
      if (abs >= 1e9) return stripZeros((n / 1e9).toFixed(2)) + "B";
      if (abs >= 1e6) return stripZeros((n / 1e6).toFixed(2)) + "M";
      if (abs >= 1e3) return stripZeros((n / 1e3).toFixed(2)) + "K";

      return n.toLocaleString("en-US");
    }

    function setStatus(text = "", kind = "info") {
      const el = document.getElementById("status");

      if (!text) {
        el.className = "status";
        el.textContent = "";
        return;
      }

      el.className = `status ${kind}`;
      el.textContent = text;
    }

    function parseFlexibleNumber(value) {
      const raw = String(value || "").trim();
      if (!raw) return null;

      const cleaned = raw.replace(/,/g, "").replace(/\s+/g, "").toUpperCase();
      const match = cleaned.match(/^(\d+(?:\.\d+)?)([KMBT])?$/);

      if (!match) return null;

      const base = Number(match[1]);
      if (!Number.isFinite(base)) return null;

      const suffix = match[2] || "";
      const multipliers = {
        "": 1,
        K: 1e3,
        M: 1e6,
        B: 1e9,
        T: 1e12
      };

      const result = Math.round(base * (multipliers[suffix] || 1));
      return Number.isFinite(result) ? result : null;
    }

    function parseTopCount(value) {
      const n = parseFlexibleNumber(value);
      if (!Number.isFinite(n)) return null;
      return Math.min(Math.max(Math.round(n), 1), 25);
    }

    function saveInputs(top, high, low) {
      localStorage.setItem(STORAGE_KEYS.top, String(top));
      localStorage.setItem(STORAGE_KEYS.high, String(high));
      localStorage.setItem(STORAGE_KEYS.low, String(low));
    }

    function loadSavedInputs() {
      const top = localStorage.getItem(STORAGE_KEYS.top);
      const high = localStorage.getItem(STORAGE_KEYS.high);
      const low = localStorage.getItem(STORAGE_KEYS.low);

      if (top) document.getElementById("top-input").value = top;
      if (high) document.getElementById("high-input").value = high;
      if (low) document.getElementById("low-input").value = low;
    }

    function normalizeInputDisplays() {
      const topRaw = document.getElementById("top-input").value;
      const highRaw = document.getElementById("high-input").value;
      const lowRaw = document.getElementById("low-input").value;

      const top = parseTopCount(topRaw);
      const high = parseFlexibleNumber(highRaw);
      const low = parseFlexibleNumber(lowRaw);

      if (Number.isFinite(top)) {
        document.getElementById("top-input").value = String(top);
      }

      if (Number.isFinite(high)) {
        document.getElementById("high-input").value = formatCompactNumber(high);
      }

      if (Number.isFinite(low)) {
        document.getElementById("low-input").value = formatCompactNumber(low);
      }
    }

    function renderCards(payload) {
      document.getElementById("card-battle").textContent =
        payload?.activeBattle?.configName || payload?.display_name || payload?.battle || "—";

      document.getElementById("top-input").value =
        String(payload?.top || document.getElementById("top-input").value || "10");

      document.getElementById("high-input").value =
        formatCompactNumber(payload?.highThreshold || parseFlexibleNumber(document.getElementById("high-input").value) || 72500000);

      document.getElementById("low-input").value =
        formatCompactNumber(payload?.lowThreshold || parseFlexibleNumber(document.getElementById("low-input").value) || 70000000);
    }

    function sortMark(key) {
      if (sortState.key !== key) return "";
      return `<span class="sort-mark">${sortState.direction === "desc" ? "desc" : "asc"}</span>`;
    }

    function sortHeader(key, label, numeric = false) {
      const active = sortState.key === key ? " active" : "";
      const cls = numeric ? "sort-btn numeric" : "sort-btn";
      return `<button class="${cls}${active}" type="button" data-sort="${htmlEscape(key)}">${htmlEscape(label)}${sortMark(key)}</button>`;
    }

    function rowMetrics(row) {
      const highCount = Number(row.high_count || 0);
      const lowCount = Number(row.low_count || 0);
      const memberCount = Number(row.member_count || 0);
      const belowLowCount = Number.isFinite(Number(row.below_low_count))
        ? Number(row.below_low_count)
        : Math.max(0, memberCount - highCount - lowCount);

      return {
        rank: Number(row.rank || 999999),
        clan: String(row.clan_name || "").toLowerCase(),
        points: Number(row.battle_points ?? row.points ?? row.clan_points ?? 0),
        high: highCount,
        mid: lowCount,
        under: belowLowCount
      };
    }

    function sortedRows(rows) {
      const direction = sortState.direction === "asc" ? 1 : -1;

      return rows.slice().sort((a, b) => {
        const am = rowMetrics(a);
        const bm = rowMetrics(b);
        const av = am[sortState.key];
        const bv = bm[sortState.key];

        if (sortState.key === "clan") {
          const textCmp = String(av).localeCompare(String(bv));
          if (textCmp) return textCmp * direction;
        } else if (av !== bv) {
          return (Number(av) - Number(bv)) * direction;
        }

        if (am.rank !== bm.rank) return am.rank - bm.rank;
        return am.clan.localeCompare(bm.clan);
      });
    }

    function wireSortHeaders() {
      document.querySelectorAll("[data-sort]").forEach(button => {
        button.addEventListener("click", () => {
          const key = button.dataset.sort;
          if (!key) return;

          if (sortState.key === key) {
            sortState = {
              key,
              direction: sortState.direction === "desc" ? "asc" : "desc"
            };
          } else {
            sortState = {
              key,
              direction: key === "rank" || key === "clan" ? "asc" : "desc"
            };
          }

          if (currentPayload) renderTable(currentPayload);
        });
      });
    }

    function renderTable(payload) {
      currentPayload = payload;
      const tbody = document.getElementById("tbody");
      const rows = Array.isArray(payload?.rows) ? payload.rows : [];

      const highLabel = formatCompactNumber(payload?.highThreshold || 0);
      const lowLabel = formatCompactNumber(payload?.lowThreshold || 0);

      document.getElementById("table-head-row").innerHTML = `
        <th>${sortHeader("rank", "Rank")}</th>
        <th>${sortHeader("clan", "Clan")}</th>
        <th class="numeric">${sortHeader("points", "Points", true)}</th>
        <th class="numeric">${sortHeader("high", `${highLabel}+`, true)}</th>
        <th class="numeric">${sortHeader("mid", `${highLabel}-${lowLabel}`, true)}</th>
        <th class="numeric">${sortHeader("under", `Under ${lowLabel}`, true)}</th>
      `;
      wireSortHeaders();

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No rows returned.</td></tr>`;
        return;
      }

      tbody.innerHTML = sortedRows(rows).map(row => {
        const metrics = rowMetrics(row);

        return `
          <tr>
            <td>#${htmlEscape(row.rank)}</td>
            <td>
              <div class="clan-cell">
                <img class="clan-icon" src="${htmlEscape(row.icon_url || DEFAULT_CLAN_ICON)}" alt=""
                     loading="lazy"
                     onerror="this.onerror=null;this.src='${DEFAULT_CLAN_ICON}';">
                <span>
                  <span>${htmlEscape(row.clan_name)}</span>
                  ${row.error ? `<div class="row-error">${htmlEscape(row.error)}</div>` : ""}
                </span>
              </div>
            </td>
            <td class="numeric">${fmtShortNumber(metrics.points)}</td>
            <td class="numeric">${htmlEscape(metrics.high)}</td>
            <td class="numeric">${htmlEscape(metrics.mid)}</td>
            <td class="numeric">${htmlEscape(metrics.under)}</td>
          </tr>
        `;
      }).join("");
    }

    function getParsedInputs() {
      const top = parseTopCount(document.getElementById("top-input").value);
      const high = parseFlexibleNumber(document.getElementById("high-input").value);
      const low = parseFlexibleNumber(document.getElementById("low-input").value);

      if (!Number.isFinite(top)) {
        throw new Error("Top Clans Scanned must be a whole number between 1 and 25.");
      }

      if (!Number.isFinite(high)) {
        throw new Error("72.5M+ Threshold is invalid. Try values like 70M, 72.5M, or 10,000,000.");
      }

      if (!Number.isFinite(low)) {
        throw new Error("70M Threshold is invalid. Try values like 70M, 72.5M, or 10,000,000.");
      }

      if (low >= high) {
        throw new Error("70M Threshold must be lower than 72.5M+ Threshold.");
      }

      return { top, high, low };
    }

    function buildThresholdUrl(baseUrl, top, high, low) {
      const url = new URL(baseUrl);
      url.searchParams.set("top", String(top));
      url.searchParams.set("high", String(high));
      url.searchParams.set("low", String(low));
      return url.toString();
    }

    async function fetchJsonOrThrow(url) {
      const res = await fetch(url, { cache: "no-store" });
      const text = await res.text();
      let payload = null;

      try {
        payload = text ? JSON.parse(text) : null;
      } catch {
        payload = null;
      }

      if (!res.ok) {
        throw new Error(payload?.message || payload?.error || text || `Worker request failed (${res.status}).`);
      }

      if (payload?.ok === false) {
        throw new Error(payload?.message || payload?.error || "Lookup failed.");
      }

      return payload;
    }

    async function fetchThresholds(top, high, low) {
      try {
        return await fetchJsonOrThrow(buildThresholdUrl(THRESHOLDS_URL, top, high, low));
      } catch (primaryError) {
        const legacyUrl =
          `${LEGACY_WORKER_URL}?mode=top-thresholds` +
          `&top=${encodeURIComponent(top)}` +
          `&high=${encodeURIComponent(high)}` +
          `&low=${encodeURIComponent(low)}`;

        try {
          return await fetchJsonOrThrow(legacyUrl);
        } catch {
          throw primaryError;
        }
      }
    }

    async function loadThresholds() {
      let parsed;

      try {
        parsed = getParsedInputs();
      } catch (err) {
        setStatus(err?.message || String(err), "error");
        return;
      }

      const { top, high, low } = parsed;

      saveInputs(String(top), formatCompactNumber(high), formatCompactNumber(low));
      normalizeInputDisplays();
      setStatus("Loading top clan threshold counts...", "info");

      try {
        const payload = await fetchThresholds(top, high, low);

        renderCards(payload);
        renderTable(payload);
        saveInputs(
          String(payload.top || top),
          formatCompactNumber(payload.highThreshold || high),
          formatCompactNumber(payload.lowThreshold || low)
        );
        setStatus("", "info");
      } catch (err) {
        console.error(err);
        setStatus(err?.message || String(err), "error");
      }
    }

    async function postThresholds() {
      let parsed;

      try {
        parsed = getParsedInputs();
      } catch (err) {
        setStatus(err?.message || String(err), "error");
        return;
      }

      const { top, high, low } = parsed;
      const postBtn = document.getElementById("post-btn");

      postBtn.disabled = true;
      saveInputs(String(top), formatCompactNumber(high), formatCompactNumber(low));
      normalizeInputDisplays();
      setStatus("Posting top clan thresholds to Discord...", "info");

      try {
        const url =
          `${LEGACY_WORKER_URL}?mode=post-top-thresholds` +
          `&top=${encodeURIComponent(top)}` +
          `&high=${encodeURIComponent(high)}` +
          `&low=${encodeURIComponent(low)}`;

        const res = await fetch(url, { cache: "no-store" });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || `Worker request failed (${res.status}).`);
        }

        const payload = await res.json();

        if (!payload?.ok) {
          throw new Error(payload?.error || "Discord post failed.");
        }

        const messageId = payload?.discord_message_id ? ` Message ID: ${payload.discord_message_id}` : "";
        setStatus(`Posted to Discord successfully.${messageId}`, "info");
      } catch (err) {
        console.error(err);
        setStatus(err?.message || String(err), "error");
      } finally {
        postBtn.disabled = false;
      }
    }

    async function postThresholdImageBoard() {
      let parsed;

      try {
        parsed = getParsedInputs();
      } catch (err) {
        setStatus(err?.message || String(err), "error");
        return;
      }

      const { top, high, low } = parsed;
      const postImageBtn = document.getElementById("post-image-btn");

      postImageBtn.disabled = true;
      saveInputs(String(top), formatCompactNumber(high), formatCompactNumber(low));
      normalizeInputDisplays();
      setStatus("Posting image board to Discord...", "info");

      try {
        const url =
          `${LEGACY_WORKER_URL}?mode=post-top-thresholds-image` +
          `&top=${encodeURIComponent(top)}` +
          `&high=${encodeURIComponent(high)}` +
          `&low=${encodeURIComponent(low)}`;

        const res = await fetch(url, { cache: "no-store" });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || `Worker request failed (${res.status}).`);
        }

        const payload = await res.json();

        if (!payload?.ok) {
          throw new Error(payload?.error || "Discord image post failed.");
        }

        const messageId = payload?.discord_message_id ? ` Message ID: ${payload.discord_message_id}` : "";
        setStatus(`Image posted to Discord successfully.${messageId}`, "info");
      } catch (err) {
        console.error(err);
        setStatus(err?.message || String(err), "error");
      } finally {
        postImageBtn.disabled = false;
      }
    }

    function wireEvents() {
      document.getElementById("refresh-btn").addEventListener("click", loadThresholds);

      const postBtn = document.getElementById("post-btn");
      if (postBtn) postBtn.addEventListener("click", postThresholds);

      const postImageBtn = document.getElementById("post-image-btn");
      if (postImageBtn) postImageBtn.addEventListener("click", postThresholdImageBoard);

      ["top-input", "high-input", "low-input"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;

        el.addEventListener("keydown", e => {
          if (e.key === "Enter") {
            loadThresholds();
          }
        });

        el.addEventListener("blur", () => {
          normalizeInputDisplays();
        });
      });
    }

    function init() {
      loadSavedInputs();
      normalizeInputDisplays();
      wireEvents();
      loadThresholds();
    }

    init();
  </script>
</body>
</html>
