<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Server Details</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0f141b;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #ff9b96;
      --hover: #1f2630;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
      --ok: #3fb950;
      --ok-bg: rgba(63, 185, 80, 0.12);
      --warn: #d29922;
      --warn-bg: rgba(210, 153, 34, 0.12);
      --disabled: #6e7681;
      --disabled-bg: rgba(110, 118, 129, 0.12);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .site-logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .site-logo {
      display: block;
      width: 76px;
      height: auto;
      border-radius: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .button-link,
    button {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 12px;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .button-link:hover,
    button:hover {
      background: var(--hover);
      border-color: var(--link);
      color: var(--link);
    }

    button {
      cursor: pointer;
      font-family: inherit;
    }

    .menu-bar {
      max-width: 1280px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .menu-btn:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .menu-btn.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(248, 81, 73, 0.12);
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 24px 28px;
    }

    .panel,
    .status {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .panel[hidden],
    .status[hidden] {
      display: none;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
    }

    .panel-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .detail-body {
      padding: 16px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px 18px;
      margin-bottom: 16px;
    }

    .summary-item {
      min-width: 0;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .summary-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .summary-value {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }

    .summary-value.muted {
      color: var(--muted);
      font-weight: 500;
    }

    .server-link-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 16px;
    }

    .video-wrap {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .video-wrap[hidden] {
      display: none;
    }

    video {
      display: block;
      width: min(100%, 860px);
      max-height: 520px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .status {
      padding: 14px 16px;
    }

    .status.info {
      color: var(--text);
    }

    .status.ok {
      border-color: var(--ok);
      background: var(--ok-bg);
      color: #9be9a8;
    }

    .status.error {
      border-color: var(--danger);
      background: var(--danger-bg);
      color: #ffb4ad;
    }

    .auth-panel {
      padding: 18px;
    }

    .auth-panel[hidden] {
      display: none;
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .auth-button {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .auth-button:hover {
      background: var(--hover);
      border-color: var(--link);
      color: var(--link);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      user-select: none;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .empty-state {
      color: var(--muted);
      padding: 28px 16px;
      text-align: center;
    }

    .server-pill,
    .clan-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 70px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-2);
      font-size: 12px;
    }

    .server-pill.online {
      border-color: var(--ok);
      background: var(--ok-bg);
      color: #9be9a8;
    }

    .server-pill.full {
      border-color: var(--warn);
      background: var(--warn-bg);
      color: #f2cc60;
    }

    .server-pill.offline,
    .clan-pill.unknown {
      border-color: var(--disabled);
      background: var(--disabled-bg);
      color: #c9d1d9;
    }

    .clan-pill.c0ld,
    .clan-pill.wmsy {
      border-color: var(--ok);
      background: var(--ok-bg);
      color: #9be9a8;
    }

    .clan-pill.other {
      border-color: var(--warn);
      background: var(--warn-bg);
      color: #f2cc60;
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .player-avatar {
      width: 34px;
      height: 34px;
      min-width: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      object-fit: cover;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
      overflow: hidden;
    }

    .player-avatar.unknown {
      border-color: var(--disabled);
      background:
        radial-gradient(circle at 35% 32%, rgba(230, 237, 243, 0.20) 0 18%, transparent 19%),
        radial-gradient(circle at 50% 78%, rgba(230, 237, 243, 0.16) 0 30%, transparent 31%),
        var(--panel-2);
      color: #c9d1d9;
    }

    .player-name-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .player-name {
      font-weight: 700;
      color: var(--text);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-name a {
      color: var(--text);
    }

    .player-name a:hover {
      color: var(--link);
      text-decoration: underline;
    }

    .player-sub {
      color: var(--muted);
      font-size: 12px;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 16px 10px;
      }

      main {
        padding: 16px;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      .menu-bar {
        justify-content: flex-start;
      }

      .panel-actions,
      .server-link-row {
        width: 100%;
      }

      .button-link,
      button {
        flex: 1 1 auto;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <a class="site-logo-link" href="index.html" aria-label="c0ld home">
        <img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld">
      </a>
    </div>

    <div class="menu-bar">
      <a class="menu-btn" href="index.html">c0ld Leaderboard</a>
      <a class="menu-btn" href="clans.html">Clans Leaderboard</a>
      <a class="menu-btn" href="live-clan.html">Clan Lookup</a>
      <a class="menu-btn active" href="servers.html">Servers</a>
      <a class="menu-btn" href="macros.html">Macros</a>
    </div>
  </header>

  <main>
    <section id="auth-panel" class="panel auth-panel">
      <h2 class="panel-title">Discord Access Required</h2>
      <p id="auth-status" class="muted">Checking Discord access...</p>
      <div class="auth-actions">
        <a id="discord-login-btn" class="auth-button" href="#">Sign in with Discord</a>
        <button id="discord-logout-btn" type="button">Clear Session</button>
        <span id="discord-user" class="muted"></span>
      </div>
    </section>

    <div id="protected-content" hidden></div>

    <div id="status" class="status info" hidden></div>

    <section id="detail-panel" class="panel" hidden>
      <div class="panel-header">
        <h2 id="server-title" class="panel-title">Server</h2>
        <div class="panel-actions">
          <a class="button-link" href="servers.html">Back</a>
          <button id="refresh-btn" type="button">Refresh</button>
        </div>
      </div>

      <div class="detail-body">
        <div class="summary-grid">
          <div class="summary-item">
            <span class="summary-label">ID</span>
            <span id="server-id" class="summary-value">-</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Status</span>
            <span id="server-status" class="summary-value">-</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Location</span>
            <span id="server-location" class="summary-value">-</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Players</span>
            <span id="server-players" class="summary-value">-</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Updated</span>
            <span id="server-updated" class="summary-value muted">-</span>
          </div>
        </div>

        <div class="server-link-row">
          <a id="join-link" class="button-link" href="#" target="_blank" rel="noopener">Open Server</a>
          <a id="video-link" class="button-link" href="#" target="_blank" rel="noopener" hidden>Pathing Video</a>
        </div>

        <div id="video-wrap" class="video-wrap" hidden>
          <video id="pathing-video" controls playsinline></video>
        </div>
      </div>
    </section>

    <section id="players-panel" class="panel" hidden>
      <div class="panel-header">
        <h2 class="panel-title">Players In Server</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>User ID</th>
              <th>Clan</th>
            </tr>
          </thead>
          <tbody id="players-body">
            <tr>
              <td colspan="3" class="empty-state">No player list available.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="assets/protected-access.js"></script>
  <script>
    const PROTECTED_API_BASE = "https://c0ldauth.opal-dde.workers.dev";
    const SERVERS_API_BASE = "https://c0ld-servers.opal-dde.workers.dev";
    const PAGE_KEY = "servers";
    const SERVERS_DATA_PATH = "/api/servers";
    const SERVERS_STATIC_FALLBACK = "Data/servers.json";
    const DEFAULT_MAX_PLAYERS = 10;
    const OFFLINE_LABEL = "Offline";
    const UNKNOWN_LABEL = "Unknown";

    let servers = [];
    let activeServer = null;
    let discordConfig = {};

    function htmlEscape(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalizeLink(value) {
      return String(value || "")
        .trim()
        .replace(/#.*$/, "")
        .replace(/[?&]_=\d+$/, "")
        .replace(/\/+$/, "")
        .toLowerCase();
    }

    function hashString(value) {
      let hash = 2166136261;
      const text = String(value || "");

      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }

      return (hash >>> 0).toString(36);
    }

    function stableServerId(row, link) {
      const raw = String(row.id || row.server_id || row.key || "").trim();
      if (raw) return raw;
      return `srv-${hashString(normalizeLink(link))}`;
    }

    function toNumberOrNull(value) {
      if (value === null || value === undefined || value === "") return null;
      if (Array.isArray(value) || typeof value === "object") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function firstNumber(...values) {
      for (const value of values) {
        const n = toNumberOrNull(value);
        if (n !== null) return n;
      }
      return null;
    }

    function getPlayerCount(row) {
      return firstNumber(
        row.players,
        row.player_count,
        row.players_current,
        row.current_players,
        row.member_count,
        row.members_count
      );
    }

    function getMaxPlayers(row) {
      return firstNumber(
        row.max_players,
        row.players_max,
        row.player_capacity,
        row.capacity,
        discordConfig.default_max_players,
        DEFAULT_MAX_PLAYERS
      ) || DEFAULT_MAX_PLAYERS;
    }

    function normalizePlayer(player, index) {
      const userId = player.user_id || player.userId || player.id || null;
      const unknown = Boolean(player.unknown || !userId);
      const slot = Number(player.slot || index + 1);

      return {
        slot,
        unknown,
        username: String(player.username || player.name || player.displayName || (unknown ? `Unknown Player ${slot}` : `User ${userId}`)),
        display_name: String(player.display_name || player.displayName || ""),
        user_id: userId,
        avatar_url: String(player.avatar_url || player.avatarUrl || ""),
        clan: String(player.clan || "")
      };
    }

    function normalizePlayersList(row) {
      const list = row.players_list || row.members || row.player_list || [];
      if (!Array.isArray(list)) return [];
      return list.map(normalizePlayer);
    }

    function completePlayersList(row) {
      const expected = Math.max(0, getPlayerCount(row) || 0);
      const maxPlayers = getMaxPlayers(row);
      const target = expected || (serverAvailability(row) === "offline" ? 0 : maxPlayers);
      const players = normalizePlayersList(row).slice(0, target);

      while (players.length < target) {
        const slot = players.length + 1;
        players.push({
          slot,
          unknown: true,
          username: `Unknown Player ${slot}`,
          display_name: "",
          user_id: null,
          avatar_url: "",
          clan: ""
        });
      }

      return players;
    }

    function parseRows(payload) {
      discordConfig = payload?.discord || {};
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload?.rows)) return payload.rows;
      if (Array.isArray(payload?.servers)) return payload.servers;
      return [];
    }

    function dedupeServers(rows) {
      const byLink = new Map();

      for (const row of rows) {
        const link = String(row.server_link || row.link || "").trim();
        const key = normalizeLink(link);
        if (!key) continue;

        const normalized = {
          id: stableServerId(row, link),
          rank: toNumberOrNull(row.rank ?? row.server_number),
          location: String(row.location || row.region || "").trim() || UNKNOWN_LABEL,
          link,
          players: getPlayerCount(row),
          max_players: getMaxPlayers(row),
          players_list: normalizePlayersList(row),
          clan_counts: row.clan_counts || {},
          compromise_status: String(row.compromise_status || row.status || row.server_status || "").trim(),
          players_updated_at: row.players_updated_at || null,
          discord_emoji: String(row.discord_emoji || row.emoji || "").trim(),
          video_url: String(row.video_url || row.pathing_video || row.pathing_video_url || row.video || "").trim(),
          updated_at: row.updated_at || row.submitted_at || row.created_at || null
        };

        const existing = byLink.get(key);
        if (!existing) {
          byLink.set(key, normalized);
          continue;
        }

        const existingTime = new Date(existing.updated_at || 0).getTime() || 0;
        const nextTime = new Date(normalized.updated_at || 0).getTime() || 0;
        byLink.set(key, nextTime >= existingTime ? {
          ...existing,
          ...normalized,
          rank: normalized.rank ?? existing.rank,
          players_list: normalized.players_list.length ? normalized.players_list : existing.players_list
        } : existing);
      }

      return [...byLink.values()].map((row, index) => ({
        ...row,
        rank: Number(row.rank ?? index + 1)
      })).sort((a, b) => a.rank - b.rank);
    }

    function serverAvailability(row) {
      const players = getPlayerCount(row);
      const maxPlayers = getMaxPlayers(row);
      const status = String(row.compromise_status || row.status || row.server_status || "").trim().toLowerCase();

      if (status === "full") return "full";
      if (status === "online") return "online";
      if (status === "offline") return "offline";

      if (players !== null && players >= maxPlayers) return "full";
      if (players !== null && players > 0) return "online";

      return "offline";
    }

    function serverAvailabilityLabel(row) {
      const availability = serverAvailability(row);
      if (availability === "full") return "Full";
      if (availability === "online") return "Online";
      return "Offline";
    }

    function displayLocation(row) {
      if (serverAvailability(row) === "offline") {
        return OFFLINE_LABEL;
      }

      const location = String(row.location || row.region || "").trim();
      return location || UNKNOWN_LABEL;
    }

    function fmtPlayers(row) {
      const players = getPlayerCount(row);
      const maxPlayers = getMaxPlayers(row);
      const current = players === null ? "-" : players.toLocaleString("en-US");
      return `${current}/${maxPlayers.toLocaleString("en-US")}`;
    }

    function fmtDateTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";

      return date.toLocaleString(undefined, {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function setStatus(message, kind = "info") {
      const el = document.getElementById("status");
      el.hidden = false;
      el.className = `status ${kind}`;
      el.textContent = message;
    }

    function hideStatus() {
      const el = document.getElementById("status");
      el.hidden = true;
      el.textContent = "";
    }

    function getRequestedServer() {
      const params = new URLSearchParams(window.location.search);
      const id = String(params.get("id") || "").trim();
      const rank = toNumberOrNull(params.get("rank") || params.get("server"));

      if (id) {
        return servers.find(row => row.id === id || String(row.rank) === id);
      }

      if (rank !== null) {
        return servers.find(row => row.rank === rank);
      }

      return null;
    }

    function isPlayableVideoUrl(value) {
      try {
        const url = new URL(value, window.location.href);
        return /\.(mp4|webm|mov|m4v|ogg)$/i.test(url.pathname);
      } catch {
        return false;
      }
    }

    function clanLabel(player) {
      if (player.unknown || !player.user_id) return UNKNOWN_LABEL;

      const clan = String(player.clan || "").trim().toUpperCase();
      if (clan === "C0LD") return "C0LD";
      if (clan === "WMSY") return "WMSY";
      return "Other";
    }

    function clanClass(player) {
      if (player.unknown || !player.user_id) return "unknown";

      const clan = String(player.clan || "").trim().toLowerCase();
      return clan === "c0ld" || clan === "wmsy" ? clan : "other";
    }

    function playerProfileUrl(player) {
      if (!player.user_id) return "";
      return `https://www.roblox.com/users/${encodeURIComponent(player.user_id)}/profile`;
    }

    function playerAvatarMarkup(player) {
      if (player.avatar_url && !player.unknown) {
        return `<img class="player-avatar" src="${htmlEscape(player.avatar_url)}" alt="${htmlEscape(player.username)}">`;
      }

      return `<span class="player-avatar unknown" aria-label="Unknown player">?</span>`;
    }

    function renderPlayers(row) {
      const tbody = document.getElementById("players-body");
      const players = completePlayersList(row);

      if (!players.length) {
        tbody.innerHTML = `<tr><td colspan="3" class="empty-state">No players detected.</td></tr>`;
        return;
      }

      tbody.innerHTML = players.map(player => {
        const profile = playerProfileUrl(player);
        const name = htmlEscape(player.username || `Unknown Player ${player.slot}`);
        const displayName = htmlEscape(player.display_name || (player.unknown ? "Profile unavailable" : ""));
        const userId = player.user_id ? htmlEscape(player.user_id) : "-";

        return `
          <tr>
            <td>
              <div class="player-cell">
                ${playerAvatarMarkup(player)}
                <div class="player-name-wrap">
                  <span class="player-name">
                    ${
                      profile
                        ? `<a href="${htmlEscape(profile)}" target="_blank" rel="noopener">${name}</a>`
                        : name
                    }
                  </span>
                  <span class="player-sub">${displayName || " "}</span>
                </div>
              </div>
            </td>
            <td>${userId}</td>
            <td><span class="clan-pill ${htmlEscape(clanClass(player))}">${htmlEscape(clanLabel(player))}</span></td>
          </tr>
        `;
      }).join("");
    }

    function renderServer(row) {
      activeServer = row;
      hideStatus();

      document.getElementById("detail-panel").hidden = false;
      document.getElementById("players-panel").hidden = false;
      document.getElementById("server-title").textContent = `Server ${row.rank}`;
      document.getElementById("server-id").textContent = `Server ${row.rank}`;
      document.getElementById("server-status").innerHTML = `<span class="server-pill ${htmlEscape(serverAvailability(row))}">${htmlEscape(serverAvailabilityLabel(row))}</span>`;
      document.getElementById("server-location").textContent = displayLocation(row);
      document.getElementById("server-players").textContent = fmtPlayers(row);
      document.getElementById("server-updated").textContent = fmtDateTime(row.updated_at || row.players_updated_at);

      const joinLink = document.getElementById("join-link");
      joinLink.href = row.link;

      const videoLink = document.getElementById("video-link");
      const videoWrap = document.getElementById("video-wrap");
      const video = document.getElementById("pathing-video");

      if (row.video_url) {
        videoLink.hidden = false;
        videoLink.href = row.video_url;

        if (isPlayableVideoUrl(row.video_url)) {
          video.src = row.video_url;
          videoWrap.hidden = false;
        } else {
          video.removeAttribute("src");
          videoWrap.hidden = true;
        }
      } else {
        videoLink.hidden = true;
        videoLink.removeAttribute("href");
        video.removeAttribute("src");
        videoWrap.hidden = true;
      }

      renderPlayers(row);
    }

    async function loadServers() {
      setStatus("Loading server...", "info");
      document.getElementById("detail-panel").hidden = true;
      document.getElementById("players-panel").hidden = true;

      try {
        const res = await C0LD_AUTH.fetch(SERVERS_API_BASE, `${SERVERS_DATA_PATH}?v=${Date.now()}`);

        if (!res.ok) {
          throw new Error(`Could not load servers. HTTP ${res.status}`);
        }

        const payload = await res.json();
        servers = dedupeServers(parseRows(payload));
        const row = getRequestedServer();

        if (!row) {
          setStatus("Server not found.", "error");
          return;
        }

        renderServer(row);
      } catch (err) {
        console.error(err);
        try {
          const fallback = await fetch(`${SERVERS_STATIC_FALLBACK}?v=${Date.now()}`, { cache: "no-store" });
          const payload = await fallback.json();
          servers = dedupeServers(parseRows(payload));
          const row = getRequestedServer();

          if (!row) {
            setStatus("Server not found.", "error");
            return;
          }

          renderServer(row);
          setStatus("Loaded the seeded server list. Deploy the c0ld Servers Worker to enable live updates.", "info");
        } catch {
          setStatus(err?.message || String(err), "error");
        }
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", loadServers);

    async function initPage() {
      const auth = await C0LD_AUTH.requireAccess({
        apiBase: PROTECTED_API_BASE,
        page: PAGE_KEY,
        panelId: "auth-panel",
        contentId: "protected-content",
        statusId: "auth-status",
        loginId: "discord-login-btn",
        logoutId: "discord-logout-btn",
        userId: "discord-user"
      });

      if (auth.allowed) {
        await loadServers();
      }
    }

    initPage();
  </script>
</body>
</html>
