<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clan Profile</title>
<style>
*{box-sizing:border-box}:root{--bg:#0d1117;--panel:#161b22;--panel2:#0d1117;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--link:#58a6ff;--rank:#f2cc60}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}a{color:var(--link);text-decoration:none}header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 22px}.header-inner{max-width:1200px;margin:auto;display:flex;justify-content:center}.site-logo{width:76px;border-radius:10px}.menu-bar{max-width:1200px;margin:9px auto 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.menu-btn{padding:7px 12px;border:1px solid var(--border);border-radius:5px;background:var(--panel2);color:var(--text);font-size:13px}.menu-btn:hover{border-color:var(--link);background:#1f2630}main{max-width:1200px;margin:auto;padding:22px 24px}.box,.profile-header,.card,.battle-card{border:1px solid var(--border);border-radius:10px;background:var(--panel)}.profile-header{display:flex;gap:18px;align-items:center;padding:18px;margin-bottom:24px}.clan-icon{width:96px;height:96px;border-radius:10px;background:#21262d;object-fit:cover}.profile-name{margin:0 0 6px;font-size:34px}.meta,.label,.dates,.chart-title{color:var(--muted);font-size:13px;line-height:1.45}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:24px}.card{padding:16px;min-height:82px}.value{font-size:21px;font-weight:700}.battle-card{overflow:hidden}.battle-head{padding:16px;border-bottom:1px solid var(--border)}.battle-title{margin:0 0 10px}.stats{padding:8px 16px 16px}.stat-row{display:grid;grid-template-columns:minmax(190px,1fr) minmax(100px,1fr);gap:16px;padding:8px;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:0}.stat-value{text-align:right;font-variant-numeric:tabular-nums}.chart-wrap{position:relative;padding:0 16px 16px}.controls{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin:8px 0 10px}.controls label{display:inline-flex;gap:6px;align-items:center}.chart{width:100%;height:280px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);cursor:crosshair}.tip{position:absolute;display:none;pointer-events:none;z-index:5;min-width:220px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#0b0f14;box-shadow:0 8px 24px #0008;font-size:13px;line-height:1.45}.error,.empty{padding:18px}.error{border-color:#f85149;background:rgba(248,81,73,.12);color:#ffb4ad}@media(max-width:700px){main{padding:16px}.menu-bar{justify-content:flex-start}.cards{grid-template-columns:1fr}.stat-row{grid-template-columns:1fr}.stat-value{text-align:left}.chart{height:230px}}
</style>
</head>
<body>
<header><div class="header-inner"><a id="clan-mascot-link" class="site-logo-link" href="index.html?clan=WMSY"><img id="site-mascot" class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a></div><div class="menu-bar"><a class="menu-btn" data-clan-link data-page="index.html" href="index.html">c0ld Leaderboard</a><a class="menu-btn" data-clan-link data-page="players.html" href="players.html">Players</a><a class="menu-btn" data-clan-link data-page="clans.html" href="clans.html">Clans Leaderboard</a><a class="menu-btn" href="/c0ld/clan-filter.html">Clan Filter</a><a class="menu-btn" href="/c0ld/top-clan-filter.html">Top Clan Filter</a><a class="menu-btn" data-clan-link data-page="live-clan.html" href="live-clan.html">Clan Lookup</a><a class="menu-btn" data-clan-link data-page="servers.html" href="servers.html">Servers</a><a class="menu-btn" data-clan-link data-page="macros.html" href="macros.html">Macros</a></div></header>
<main id="app"><div class="box empty">Loading clan profile...</div></main>
<script>
const CUR="https://c0ld-clan-api-worker.opal-dde.workers.dev/api/clans/current",HIST="https://c0ld-clan-api-worker.opal-dde.workers.dev/api/clans/history",STATIC="Data/clans-history.json",ACTIVE="https://ps99.biggamesapi.io/api/activeClanBattle";
const SPECIAL={c0ld:{label:"c0ld",color:"#ff9b96"},wmsy:{label:"WMSY",color:"#74d99f"},nong:{label:"NONG",color:"#f6ad55"}},ICON="data:image/svg+xml;utf8,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150"><rect width="150" height="150" rx="16" fill="#21262d"/><path d="M46 98V52l29-15 29 15v46l-29 15-29-15z" fill="#6e7681"/></svg>`);
let current=null,activeInfo=null,hist={rows:[]},name="",row=null,showP=true,showR=true,cache=null;
function n(v){return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}function disp(v){return SPECIAL[n(v)]?.label||String(v||"").trim()}function dec(v){try{return decodeURIComponent(v)}catch{return v}}function slugClan(){const parts=location.pathname.split("/").map(dec).filter(Boolean),keys=parts.map(n),i=keys.lastIndexOf("clans"),slug=i>=0?parts[i+1]:"";return slug&&n(slug)!=="indexhtml"?slug.replace(/\.[^.]+$/,"").replace(/[-_]+/g," "):""}function viewed(){const p=new URLSearchParams(location.search);return window.__CLAN_PROFILE_NAME||p.get("name")||p.get("target")||p.get("clanName")||p.get("clan")||slugClan()||"c0ld"}function col(v){return SPECIAL[n(v)]?.color||"#58a6ff"}function e(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function prettyBattle(v){return String(v||"").trim().replace(/([a-z0-9])([A-Z])/g,"$1 $2").replace(/(\D)(20\d{2})$/i,"$1 $2").replace(/\s+/g," ").trim()}function battleName(b){const key=String(b?.battle||b?.battle_key||"").trim(),raw=String(b?.display_name||b?.battle_display_name||"").trim();if(key&&raw&&n(raw).includes("backrooms")&&!n(key).includes("backrooms"))return prettyBattle(key)||key;return raw||prettyBattle(key)||key}function num(v){if(v===null||v===undefined||v==="")return null;const x=Number(v);return Number.isFinite(x)?x:null}function fmt(v){const x=num(v);return x===null?"—":x.toLocaleString("en-US")}function rank(v){const x=num(v);return x===null?"—":`#${x.toLocaleString("en-US")}`}function date(v){if(!v)return"—";const d=new Date(v);return Number.isNaN(d.getTime())?"—":d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})}function dt(v){if(!v)return"—";const d=new Date(v);return Number.isNaN(d.getTime())?"—":d.toLocaleString(undefined,{dateStyle:"short",timeStyle:"medium"})}function short(v){const x=num(v);if(x===null)return"—";for(const t of[{v:1e12,s:"T"},{v:1e9,s:"B"},{v:1e6,s:"M"},{v:1e3,s:"K"}])if(Math.abs(x)>=t.v)return(x/t.v).toFixed(1).replace(/\.0$/,'')+t.s;return String(Math.round(x))}
async function fj(url){const r=await fetch(`${url}${url.includes("?")?"&":"?"}v=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}async function opt(url,fb){try{return await fj(url)}catch{return fb}}function rname(r){return r?.clan_name||r?.clan||r?.name||r?.tag||""}function find(rows,x){const k=n(x);return(rows||[]).find(r=>n(rname(r))===k)||null}function rtime(r,f=null){return r?.t||r?.fetched_at||r?.snapshot_at||r?.generated_at||r?.created_at||r?.updated_at||f||null}function hrow(r,f=null){return{t:rtime(r,f),rank:num(r.rank),points:num(r.points??r.total_points),clan_name:rname(r),icon_url:r.icon_url||null}}
function flat(data){let out=[];if(Array.isArray(data)){data.forEach(x=>out.push(...flat(x)));return out}if(!data||typeof data!=="object")return out;if(Array.isArray(data.snapshots))for(const s of data.snapshots){const t=rtime(s);for(const r of s.rows||[])out.push(hrow(r,t))}if(Array.isArray(data.rows)){const t=rtime(data);for(const r of data.rows)out.push(hrow(r,t))}return out.filter(x=>x.t&&x.clan_name&&x.points!==null).sort((a,b)=>new Date(a.t)-new Date(b.t))}function staticBattle(list,b){const k=n(b);return(Array.isArray(list)?list:[]).find(x=>n(x.battle)===k||n(x.display_name)===k||n(x.api_battle_key)===k)||null}
function isoUnix(v){const x=Number(v);return Number.isFinite(x)&&x>0?new Date(x*1000).toISOString():null}function startFromEnd(endIso){const x=new Date(endIso);if(Number.isNaN(x.getTime()))return null;x.setUTCFullYear(2026,5,13);return x.toISOString()}function activeRange(){const cfg=activeInfo?.data?.configData||{},end=isoUnix(cfg.FinishTime),apiStart=isoUnix(cfg.StartTime);return{start:startFromEnd(end)||apiStart,end}}function eventStart(fallback){return activeRange().start||fallback}function eventEnd(fallback){return activeRange().end||fallback}
async function loadHist(){const b=current?.battle||"current",api=`${HIST}?battle=${encodeURIComponent(b)}&clan=${encodeURIComponent(name)}&hours=10000&limit=50000`,a=await opt(api,{rows:[]}),s=await opt(STATIC,[]),st=staticBattle(s,b),m=new Map();for(const r of[...flat(st),...flat(a)])m.set(`${n(r.clan_name)}:${new Date(r.t).toISOString()}`,r);return{rows:[...m.values()].sort((a,b)=>new Date(a.t)-new Date(b.t))}}function rowsFor(x){const k=n(x);return flat(hist).filter(r=>n(r.clan_name)===k).sort((a,b)=>new Date(a.t)-new Date(b.t))}function series(){let rows=rowsFor(name),t=current?.snapshot_at||current?.generated_at||row?.fetched_at;if(row&&t&&!rows.some(r=>new Date(r.t).getTime()===new Date(t).getTime()))rows.push(hrow(row,t));return rows.sort((a,b)=>new Date(a.t)-new Date(b.t))}function stats(rows){const ranks=rows.map(r=>r.rank).filter(Number.isFinite),f=rows[0]||{},l=rows[rows.length-1]||{};return{start:f.t,end:l.t,first:f.rank,worst:ranks.length?Math.max(...ranks):null,best:ranks.length?Math.min(...ranks):null,endRank:row?.rank??l.rank,endPoints:row?.points??row?.total_points??l.points}}
function render(){const rows=series(),s=stats(rows),battle=battleName(current)||"Current Clan Battle",icon=row?.icon_url||rows.find(r=>r.icon_url)?.icon_url||ICON;document.documentElement.style.setProperty("--link",col(name));document.getElementById("app").innerHTML=`<section class="profile-header"><img class="clan-icon" src="${e(icon)}" alt=""><div><h1 class="profile-name">${e(disp(name))}</h1><div class="meta">Current Battle: ${e(battle)}<br>${row?`Top 200 clan profile · Rank ${rank(row.rank)}`:"Clan not currently in top 200"}</div></div></section><section class="cards"><div class="card"><div class="label">Current Rank</div><div class="value">${rank(row?.rank)}</div></div><div class="card"><div class="label">Current Points</div><div class="value">${fmt(row?.points??row?.total_points)}</div></div><div class="card"><div class="label">Latest Seen</div><div class="value">${dt(current?.snapshot_at||current?.generated_at)}</div></div></section><article class="battle-card"><div class="battle-head"><h2 class="battle-title">${e(battle)}</h2><div class="dates">${date(eventStart(current?.battle_start_iso||s.start))} → ${date(eventEnd(current?.battle_end_iso||s.end))}</div></div><div class="stats"><div class="stat-row"><div class="label">Starting Rank</div><div class="stat-value">${rank(s.first)}</div></div><div class="stat-row"><div class="label">Worst Rank</div><div class="stat-value">${rank(s.worst)}</div></div><div class="stat-row"><div class="label">Best Rank</div><div class="stat-value">${rank(s.best)}</div></div><div class="stat-row"><div class="label">End Rank</div><div class="stat-value">${rank(s.endRank)}</div></div><div class="stat-row"><div class="label">Ending Points</div><div class="stat-value">${fmt(s.endPoints)}</div></div></div><div class="chart-wrap"><div class="chart-title">Progression</div><div class="controls"><label style="color:${col(name)}"><input id="points" type="checkbox" ${showP?"checked":""}> Points</label><label style="color:var(--rank)"><input id="rank" type="checkbox" ${showR?"checked":""}> Rank</label></div><canvas class="chart" id="chart"></canvas><div class="tip" id="tip"></div></div></article>`;document.querySelector('.clan-icon').onerror=function(){this.onerror=null;this.src=ICON};document.getElementById("points").onchange=x=>{if(!x.target.checked&&!showR)x.target.checked=true;showP=x.target.checked;draw()};document.getElementById("rank").onchange=x=>{if(!x.target.checked&&!showP)x.target.checked=true;showR=x.target.checked;draw()};requestAnimationFrame(draw)}
function y(v,min,max,top,h,type){if(max===min)return top+h/2;const p=(v-min)/(max-min);return type==="rank"?top+p*h:top+(1-p)*h}function line(ctx,rows,x,yy,c){if(!rows.length)return;ctx.save();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();rows.forEach((r,i)=>i?ctx.lineTo(x(r),yy(r)):ctx.moveTo(x(r),yy(r)));ctx.stroke();ctx.restore()}function draw(){const c=document.getElementById("chart"),tip=document.getElementById("tip");if(!c)return;const ctx=c.getContext("2d"),rect=c.getBoundingClientRect(),dpr=devicePixelRatio||1,rows=series(),pr=showP?rows.filter(r=>r.points!==null):[],rr=showR?rows.filter(r=>r.rank!==null):[],vis=[...pr,...rr];c.width=Math.floor(rect.width*dpr);c.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,rect.width,rect.height);if(vis.length<2){ctx.fillStyle="#8b949e";ctx.font="13px Arial";ctx.fillText("Not enough points to chart.",16,28);return}const pl=58,prg=18,pt=18,pb=34,w=rect.width-pl-prg,h=rect.height-pt-pb,minT=Math.min(...vis.map(r=>new Date(r.t))),maxT=Math.max(...vis.map(r=>new Date(r.t))),pv=pr.map(r=>r.points),rv=rr.map(r=>r.rank),minP=pv.length?Math.min(...pv):0,maxP=pv.length?Math.max(...pv):0,minR=rv.length?Math.min(...rv):0,maxR=rv.length?Math.max(...rv):0,x=r=>maxT===minT?pl:pl+((new Date(r.t)-minT)/(maxT-minT))*w,yp=r=>y(r.points,minP,maxP,pt,h,"points"),yr=r=>y(r.rank,minR,maxR,pt,h,"rank");ctx.strokeStyle="#30363d";ctx.font="12px Arial";ctx.fillStyle="#8b949e";const grid=pv.length?{min:minP,max:maxP,type:"points"}:{min:minR,max:maxR,type:"rank"};for(let i=0;i<=4;i++){const p=i/4,yy=pt+p*h,val=grid.type==="rank"?grid.min+p*(grid.max-grid.min):grid.max-p*(grid.max-grid.min);ctx.beginPath();ctx.moveTo(pl,yy);ctx.lineTo(rect.width-prg,yy);ctx.stroke();ctx.fillText(grid.type==="rank"?`#${Math.round(val)}`:short(val),8,yy+4)}line(ctx,pr,x,yp,col(name));line(ctx,rr,x,yr,"#f2cc60");cache={rows,x,yp,yr,rect};bindTip(c,tip)}function bindTip(c,tip){if(c.dataset.bound)return;c.dataset.bound=1;c.onmouseleave=()=>tip.style.display="none";c.onmousemove=e=>{if(!cache)return;const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left;let near=cache.rows[0],dist=Math.abs(cache.x(near)-mx);for(const r of cache.rows){const d=Math.abs(cache.x(r)-mx);if(d<dist){near=r;dist=d}}draw();const fresh=cache,ctx=c.getContext("2d"),px=fresh.x(near),py=showP?fresh.yp(near):fresh.yr(near);ctx.fillStyle="#e6edf3";ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();tip.innerHTML=`<strong>${dt(near.t)}</strong><div>Points: ${fmt(near.points)}</div><div>Rank: ${rank(near.rank)}</div>`;tip.style.display="block";tip.style.left=Math.max(8,e.clientX-rect.left+14)+"px";tip.style.top=Math.max(8,e.clientY-rect.top+14)+"px"}}
async function load(){name=disp(viewed());const app=document.getElementById("app");try{activeInfo=await opt(ACTIVE,null);current=await fj(CUR);row=find(current.rows,name);if(!row){app.innerHTML=`<div class="box error">${e(name)} is not currently in the top 200 clans list.</div>`;return}name=rname(row)||name;hist=await loadHist();document.title=`${disp(name)} - Clan Profile`;render()}catch(err){console.error(err);app.innerHTML=`<div class="box error">Could not load clan profile. ${e(err.message)}</div>`}}
window.addEventListener("resize",()=>{clearTimeout(window.__r);window.__r=setTimeout(draw,100)});load();
</script>
