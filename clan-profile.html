<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Clan Profile</title>
  <style>
    *{box-sizing:border-box}:root{--bg:#0d1117;--panel:#161b22;--panel2:#0d1117;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--link:#58a6ff;--rank:#f2cc60}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}a{color:var(--link);text-decoration:none}header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 22px}.header-inner{max-width:1200px;margin:auto;display:flex;justify-content:center}.site-logo{width:76px;border-radius:10px}.menu-bar{max-width:1200px;margin:9px auto 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.menu-btn{padding:7px 12px;border:1px solid var(--border);border-radius:5px;background:var(--panel2);color:var(--text);font-size:13px}.menu-btn:hover{border-color:var(--link);background:#1f2630}main{max-width:1200px;margin:auto;padding:22px 24px}.box,.profile-header,.card,.battle-card{border:1px solid var(--border);border-radius:10px;background:var(--panel)}.profile-header{display:flex;gap:18px;align-items:center;padding:18px;margin-bottom:24px}.clan-icon{width:96px;height:96px;border-radius:10px;background:#21262d;object-fit:cover}.profile-name{margin:0 0 6px;font-size:34px}.meta,.label,.dates,.chart-title,.note{color:var(--muted);font-size:13px;line-height:1.45}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}.card{padding:16px;min-height:82px}.value{font-size:21px;font-weight:700}.battle-card{overflow:hidden}.battle-head{padding:16px;border-bottom:1px solid var(--border)}.battle-title{margin:0 0 10px}.stats{padding:8px 16px 16px}.stat-row{display:grid;grid-template-columns:minmax(190px,1fr) minmax(100px,1fr);gap:16px;padding:8px;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:0}.stat-value{text-align:right;font-variant-numeric:tabular-nums}.chart-wrap{position:relative;padding:0 16px 16px}.controls{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin:8px 0 10px}.controls label{display:inline-flex;gap:6px;align-items:center}.chart{width:100%;height:280px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);cursor:crosshair}.tip{position:absolute;display:none;pointer-events:none;z-index:5;min-width:220px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#0b0f14;box-shadow:0 8px 24px #0008;font-size:13px;line-height:1.45}.error,.empty{padding:18px}.error{border-color:#f85149;background:rgba(248,81,73,.12);color:#ffb4ad}@media(max-width:700px){main{padding:16px}.menu-bar{justify-content:flex-start}.cards{grid-template-columns:1fr}.stat-row{grid-template-columns:1fr}.stat-value{text-align:left}.chart{height:230px}}
  </style>
</head>
<body>
<header>
  <div class="header-inner"><a id="clan-mascot-link" class="site-logo-link" href="index.html?clan=WMSY" aria-label="Switch clan view" title="Switch clan view"><img id="site-mascot" class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a></div>
  <div class="menu-bar">
    <a class="menu-btn" data-clan-link data-page="index.html" href="index.html">c0ld Leaderboard</a><a class="menu-btn" data-clan-link data-page="players.html" href="players.html">Players</a><a class="menu-btn" data-clan-link data-page="clans.html" href="clans.html">Clans Leaderboard</a><a class="menu-btn" data-clan-link data-page="live-clan.html" href="live-clan.html">Clan Lookup</a><a class="menu-btn" data-clan-link data-page="servers.html" href="servers.html">Servers</a><a class="menu-btn" data-clan-link data-page="macros.html" href="macros.html">Macros</a>
  </div>
</header>
<main id="app"><div class="box empty">Loading clan profile...</div></main>
<script>
const CLANS_API_CURRENT_URL="https://c0ld-clan-api-worker.opal-dde.workers.dev/api/clans/current";
const CLANS_API_HISTORY_URL="https://c0ld-clan-api-worker.opal-dde.workers.dev/api/clans/history";
const STATIC_HISTORY_URL="Data/clans-history.json";
const SPECIAL={c0ld:{label:"c0ld",color:"#ff9b96"},wmsy:{label:"WMSY",color:"#74d99f"},nong:{label:"NONG",color:"#f6ad55"}};
const DEFAULT_ICON="data:image/svg+xml;utf8,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150"><rect width="150" height="150" rx="16" fill="#21262d"/><path d="M46 98V52l29-15 29 15v46l-29 15-29-15z" fill="#6e7681"/></svg>`);
let currentData=null, historyData={rows:[]}, selectedClan="", selectedRow=null, showPoints=true, showRank=true, chartCache=null;
function norm(v){return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}
function displayName(v){return SPECIAL[norm(v)]?.label||String(v||"").trim()}
function viewedClanName() { const params = new URLSearchParams(window.location.search); return params.get("name") || params.get("target") || params.get("clanName") || params.get("clan") || "c0ld"; }
function color(v){return SPECIAL[norm(v)]?.color||"#58a6ff"}
function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function num(v){if(v===null||v===undefined||v==="")return null;const n=Number(v);return Number.isFinite(n)?n:null}
function fmt(v){const n=num(v);return n===null?"—":n.toLocaleString("en-US")}
function short(v){const n=num(v);if(n===null)return"—";for(const t of[{v:1e12,s:"T"},{v:1e9,s:"B"},{v:1e6,s:"M"},{v:1e3,s:"K"}])if(Math.abs(n)>=t.v)return(n/t.v).toFixed(2).replace(/\.?0+$/,'')+t.s;return String(n)}
function rank(v){const n=num(v);return n===null?"—":`#${n.toLocaleString("en-US")}`}
function date(v){if(!v)return"—";const d=new Date(v);return Number.isNaN(d)?"—":d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})}
function dt(v){if(!v)return"—";const d=new Date(v);return Number.isNaN(d)?"—":d.toLocaleString(undefined,{dateStyle:"short",timeStyle:"medium"})}
async function fetchJson(url){const r=await fetch(`${url}${url.includes("?")?"&":"?"}v=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}
async function opt(url,fb){try{return await fetchJson(url)}catch{return fb}}
function rowName(r){return r?.clan_name||r?.clan||r?.name||r?.tag||""}
function findClan(rows,name){const k=norm(name);return(rows||[]).find(r=>norm(rowName(r))===k)||null}
function rowTime(r,f=null){return r?.t||r?.fetched_at||r?.snapshot_at||r?.generated_at||r?.created_at||r?.updated_at||f||null}
function histRow(r,f=null){return{t:rowTime(r,f),rank:num(r.rank),points:num(r.points??r.total_points),clan_name:rowName(r),icon_url:r.icon_url||null}}
function flatten(data){const out=[];if(Array.isArray(data)){data.forEach(x=>out.push(...flatten(x)));return out}if(!data||typeof data!=="object")return out;if(Array.isArray(data.snapshots))for(const s of data.snapshots){const t=rowTime(s);for(const r of s.rows||[])out.push(histRow(r,t))}if(Array.isArray(data.history))for(const s of data.history){const t=rowTime(s);for(const r of s.rows||[])out.push(histRow(r,t))}if(Array.isArray(data.rows)){const t=rowTime(data);for(const r of data.rows)out.push(histRow(r,t))}return out.filter(r=>r.t&&r.clan_name&&r.points!==null).sort((a,b)=>new Date(a.t)-new Date(b.t))}
function staticBattle(list,battle){const k=norm(battle);return(Array.isArray(list)?list:[]).find(x=>norm(x.battle)===k||norm(x.display_name)===k||norm(x.api_battle_key)===k)||null}
async function loadHistory(){const battle=currentData?.battle||"current";const api=`${CLANS_API_HISTORY_URL}?battle=${encodeURIComponent(battle)}&hours=10000&limit=50000`;const[apiHist,stat]=await Promise.all([opt(api,{rows:[]}),opt(STATIC_HISTORY_URL,[])]);const merged=new Map();for(const r of[...flatten(staticBattle(stat,battle)),...flatten(apiHist)])merged.set(`${norm(r.clan_name)}:${new Date(r.t).toISOString()}`,r);return{rows:[...merged.values()].sort((a,b)=>new Date(a.t)-new Date(b.t))}}
function rowsFor(name){const k=norm(name);return flatten(historyData).filter(r=>norm(r.clan_name)===k).sort((a,b)=>new Date(a.t)-new Date(b.t))}
function seriesFor(name){let rows=rowsFor(name);const cur=findClan(currentData?.rows,name);const t=currentData?.snapshot_at||currentData?.generated_at||cur?.fetched_at;if(cur&&t&&!rows.some(r=>new Date(r.t).getTime()===new Date(t).getTime()))rows.push(histRow(cur,t));return rows.sort((a,b)=>new Date(a.t)-new Date(b.t))}
function pullCount(){return new Set(flatten(historyData).map(r=>new Date(r.t).toISOString())).size}
function stats(rows){const ranks=rows.map(r=>r.rank).filter(Number.isFinite),f=rows[0]||{},l=rows[rows.length-1]||{};return{start:f.t,end:l.t,firstRank:f.rank,worst:ranks.length?Math.max(...ranks):null,best:ranks.length?Math.min(...ranks):null,endRank:selectedRow?.rank??l.rank,endPoints:selectedRow?.points??selectedRow?.total_points??l.points,pulls:rows.length}}
function render(){const app=document.getElementById("app"),rows=seriesFor(selectedClan),s=stats(rows),battle=currentData?.display_name||currentData?.battle||"Current Clan Battle",icon=selectedRow?.icon_url||rows.find(r=>r.icon_url)?.icon_url||DEFAULT_ICON;document.documentElement.style.setProperty("--link",color(selectedClan));app.innerHTML=`<section class="profile-header"><img class="clan-icon" src="${esc(icon)}" onerror="this.onerror=null;this.src='${DEFAULT_ICON}'" alt=""><div><h1 class="profile-name">${esc(displayName(selectedClan))}</h1><div class="meta">Current Battle: ${esc(battle)}<br>${selectedRow?`Top 200 clan profile · Rank ${rank(selectedRow.rank)}`:"Clan not currently in top 200"}<br>Loaded data pulls: ${fmt(pullCount())}</div></div></section><section class="cards"><div class="card"><div class="label">Current Rank</div><div class="value">${rank(selectedRow?.rank)}</div></div><div class="card"><div class="label">Projected Rank</div><div class="value">${rank(selectedRow?.projected_rank)}</div></div><div class="card"><div class="label">Current Points</div><div class="value">${fmt(selectedRow?.points??selectedRow?.total_points)}</div></div><div class="card"><div class="label">Latest Seen</div><div class="value">${dt(currentData?.snapshot_at||currentData?.generated_at)}</div></div></section><article class="battle-card"><div class="battle-head"><h2 class="battle-title">${esc(battle)}</h2><div class="dates">${date(currentData?.battle_start_iso||s.start)} → ${date(currentData?.battle_end_iso||s.end)}</div></div><div class="stats"><div class="stat-row"><div class="label">Starting Rank</div><div class="stat-value">${rank(s.firstRank)}</div></div><div class="stat-row"><div class="label">Worst Rank</div><div class="stat-value">${rank(s.worst)}</div></div><div class="stat-row"><div class="label">Best Rank</div><div class="stat-value">${rank(s.best)}</div></div><div class="stat-row"><div class="label">End Rank</div><div class="stat-value">${rank(s.endRank)}</div></div><div class="stat-row"><div class="label">Ending Points</div><div class="stat-value">${fmt(s.endPoints)}</div></div><div class="stat-row"><div class="label">Data Pulls Shown</div><div class="stat-value">${fmt(s.pulls)}</div></div></div><div class="chart-wrap"><div class="chart-title">Progression</div><div class="controls"><label style="color:${color(selectedClan)}"><input id="points" type="checkbox" ${showPoints?"checked":""}> Points</label><label style="color:var(--rank)"><input id="rank" type="checkbox" ${showRank?"checked":""}> Rank</label></div><canvas class="chart" id="chart"></canvas><div class="tip" id="tip"></div></div></article>`;document.getElementById("points").onchange=e=>{if(!e.target.checked&&!showRank)e.target.checked=true;showPoints=e.target.checked;draw()};document.getElementById("rank").onchange=e=>{if(!e.target.checked&&!showPoints)e.target.checked=true;showRank=e.target.checked;draw()};requestAnimationFrame(draw)}
function y(v,min,max,top,h,type){if(max===min)return top+h/2;const p=(v-min)/(max-min);return type==="rank"?top+p*h:top+(1-p)*h}
function line(ctx,rows,x,yy,c){if(!rows.length)return;ctx.save();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();rows.forEach((r,i)=>i?ctx.lineTo(x(r),yy(r)):ctx.moveTo(x(r),yy(r)));ctx.stroke();ctx.restore()}
function draw(){const c=document.getElementById("chart"),tip=document.getElementById("tip");if(!c)return;const ctx=c.getContext("2d"),rect=c.getBoundingClientRect(),dpr=devicePixelRatio||1,rows=seriesFor(selectedClan),pr=showPoints?rows.filter(r=>r.points!==null):[],rr=showRank?rows.filter(r=>r.rank!==null):[],vis=[...pr,...rr];c.width=Math.floor(rect.width*dpr);c.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,rect.width,rect.height);if(vis.length<2){ctx.fillStyle="#8b949e";ctx.font="13px Arial";ctx.fillText("Not enough points to chart.",16,28);return}const pl=58,prg=18,pt=18,pb=34,w=rect.width-pl-prg,h=rect.height-pt-pb,minT=Math.min(...vis.map(r=>new Date(r.t))),maxT=Math.max(...vis.map(r=>new Date(r.t))),pv=pr.map(r=>r.points),rv=rr.map(r=>r.rank),minP=pv.length?Math.min(...pv):0,maxP=pv.length?Math.max(...pv):0,minR=rv.length?Math.min(...rv):0,maxR=rv.length?Math.max(...rv):0,x=r=>maxT===minT?pl:pl+((new Date(r.t)-minT)/(maxT-minT))*w,yp=r=>y(r.points,minP,maxP,pt,h,"points"),yr=r=>y(r.rank,minR,maxR,pt,h,"rank");ctx.strokeStyle="#30363d";ctx.font="12px Arial";ctx.fillStyle="#8b949e";const grid=pv.length?{min:minP,max:maxP,type:"points"}:{min:minR,max:maxR,type:"rank"};for(let i=0;i<=4;i++){const p=i/4,yy=pt+p*h,val=grid.type==="rank"?grid.min+p*(grid.max-grid.min):grid.max-p*(grid.max-grid.min);ctx.beginPath();ctx.moveTo(pl,yy);ctx.lineTo(rect.width-prg,yy);ctx.stroke();ctx.fillText(grid.type==="rank"?`#${Math.round(val)}`:short(val),8,yy+4)}line(ctx,pr,x,yp,color(selectedClan));line(ctx,rr,x,yr,"#f2cc60");chartCache={rows,x,yp,yr,pt,pb,rect};bindTip(c,tip)}
function bindTip(c,tip){if(c.dataset.bound)return;c.dataset.bound=1;c.onmouseleave=()=>tip.style.display="none";c.onmousemove=e=>{if(!chartCache)return;const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left;let near=chartCache.rows[0],dist=Math.abs(chartCache.x(near)-mx);for(const r of chartCache.rows){const d=Math.abs(chartCache.x(r)-mx);if(d<dist){near=r;dist=d}}draw();const fresh=chartCache,ctx=c.getContext("2d"),px=fresh.x(near),py=showPoints?fresh.yp(near):fresh.yr(near);ctx.fillStyle="#e6edf3";ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();tip.innerHTML=`<strong>${dt(near.t)}</strong><div>Points: ${fmt(near.points)}</div><div>Rank: ${rank(near.rank)}</div>`;tip.style.display="block";tip.style.left=Math.max(8,e.clientX-rect.left+14)+"px";tip.style.top=Math.max(8,e.clientY-rect.top+14)+"px"}}
async function loadData(){selectedClan=displayName(viewedClanName());const app=document.getElementById("app");try{currentData=await fetchJson(CLANS_API_CURRENT_URL);selectedRow=findClan(currentData.rows,selectedClan);if(!selectedRow){app.innerHTML=`<div class="box error">${esc(selectedClan)} is not currently in the top 200 clans list.</div>`;return}historyData=await loadHistory();document.title=`${displayName(selectedClan)} - Clan Profile`;render()}catch(e){console.error(e);app.innerHTML=`<div class="box error">Could not load clan profile. ${esc(e.message)}</div>`}}
window.addEventListener("resize",()=>{clearTimeout(window.__r);window.__r=setTimeout(draw,100)});loadData();
</script>
<script src="assets/clan-switcher.js"></script>
</body>
</html>
