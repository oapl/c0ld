<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Top 100 Leagues Tracker</title>
<style>
body{margin:0;background:#0d1117;color:#e6edf3;font-family:Arial,Helvetica,sans-serif}a{color:#ff9b96;text-decoration:none}header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 22px 10px;text-align:center}.site-logo{width:76px;border-radius:10px}.menu{margin-top:9px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.menu a{display:inline-block;padding:7px 12px;border:1px solid #30363d;border-radius:5px;background:#0f141b;color:#e6edf3;font-size:13px}.menu a.active{border-color:#ff9b96;color:#ff9b96;background:rgba(248,81,73,.12)}main{max-width:1360px;margin:0 auto;padding:22px 24px 28px}.hero,.section,.card{background:#161b22;border:1px solid #30363d;border-radius:10px}.hero{padding:18px;margin-bottom:18px}.hero h1{margin:0;font-size:26px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:18px}.card{padding:16px;text-align:center;min-height:92px;display:flex;flex-direction:column;justify-content:center}.label{color:#8b949e;font-size:13px}.value{font-size:20px;font-weight:700;margin-top:6px}.section{overflow:hidden}.section-header{padding:16px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.section-title{margin:0;font-size:18px}input,button{border:1px solid #30363d;border-radius:6px;background:#0f141b;color:#e6edf3;padding:9px 11px;font-size:14px}button{cursor:pointer}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1080px}th,td{padding:12px 14px;border-bottom:1px solid #30363d;white-space:nowrap;vertical-align:middle}th{color:#8b949e;font-size:13px;text-align:left;cursor:pointer}.numeric{text-align:right;font-variant-numeric:tabular-nums}.rank{font-weight:700}.positive{color:#3fb950;font-weight:700}.negative{color:#f85149;font-weight:700}.zero,.unknown{color:#8b949e}.error{color:#ffb4ad;background:rgba(248,81,73,.12);padding:20px}.empty{padding:20px}.league-icon{width:36px;height:36px;border-radius:8px;background:#21262d;display:inline-flex;align-items:center;justify-content:center;margin-right:10px;vertical-align:middle;object-fit:cover}.namebox{display:inline-flex;align-items:center;gap:10px}.meta{color:#8b949e;font-size:12px;margin-top:2px}@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}}@media(max-width:650px){main{padding:16px}.cards{grid-template-columns:1fr}input,button{width:100%}}
</style>
</head>
<body>
<header><a href="index.html"><img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a><div class="menu"><a href="index.html">c0ld Leaderboard</a><a href="yamo.html">YAMO League</a><a class="active" href="top-leagues.html">Top 100 Leagues</a><a href="clans.html">Clans Leaderboard</a><a href="live-clan.html">Clan Lookup</a><a href="servers.html">Servers</a><a href="macros.html">Macros</a></div></header>
<main>
<section class="hero"><h1>Top 100 Leagues Tracker</h1></section>
<section class="cards"><div class="card"><div class="label">Tracked Leagues</div><div class="value" id="tracked-count">—</div></div><div class="card"><div class="label">Last DB Update</div><div class="value" id="last-db-update">—</div></div><div class="card"></div><div class="card"></div></section>
<section class="section"><div class="section-header"><h2 class="section-title">Top 100 League Race</h2><div><input id="search-input" placeholder="Search leagues..."><button id="refresh-btn">Refresh</button></div></div><div class="table-wrap"><table><thead><tr><th data-sort="rank">Rank</th><th data-sort="league_name">League</th><th data-sort="total_points" class="numeric">Total Points</th><th data-sort="gain_5m" class="numeric">5 Minutes</th><th data-sort="gain_1h" class="numeric">1 Hour</th><th data-sort="gain_6h" class="numeric">6 Hours</th><th data-sort="gain_12h" class="numeric">12 Hours</th><th data-sort="gain_24h" class="numeric">Daily</th><th data-sort="projected_points_1h" class="numeric">Projected +1h</th><th data-sort="projected_rank_1h" class="numeric">Projected Rank</th></tr></thead><tbody id="top-tbody"><tr><td colspan="10" class="empty">Loading Top 100 leagues...</td></tr></tbody></table></div></section>
</main>
<script>
const API="https://yamo-league-api-worker.opal-dde.workers.dev";
let rows=[],sortKey="rank",sortAsc=true,loading=false;
function esc(v){return String(v??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function shortNum(v){const n=Number(v);if(!Number.isFinite(n))return"—";const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2).replace(/\.00$/,"")+"T";if(a>=1e9)return(n/1e9).toFixed(2).replace(/\.00$/,"")+"B";if(a>=1e6)return(n/1e6).toFixed(2).replace(/\.00$/,"")+"M";if(a>=1e3)return(n/1e3).toFixed(2).replace(/\.00$/,"")+"K";return n.toLocaleString("en-US")}
function fullNum(v){const n=Number(v);return Number.isFinite(n)?n.toLocaleString("en-US"):"—"}
function dt(v){const d=new Date(v||0);return Number.isNaN(d.getTime())?"—":d.toLocaleString()}
function delta(v){if(v===null||v===undefined)return'<span class="unknown">—</span>';const n=Number(v);if(!Number.isFinite(n))return'<span class="unknown">—</span>';if(n>0)return'<span class="positive">+'+shortNum(n)+'</span>';if(n<0)return'<span class="negative">'+shortNum(n)+'</span>';return'<span class="zero">0</span>'}
function initials(s){s=String(s||"?").trim();return s.slice(0,2).toUpperCase()}
function iconUrl(icon){const t=String(icon||"").trim();if(!t)return"";if(/^https?:\/\//i.test(t)||t.startsWith("data:"))return t;const m=t.match(/rbxassetid:\/\/(\d+)/i);if(m)return"https://ps99.biggamesapi.io/image/"+encodeURIComponent(m[1]);if(/^\d+$/.test(t))return"https://ps99.biggamesapi.io/image/"+encodeURIComponent(t);return""}
function leagueIcon(r){const url=iconUrl(r.league_icon);return url?'<img class="league-icon" src="'+esc(url)+'" alt="">':'<span class="league-icon">'+esc(initials(r.league_name))+'</span>'}
function compare(a,b,k,asc){const an=Number(a[k]),bn=Number(b[k]);let r=Number.isFinite(an)&&Number.isFinite(bn)?an-bn:String(a[k]||"").localeCompare(String(b[k]||""));return asc?r:-r}
function visible(){const q=document.getElementById("search-input").value.trim().toLowerCase();let list=rows.slice();if(q)list=list.filter(r=>String(r.league_name||"").toLowerCase().includes(q)||String(r.league_id||"").toLowerCase().includes(q));list.sort((a,b)=>compare(a,b,sortKey,sortAsc));return list}
function projectedRank(r){const pr=Number(r.projected_rank_1h),rank=Number(r.rank);if(!Number.isFinite(pr))return'<span class="unknown">—</span>';const move=rank-pr;if(move>0)return'<span class="positive">#'+pr+' ↑'+move+'</span>';if(move<0)return'<span class="negative">#'+pr+' ↓'+Math.abs(move)+'</span>';return'<span class="zero">#'+pr+'</span>'}
function renderCards(data){const list=data.rows||[];document.getElementById("tracked-count").textContent=list.length||"—";document.getElementById("last-db-update").textContent=data.snapshot_at?dt(data.snapshot_at):"—"}
function render(){const tbody=document.getElementById("top-tbody"),list=visible();if(!list.length){tbody.innerHTML='<tr><td colspan="10" class="empty">No Top 100 league rows yet.</td></tr>';return}tbody.innerHTML=list.map(r=>'<tr><td class="rank">#'+esc(r.rank)+'</td><td><div class="namebox">'+leagueIcon(r)+'<span><span>'+esc(r.league_name||"—")+'</span><div class="meta">'+esc(r.league_id||"no league id")+'</div></span></div></td><td class="numeric" title="'+esc(fullNum(r.total_points))+'">'+esc(shortNum(r.total_points))+'</td><td class="numeric">'+delta(r.gain_5m)+'</td><td class="numeric">'+delta(r.gain_1h)+'</td><td class="numeric">'+delta(r.gain_6h)+'</td><td class="numeric">'+delta(r.gain_12h)+'</td><td class="numeric">'+delta(r.gain_24h)+'</td><td class="numeric" title="'+esc(fullNum(r.projected_points_1h))+'">'+esc(shortNum(r.projected_points_1h))+'</td><td class="numeric">'+projectedRank(r)+'</td></tr>').join("")}
function showError(msg){document.getElementById("top-tbody").innerHTML='<tr><td colspan="10" class="error">'+esc(msg)+'</td></tr>'}
async function loadData(){if(loading)return;loading=true;try{const u=new URL(API+"/api/leagues/top-leagues");u.searchParams.set("limit","100");u.searchParams.set("v",Date.now());const r=await fetch(u,{cache:"no-store"});const data=await r.json();if(!r.ok||data.ok===false)throw new Error(data.message||"HTTP "+r.status);rows=data.rows||[];renderCards(data);render()}catch(e){console.error(e);showError(e.message||String(e))}finally{loading=false}}
document.getElementById("refresh-btn").addEventListener("click",loadData);document.getElementById("search-input").addEventListener("input",render);document.querySelectorAll("th[data-sort]").forEach(th=>th.addEventListener("click",()=>{const k=th.dataset.sort;if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=k==="rank"||k==="league_name"||k==="projected_rank_1h"}render()}));loadData();setInterval(loadData,60000);
</script>
</body>
</html>
