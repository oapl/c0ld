<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clans Leaderboard</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0f141b;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #ff9b96;
      --hover: #1f2630;
      --accent: #ff9b96;
      --c0ld-bg: rgba(248, 81, 73, 0.14);
      --c0ld-border: rgba(248, 81, 73, 0.52);
      --c0ld-text: #ff9b96;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .site-logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .site-logo {
      display: block;
      width: 76px;
      height: auto;
      border-radius: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .menu-bar {
      max-width: 1280px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .menu-btn:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .menu-btn.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(248, 81, 73, 0.12);
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 24px 28px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .section-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    select,
    input,
    button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 11px;
      font-size: 14px;
      outline: none;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    input {
      min-width: 230px;
    }

    button {
      cursor: pointer;
    }

    button:hover,
    select:hover,
    input:focus {
      border-color: var(--link);
      background: var(--hover);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      text-align: left;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .rank,
    .projected {
      font-weight: 700;
    }

    .numeric,
    .projected {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .clan-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
    }

    .clan-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .c0ld-row {
      background: var(--c0ld-bg);
    }

    .c0ld-row:hover {
      background: rgba(248, 81, 73, 0.2);
    }

    .c0ld-row td {
      border-top: 1px solid var(--c0ld-border);
      border-bottom: 1px solid var(--c0ld-border);
    }

    .c0ld-row td.rank,
    .c0ld-row td.projected,
    .c0ld-row .clan-name {
      color: var(--c0ld-text);
      font-weight: 700;
    }

    .empty-state,
    .error-state {
      padding: 20px 18px;
    }

    .empty-state {
      color: var(--muted);
    }

    .error-state {
      color: #ffb4ad;
      background: var(--danger-bg);
    }

    @media (max-width: 1050px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 16px 10px;
      }

      main {
        padding: 16px;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .controls {
        width: 100%;
      }

      .controls select,
      .controls input,
      .controls button {
        width: 100%;
        min-width: 0;
      }

      .menu-bar {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="site-logo-link" href="index.html" aria-label="c0ld home">
        <img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld">
      </a>
    </div>

    <div class="menu-bar">
      <a class="menu-btn" href="index.html">c0ld Leaderboard</a>
<!--      <a class="menu-btn" href="wmsy.html">WMSY Leaderboard</a> -->
      <a class="menu-btn active" href="clans.html">Clans Leaderboard</a>
      <a class="menu-btn" href="clan-filter.html">Clan Filter</a>
      <a class="menu-btn" href="live-clan.html">Clan Lookup</a>
      <a class="menu-btn" href="servers.html">Servers</a>
      <a class="menu-btn" href="macros.html">Macros</a>
    </div>
  </header>

  <main>
    <section class="cards">
      <div class="card">
        <div class="label" id="battle-countdown-label">Current Battle Ends in:</div>
        <div class="value" id="battle-countdown">—</div>
      </div>

      <div class="card">
        <div class="label">Last DB Update</div>
        <div class="value" id="last-db-update">—</div>
      </div>

      <div class="card">
        <div class="label">c0ld Current Rank</div>
        <div class="value" id="c0ld-current-rank">—</div>
      </div>

      <div class="card">
        <div class="label">Projected Rank</div>
        <div class="value" id="c0ld-projected-rank">—</div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Clans Leaderboard</h2>

        <div class="controls">
          <select id="battle-select">
            <option value="current">Current Clan Battle</option>
          </select>
          <input id="search-input" type="text" placeholder="Search clans..." />
          <button id="refresh-btn" type="button">Refresh</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Clan</th>
              <th class="numeric">Total Points</th>
              <th class="numeric">5 Minutes</th>
              <th class="numeric">1 Hour</th>
              <th class="numeric">12 Hours</th>
              <th class="numeric">24 Hours</th>
              <th class="projected">Projected Rank</th>
            </tr>
          </thead>
          <tbody id="clans-tbody">
            <tr>
              <td colspan="8" class="empty-state">Loading clans leaderboard...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const TARGET_CLAN = "c0ld";
    const TARGET_CLAN_ICON_ID = "126265328107529";
    const AUTO_REFRESH_MS = 60 * 1000;
    const CLANS_API_CURRENT_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/clans/current";
    const CLANS_API_BATTLES_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/clans/battles?scan_limit=20000";

    const DEFAULT_CLAN_ICON =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
          <rect width="64" height="64" rx="12" fill="#21262d"/>
          <path d="M20 44V24l12-6 12 6v20l-12 6-12-6z" fill="#6e7681"/>
        </svg>
      `);

    let currentData = null;
    let historyData = [];
    let liveBattleRows = new Map();
    let selectedBattle = "current";
    let countdownTimer = null;
    let autoRefreshTimer = null;

    function htmlEscape(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function cleanClanName(name) {
      return String(name ?? "")
        .replace(/★/g, "")
        .trim();
    }

    function normalizeKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function prettifyBattleName(value) {
      return String(value || "")
        .trim()
        .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
        .replace(/(\D)(20\d{2})$/i, "$1 $2")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isLegacyNongBattle(item) {
      const keys = [
        item?.battle,
        item?.battle_key,
        item?.api_battle_key,
        item?.display_name,
        item?.battle_display_name,
        item?.source_table,
        item?.c0ld_results_table,
        item?.clan_results_table
      ].map(normalizeKey);

      const isApiSource = String(item?.source || "").toLowerCase() === "api";
      const isAlwaysLegacy = keys.some(key =>
        key === "safetybattle" ||
        key === "poisonbattle" ||
        key === "poisonturtlebattle" ||
        key === "abstractbattle" ||
        key === "abstractc0ld" ||
        key === "spring2026"
      );
      const isStaticOnlyLegacy = !isApiSource && keys.some(key =>
        key === "angelbattle2026" ||
        key === "angelbattle2026c0ld" ||
        key === "angelbattle2026clans" ||
        key === "starrybattle" ||
        key === "starryc0ld" ||
        key === "starryclans"
      );

      return isAlwaysLegacy || isStaticOnlyLegacy;
    }

    function battleDisplayName(item) {
      const key = battleKeyOf(item);
      const raw = String(item?.display_name || item?.battle_display_name || "").trim();
      const pretty = prettifyBattleName(key);

      if (key && raw && normalizeKey(raw).includes("backrooms") && !normalizeKey(key).includes("backrooms")) {
        return pretty || key;
      }

      return raw || pretty || key;
    }

    function getIconId(row) {
      const direct = String(row?.icon_id || "").trim();
      if (direct) return direct;

      const match = String(row?.icon_url || "").match(/\/image\/([^/?#]+)/i);
      return match ? decodeURIComponent(match[1]) : "";
    }

    function isTargetClan(rowOrName) {
      const row = rowOrName && typeof rowOrName === "object" ? rowOrName : null;
      const name = row ? row.clan_name : rowOrName;

      if (normalizeKey(cleanClanName(name)) !== normalizeKey(TARGET_CLAN)) {
        return false;
      }

      const iconId = row ? getIconId(row) : "";
      return !iconId || iconId === TARGET_CLAN_ICON_ID;
    }

    function fmtShortNumber(value) {
      if (value === null || value === undefined || value === "") return "—";

      const n = Number(value);
      if (Number.isNaN(n)) return htmlEscape(value);

      const abs = Math.abs(n);

      if (abs >= 1e12) return (n / 1e12).toFixed(2).replace(/\.00$/, "") + "T";
      if (abs >= 1e9) return (n / 1e9).toFixed(2).replace(/\.00$/, "") + "B";
      if (abs >= 1e6) return (n / 1e6).toFixed(2).replace(/\.00$/, "") + "M";
      if (abs >= 1e3) return (n / 1e3).toFixed(2).replace(/\.00$/, "") + "K";

      return n.toLocaleString("en-US");
    }

    function fmtRank(value) {
      if (value === null || value === undefined || value === "") return "—";

      const n = Number(value);
      if (Number.isNaN(n)) return htmlEscape(value);

      return "#" + n.toLocaleString("en-US");
    }

    function fmtDateTime(value) {
      if (!value) return "—";

      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "—";

      return d.toLocaleString(undefined, {
        year: "2-digit",
        month: "numeric",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function fmtCountdown(ms) {
      if (ms <= 0) return "Ended";

      const totalSeconds = Math.floor(ms / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    function parseDateValue(v) {
      const t = new Date(v).getTime();
      return Number.isNaN(t) ? null : t;
    }

    function startCountdown(endValue) {
      const el = document.getElementById("battle-countdown");

      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }

      if (!endValue) {
        el.textContent = "—";
        return;
      }

      const end = new Date(endValue);
      if (Number.isNaN(end.getTime())) {
        el.textContent = "—";
        return;
      }

      function tick() {
        el.textContent = fmtCountdown(end.getTime() - Date.now());
      }

      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    function getUrlBattle() {
      const params = new URLSearchParams(window.location.search);
      return params.get("battle") || "current";
    }

    function updateUrlBattle(value) {
      const url = new URL(window.location.href);

      if (value === "current") {
        url.searchParams.delete("battle");
      } else {
        url.searchParams.set("battle", value);
      }

      history.replaceState({}, "", url.toString());
    }

    function sortBattlesNewestFirst(list) {
      return list.slice().sort((a, b) => {
        const au = Number(a.update_number);
        const bu = Number(b.update_number);

        if (Number.isFinite(au) && Number.isFinite(bu) && au !== bu) {
          return bu - au;
        }

        if (Number.isFinite(au) && !Number.isFinite(bu)) return -1;
        if (!Number.isFinite(au) && Number.isFinite(bu)) return 1;

        const ad =
          parseDateValue(a.last_snapshot) ||
          parseDateValue(a.snapshot_at) ||
          parseDateValue(a.generated_at) ||
          0;

        const bd =
          parseDateValue(b.last_snapshot) ||
          parseDateValue(b.snapshot_at) ||
          parseDateValue(b.generated_at) ||
          0;

        if (ad !== bd) return bd - ad;

        return String(a.display_name || a.battle || "").localeCompare(
          String(b.display_name || b.battle || "")
        );
      });
    }

    function battleKeyOf(item) {
      return String(item?.battle || item?.battle_key || item?.api_battle_key || "").trim();
    }

    function isApiBattle(item) {
      return String(item?.source || "").toLowerCase() === "api";
    }

    function mergeBattleLists(...lists) {
      const merged = new Map();

      for (const list of lists) {
        for (const item of Array.isArray(list) ? list : []) {
          if (isLegacyNongBattle(item)) continue;

          const key = battleKeyOf(item);
          const normalized = normalizeKey(key);
          if (!normalized) continue;

          const existing = merged.get(normalized);

          if (!existing) {
            merged.set(normalized, {
              ...item,
              battle: key,
              display_name: battleDisplayName(item) || key,
              first_snapshot: item.first_snapshot || item.battle_start_iso || null,
              last_snapshot: item.last_snapshot || item.latest_snapshot_at || item.snapshot_at || null,
              source: isApiBattle(item) ? "api" : "static",
              has_static_rows: Array.isArray(item.rows)
            });
            continue;
          }

          const itemIsApi = isApiBattle(item);
          const existingIsApi = isApiBattle(existing);
          const primary = existingIsApi && !itemIsApi ? existing : item;
          const fallback = primary === item ? existing : item;

          merged.set(normalized, {
            ...fallback,
            ...primary,
            battle: battleKeyOf(primary) || battleKeyOf(fallback) || key,
            display_name: battleDisplayName(primary) || battleDisplayName(fallback) || key,
            first_snapshot: primary.first_snapshot || fallback.first_snapshot || primary.battle_start_iso || fallback.battle_start_iso || null,
            last_snapshot: primary.last_snapshot || fallback.last_snapshot || primary.latest_snapshot_at || primary.snapshot_at || fallback.latest_snapshot_at || fallback.snapshot_at || null,
            source: existingIsApi || itemIsApi ? "api" : "static",
            has_static_rows: existing.has_static_rows || Array.isArray(item.rows)
          });
        }
      }

      return [...merged.values()];
    }

    function getClanIconUrl(row) {
      return row.icon_url || DEFAULT_CLAN_ICON;
    }

    function buildClanIconImg(row) {
      const url = getClanIconUrl(row);

      return `<img class="clan-icon" src="${htmlEscape(url)}" alt="" loading="lazy"
        onerror="this.onerror=null;this.src='${DEFAULT_CLAN_ICON}';">`;
    }

    function getCurrentRows() {
      if (!currentData || !Array.isArray(currentData.rows)) return [];

      return currentData.rows.map(row => ({
        rank: row.rank,
        clan_name: cleanClanName(row.clan_name || row.clan || row.name || row.tag),
        points: row.points ?? row.total_points,
        gain_5m: row.gain_5m,
        gain_1h: row.gain_1h,
        gain_12h: row.gain_12h,
        gain_24h: row.gain_24h,
        projected_rank: row.projected_rank,
        projected_points: row.projected_points,
        projection_basis: row.projection_basis,
        icon_id: row.icon_id || null,
        icon_url: row.icon_url || null
      }));
    }

    function getHistoryBattle() {
      return historyData.find(item => normalizeKey(item.battle) === normalizeKey(selectedBattle)) || null;
    }

    function getHistoryRows() {
      const battle = getHistoryBattle();
      const liveRows = liveBattleRows.get(normalizeKey(selectedBattle));

      if (battle?.source === "api" && Array.isArray(liveRows)) {
        return liveRows.map(row => ({
          rank: row.rank,
          clan_name: cleanClanName(row.clan_name || row.clan || row.name || row.tag),
          points: row.points ?? row.total_points,
          gain_5m: row.gain_5m ?? null,
          gain_1h: row.gain_1h ?? null,
          gain_12h: row.gain_12h ?? null,
          gain_24h: row.gain_24h ?? null,
          projected_rank: row.projected_rank ?? null,
          projected_points: row.projected_points ?? null,
          projection_basis: row.projection_basis ?? null,
          icon_id: row.icon_id || null,
          icon_url: row.icon_url || null
        }));
      }

      if (battle && Array.isArray(battle.rows)) {
        return battle.rows.map(row => ({
          rank: row.rank,
          clan_name: cleanClanName(row.clan_name || row.clan || row.name || row.tag),
          points: row.points ?? row.total_points,
          gain_5m: row.gain_5m ?? null,
          gain_1h: row.gain_1h ?? null,
          gain_12h: row.gain_12h ?? null,
          gain_24h: row.gain_24h ?? null,
          projected_rank: row.projected_rank ?? null,
          projected_points: row.projected_points ?? null,
          projection_basis: row.projection_basis ?? null,
          icon_id: row.icon_id || null,
          icon_url: row.icon_url || null
        }));
      }

      if (!Array.isArray(liveRows)) return [];

      return liveRows.map(row => ({
        rank: row.rank,
        clan_name: cleanClanName(row.clan_name || row.clan || row.name || row.tag),
        points: row.points ?? row.total_points,
        gain_5m: row.gain_5m ?? null,
        gain_1h: row.gain_1h ?? null,
        gain_12h: row.gain_12h ?? null,
        gain_24h: row.gain_24h ?? null,
        projected_rank: row.projected_rank ?? null,
        projected_points: row.projected_points ?? null,
        projection_basis: row.projection_basis ?? null,
        icon_id: row.icon_id || null,
        icon_url: row.icon_url || null
      }));
    }

    function getRows() {
      return selectedBattle === "current" ? getCurrentRows() : getHistoryRows();
    }

    function toFiniteNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function chooseProjectionRate(row) {
      const windows = [
        { key: "gain_1h", basis: "1h", hours: 1 },
        { key: "gain_12h", basis: "12h", hours: 12 },
        { key: "gain_24h", basis: "24h", hours: 24 },
        { key: "gain_5m", basis: "5m", hours: 5 / 60 }
      ];

      for (const window of windows) {
        const gain = toFiniteNumber(row[window.key]);
        if (gain === null) continue;

        return {
          basis: window.basis,
          rate_per_hour: gain / window.hours
        };
      }

      return {
        basis: "none",
        rate_per_hour: 0
      };
    }

    function withProjectedRanks(data) {
      if (!data || !Array.isArray(data.rows)) return data;

      const battleEndMs = new Date(data.battle_end_iso || "").getTime();
      if (!Number.isFinite(battleEndMs)) return data;

      const remainingHours = Math.max(0, (battleEndMs - Date.now()) / (60 * 60 * 1000));
      const rows = data.rows.map(row => {
        const rate = chooseProjectionRate(row);
        const points = toFiniteNumber(row.points ?? row.total_points) || 0;

        return {
          ...row,
          projection_basis: row.projection_basis || rate.basis,
          rate_per_hour: row.rate_per_hour ?? rate.rate_per_hour,
          projected_points: row.projected_points ?? Math.round(points + rate.rate_per_hour * remainingHours)
        };
      });

      const projected = rows.slice().sort((a, b) => {
        const ap = toFiniteNumber(a.projected_points) ?? toFiniteNumber(a.points) ?? 0;
        const bp = toFiniteNumber(b.projected_points) ?? toFiniteNumber(b.points) ?? 0;
        if (bp !== ap) return bp - ap;

        const ar = toFiniteNumber(a.rank);
        const br = toFiniteNumber(b.rank);
        if (ar !== null && br !== null && ar !== br) return ar - br;

        return String(a.clan_name || "").localeCompare(String(b.clan_name || ""));
      });

      const rankByClan = new Map();
      projected.forEach((row, index) => {
        rankByClan.set(`${normalizeKey(row.clan_name)}:${getIconId(row)}`, index + 1);
      });

      const rowsWithRanks = rows.map(row => ({
        ...row,
        projected_rank: row.projected_rank ?? rankByClan.get(`${normalizeKey(row.clan_name)}:${getIconId(row)}`) ?? null
      }));

      const tracked = rowsWithRanks.find(row => isTargetClan(row)) || null;

      return {
        ...data,
        rows: rowsWithRanks,
        clan_rank: tracked?.rank ?? data.clan_rank,
        clan_points: tracked?.points ?? data.clan_points,
        projected_rank: tracked?.projected_rank ?? data.projected_rank,
        projected_points: tracked?.projected_points ?? data.projected_points,
        projection_basis: tracked?.projection_basis ?? data.projection_basis
      };
    }

    function renderCards() {
      const currentRows = getCurrentRows();
      const currentC0ld = currentRows.find(row => isTargetClan(row)) || null;
      const countdownLabel = document.getElementById("battle-countdown-label");

      if (countdownLabel) {
        countdownLabel.textContent = `${battleDisplayName(currentData) || "Current Clan Battle"} Ends in:`;
      }

      document.getElementById("c0ld-current-rank").textContent =
        fmtRank(currentC0ld?.rank ?? currentData?.clan_rank);

      document.getElementById("c0ld-projected-rank").textContent =
        fmtRank(currentC0ld?.projected_rank ?? currentData?.projected_rank);

      document.getElementById("last-db-update").textContent =
        fmtDateTime(currentData?.snapshot_at || currentData?.generated_at);

      startCountdown(currentData?.battle_end_iso);
    }

    function renderBattleOptions() {
      const select = document.getElementById("battle-select");

      const filteredHistory = sortBattlesNewestFirst(
        (historyData || []).filter(item =>
          item &&
          item.battle
        )
      );

      const options = [
        {
          value: "current",
          label: "Current Clan Battle"
        },
        ...filteredHistory.map(item => ({
          value: item.battle,
          label: battleDisplayName(item)
        }))
      ];

      const exists = options.some(
        option => normalizeKey(option.value) === normalizeKey(selectedBattle)
      );

      if (!exists) {
        selectedBattle = "current";
      }

      select.innerHTML = options.map(option => `
        <option value="${htmlEscape(option.value)}" ${
          normalizeKey(option.value) === normalizeKey(selectedBattle) ? "selected" : ""
        }>
          ${htmlEscape(option.label)}
        </option>
      `).join("");
    }

    function renderTable() {
      const tbody = document.getElementById("clans-tbody");
      const searchText = document.getElementById("search-input").value.trim().toLowerCase();

      let rows = getRows();

      if (searchText) {
        rows = rows.filter(row =>
          String(row.clan_name || "").toLowerCase().includes(searchText)
        );
      }

      rows.sort((a, b) => {
        const ar = Number(a.rank);
        const br = Number(b.rank);

        if (Number.isFinite(ar) && Number.isFinite(br) && ar !== br) {
          return ar - br;
        }

        return Number(b.points || 0) - Number(a.points || 0);
      });

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state">No clans found.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(row => {
        const isC0ld = isTargetClan(row);

        return `
          <tr class="${isC0ld ? "c0ld-row" : ""}">
            <td class="rank">${fmtRank(row.rank)}</td>
            <td class="clan">
              <div class="clan-cell">
                ${buildClanIconImg(row)}
                <span class="clan-name">${htmlEscape(row.clan_name)}</span>
              </div>
            </td>
            <td class="numeric">${fmtShortNumber(row.points)}</td>
            <td class="numeric">${fmtShortNumber(row.gain_5m)}</td>
            <td class="numeric">${fmtShortNumber(row.gain_1h)}</td>
            <td class="numeric">${fmtShortNumber(row.gain_12h)}</td>
            <td class="numeric">${fmtShortNumber(row.gain_24h)}</td>
            <td class="projected">${fmtRank(row.projected_rank)}</td>
          </tr>
        `;
      }).join("");
    }

    async function renderAll() {
      renderCards();
      renderBattleOptions();
      renderTable();
    }

    async function fetchJsonWithFallback(primaryUrl, fallbackUrl, label) {
      try {
        const primary = await fetch(`${primaryUrl}${primaryUrl.includes("?") ? "&" : "?"}v=${Date.now()}`, {
          cache: "no-store"
        });

        if (primary.ok) {
          return primary.json();
        }
      } catch {
      }

      const fallback = await fetch(fallbackUrl, { cache: "no-store" });
      if (!fallback.ok) {
        throw new Error(`Could not load ${label}. HTTP ${fallback.status}`);
      }

      const data = await fallback.json();
      if (isLegacyNongBattle(data)) {
        throw new Error(`Refusing to display legacy NONG fallback data for ${label}.`);
      }

      return data;
    }

    async function fetchLiveJson(url, label) {
      const res = await fetch(`${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`, {
        cache: "no-store"
      });

      if (!res.ok) {
        throw new Error(`Could not load ${label}. HTTP ${res.status}`);
      }

      return res.json();
    }

    async function ensureLiveBattleRows(battle) {
      if (!battle || battle === "current") return;
      const key = normalizeKey(battle);
      if (liveBattleRows.has(key)) return;

      const historyBattle = getHistoryBattle();
      if (historyBattle?.source !== "api" && Array.isArray(historyBattle?.rows) && historyBattle.rows.length) return;

      const url = `${CLANS_API_CURRENT_URL}?battle=${encodeURIComponent(battle)}`;
      const data = withProjectedRanks(await fetchLiveJson(url, `${battle} clans leaderboard`));
      liveBattleRows.set(key, Array.isArray(data?.rows) ? data.rows : []);
    }

    async function loadData() {
      const tbody = document.getElementById("clans-tbody");

      try {
        const cacheBust = Date.now();

        const [currentJson, liveBattlesJson, historyRes] = await Promise.all([
          fetchJsonWithFallback(
            CLANS_API_CURRENT_URL,
            `Data/clans-current.json?v=${cacheBust}`,
            "live clans leaderboard"
          ),
          fetchLiveJson(CLANS_API_BATTLES_URL, "live clans battle list").catch(() => ({ rows: [] })),
          fetch(`Data/clans-history.json?v=${cacheBust}`, { cache: "no-store" })
        ]);

        currentData = withProjectedRanks(currentJson);

        if (!currentData || !Array.isArray(currentData.rows)) {
          throw new Error("Live clans leaderboard does not contain a rows array.");
        }

        if (historyRes.ok) {
          const staticHistory = await historyRes.json();
          historyData = mergeBattleLists(liveBattlesJson?.rows || [], Array.isArray(staticHistory) ? staticHistory : []);
        } else {
          historyData = mergeBattleLists(liveBattlesJson?.rows || []);
        }

        selectedBattle = getUrlBattle();
        await ensureLiveBattleRows(selectedBattle);
        await renderAll();
      } catch (error) {
        console.error(error);
        tbody.innerHTML = `<tr><td colspan="8" class="error-state">${htmlEscape(error.message)}</td></tr>`;
      }
    }

    function wireEvents() {
      document.getElementById("battle-select").addEventListener("change", async event => {
        selectedBattle = event.target.value;
        updateUrlBattle(selectedBattle);
        await ensureLiveBattleRows(selectedBattle);
        await renderAll();
      });

      document.getElementById("search-input").addEventListener("input", () => {
        renderTable();
      });

      document.getElementById("refresh-btn").addEventListener("click", () => {
        loadData();
      });
    }

    async function init() {
      selectedBattle = getUrlBattle();

      wireEvents();
      await loadData();

      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
      }

      autoRefreshTimer = setInterval(() => {
        loadData();
      }, AUTO_REFRESH_MS);
    }

    init();
  </script>
</body>
