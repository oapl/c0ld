<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>c0ld Activity Chart</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--panel2:#0d1117;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--link:#ff9b96;--hot:255,155,150;--good:#7ee787;--danger:#f85149}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}a{color:var(--link);text-decoration:none}header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 22px 10px;text-align:center}.logo{width:76px;border-radius:10px}.menu{margin-top:9px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.btn{display:inline-block;padding:7px 12px;border:1px solid var(--border);border-radius:5px;background:var(--panel2);color:var(--text);font-size:13px}.btn.active,.btn:hover{border-color:var(--link);color:var(--link);background:rgba(248,81,73,.12)}main{max-width:1800px;margin:0 auto;padding:22px 24px}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}h1{margin:0 0 6px;font-size:24px}.sub{color:var(--muted);font-size:13px}.tools{display:flex;gap:10px;flex-wrap:wrap}select,input,button{border:1px solid var(--border);border-radius:6px;background:var(--panel2);color:var(--text);padding:9px 11px;font-size:14px}input{min-width:230px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:13px}.label{color:var(--muted);font-size:12px;margin-bottom:6px}.value{font-weight:bold;font-size:18px}.status{display:none;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;color:var(--muted)}.status.show{display:block}.status.err{border-color:var(--danger);color:#ffb4ad;background:rgba(248,81,73,.12)}.panel{border:1px solid var(--border);border-radius:10px;background:var(--panel);overflow:hidden}.panel-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.legend{color:var(--muted);font-size:12px}.wrap{overflow:auto;max-height:calc(100vh - 285px);min-height:520px;background:var(--panel2)}.grid{display:grid;min-width:max-content;font-size:12px}.cell{border-right:1px solid rgba(48,54,61,.7);border-bottom:1px solid rgba(48,54,61,.7);min-height:28px;display:flex;align-items:center;justify-content:flex-end;padding:4px 6px;white-space:nowrap;font-variant-numeric:tabular-nums}.head{position:sticky;top:0;z-index:5;background:#111720;color:var(--muted);font-weight:bold;justify-content:center;text-align:center;min-height:42px}.rank,.name,.total{position:sticky;background:#111720;z-index:4}.head.rank,.head.name,.head.total{z-index:7}.rank{left:0;width:64px;justify-content:center}.name{left:64px;width:230px;justify-content:flex-start;font-weight:bold;overflow:hidden;text-overflow:ellipsis}.total{left:294px;width:112px;color:var(--good)}.bucket{width:92px;color:#fff;text-shadow:0 1px 1px #000}.zero{color:var(--muted);text-shadow:none;justify-content:center}.empty{padding:36px;color:var(--muted);text-align:center}@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}input,select,button{width:100%;min-width:0}.tools{width:100%}}@media(max-width:560px){main{padding:16px}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<a href="index.html"><img class="logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a>
<div class="menu"><a class="btn" id="home" href="index.html">c0ld Leaderboard</a><a class="btn active" href="activity.html">Activity Chart</a><a class="btn" href="clans.html">Clans Leaderboard</a><a class="btn" href="live-clan.html">Clan Lookup</a><a class="btn" href="servers.html">Servers</a><a class="btn" href="macros.html">Macros</a></div>
</header>
<main>
<div class="top"><div><h1 id="title">c0ld Member Activity Chart</h1><div class="sub" id="sub">Loading current clan battle activity...</div></div><div class="tools"><select id="bucket"><option value="1">Hourly</option><option value="12">12 Hours</option><option value="24">Daily</option></select><select id="limit"><option value="all">All Members</option><option value="25">Top 25</option><option value="50">Top 50</option></select><input id="search" placeholder="Search members..."><button id="refresh">Refresh</button></div></div>
<div id="status" class="status show">Loading activity data...</div>
<section class="cards"><div class="card"><div class="label">Battle</div><div class="value" id="battle">—</div></div><div class="card"><div class="label">Time Range</div><div class="value" id="range">—</div></div><div class="card"><div class="label">Members Charted</div><div class="value" id="members">—</div></div><div class="card"><div class="label">Total Activity</div><div class="value" id="activity">—</div></div></section>
<section class="panel"><div class="panel-head"><b>Activity by Member</b><div class="legend" id="legend">Darker cells = higher gain</div></div><div class="wrap" id="wrap"><div class="empty">Loading chart...</div></div></section>
</main>
<script>
const CURRENT='https://c0ld-clan-api-worker.opal-dde.workers.dev/api/current';
const HISTORY='https://c0ld-clan-api-worker.opal-dde.workers.dev/api/history';
const RETENTION_HOURS=336;
let current=null,historyRows=[],members=[],buckets=[];
function clan(){return (new URLSearchParams(location.search).get('clan')||'c0ld').replace(/[^a-z0-9_-]/gi,'')||'c0ld'}
const CLAN=clan(), DISPLAY=CLAN.toLowerCase()==='c0ld'?'c0ld':CLAN.toUpperCase();
function q(url,p={}){const u=new URL(url,location.href);u.searchParams.set('clan',CLAN);for(const[k,v]of Object.entries(p))if(v!==undefined&&v!==null&&v!=='')u.searchParams.set(k,v);u.searchParams.set('v',Date.now());return u}
function page(path){const u=new URL(path,location.href);if(CLAN.toLowerCase()!=='c0ld')u.searchParams.set('clan',CLAN);return u.pathname.split('/').pop()+u.search}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function num(v){const n=Number(v);return Number.isFinite(n)?n:null}
function short(n){n=Number(n);if(!Number.isFinite(n))return '—';for(const t of [[1e12,'T'],[1e9,'B'],[1e6,'M'],[1e3,'K']])if(Math.abs(n)>=t[0])return (n/t[0]).toFixed(2).replace(/\.?0+$/,'')+t[1];return Math.round(n).toLocaleString()}
function dt(v){const d=new Date(v);return Number.isNaN(d.getTime())?'—':d.toLocaleString(undefined,{dateStyle:'short',timeStyle:'short'})}
function label(ms,h){const d=new Date(ms);return h>=24?d.toLocaleDateString(undefined,{month:'short',day:'numeric'}):d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric'})}
function status(t,err=false){const e=document.getElementById('status');e.textContent=t||'';e.className='status '+(t?'show ':'')+(err?'err':'')}
async function getJson(url,label){const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error('Could not load '+label+'. HTTP '+r.status);return r.json()}
function startMs(){const v=current?.battle_start_iso||current?.snapshot_at||current?.generated_at;const ms=new Date(v).getTime();return Number.isFinite(ms)?ms:Date.now()-86400000}
function endMs(){const ms=new Date(current?.battle_end_iso||'').getTime();return Number.isFinite(ms)?Math.min(ms,Date.now()):Date.now()}
function align(ms,h){const d=new Date(ms);if(h>=24)d.setHours(0,0,0,0);else d.setHours(Math.floor(d.getHours()/h)*h,0,0,0);return d.getTime()}
function makeBuckets(){const h=Number(document.getElementById('bucket').value)||1, step=h*3600000, out=[];let c=align(startMs(),h), end=Math.max(endMs(),startMs()+step);while(c<=end){out.push({key:String(c),start:c,end:c+step});c+=step}buckets=out}
function bucketKey(ms){for(const b of buckets)if(ms>=b.start&&ms<b.end)return b.key;return buckets.at(-1)?.key}
function build(){makeBuckets();const map=new Map(), series=new Map();for(const r of current?.rows||[]){const id=String(r.user_id||'');if(!id)continue;map.set(id,{id,name:r.username||id,rank:r.rank,total:num(r.total_points)||0,activity:0,b:new Map()})}for(const r of historyRows){const id=String(r.user_id||''), total=num(r.total_points), ms=new Date(r.fetched_at).getTime();if(!id||total===null||!Number.isFinite(ms))continue;if(!series.has(id))series.set(id,[]);series.get(id).push({ms,total,name:r.username,rank:r.rank});if(!map.has(id))map.set(id,{id,name:r.username||id,rank:r.rank,total,activity:0,b:new Map()})}for(const[id,arr]of series){arr.sort((a,b)=>a.ms-b.ms);const m=map.get(id);for(let i=1;i<arr.length;i++){const gain=Math.max(0,arr[i].total-arr[i-1].total);if(!gain)continue;const k=bucketKey(arr[i].ms);if(!k)continue;m.b.set(k,(m.b.get(k)||0)+gain);m.activity+=gain}}members=[...map.values()].sort((a,b)=>b.activity-a.activity||b.total-a.total||a.name.localeCompare(b.name))}
function filtered(){let q=document.getElementById('search').value.toLowerCase().trim(), out=members.slice();if(q)out=out.filter(m=>m.name.toLowerCase().includes(q)||m.id.includes(q));const lim=document.getElementById('limit').value;if(lim!=='all')out=out.slice(0,Number(lim));return out}
function render(){const rows=filtered(), wrap=document.getElementById('wrap');let total=rows.reduce((s,m)=>s+m.activity,0), max=0;for(const m of rows)for(const v of m.b.values())max=Math.max(max,v);document.getElementById('battle').textContent=current?.display_name||current?.battle||'Current';document.getElementById('range').textContent=dt(current?.battle_start_iso||startMs())+' → '+dt(current?.battle_end_iso||endMs());document.getElementById('members').textContent=rows.length.toLocaleString()+' / '+members.length.toLocaleString();document.getElementById('activity').textContent=short(total);document.getElementById('sub').textContent=`Showing ${DISPLAY} member point gains by ${document.getElementById('bucket').selectedOptions[0].text.toLowerCase()}.`;document.getElementById('legend').textContent=max?'Darker cells = higher gain. Max bucket: '+short(max):'Darker cells = higher gain';if(!rows.length){wrap.innerHTML='<div class="empty">No activity found.</div>';return}const cols=['64px','230px','112px',...buckets.map(_=>'92px')].join(' '), html=[];html.push(`<div class="grid" style="grid-template-columns:${cols}">`);html.push('<div class="cell head rank">Rank</div><div class="cell head name">Player</div><div class="cell head total">Total</div>');for(const b of buckets)html.push(`<div class="cell head bucket" title="${esc(dt(b.start))}">${esc(label(b.start,Number(document.getElementById('bucket').value)))}</div>`);rows.forEach((m,i)=>{html.push(`<div class="cell rank">#${esc(m.rank??i+1)}</div><div class="cell name" title="${esc(m.name)}">${esc(m.name)}</div><div class="cell total">${short(m.activity)}</div>`);for(const b of buckets){const v=m.b.get(b.key)||0,a=v?Math.max(.08,Math.min(.95,v/max)):.03;html.push(`<div class="cell bucket ${v?'':'zero'}" style="background:rgba(255,155,150,${a})" title="${esc(m.name+'\n'+dt(b.start)+' → '+dt(b.end)+'\nGain: '+short(v))}">${v?short(v):'—'}</div>`)}});html.push('</div>');wrap.innerHTML=html.join('')}
async function load(){try{status('Loading activity data...');document.title=DISPLAY+' Activity Chart';document.getElementById('title').textContent=DISPLAY+' Member Activity Chart';document.getElementById('home').href=page('index.html');current=await getJson(q(CURRENT),DISPLAY+' current');const hours=Math.min(RETENTION_HOURS,Math.max(1,Math.ceil((endMs()-startMs())/3600000)+2));const hist=await getJson(q(HISTORY,{battle:current?.battle||'current',hours,limit:50000}),DISPLAY+' history');historyRows=Array.isArray(hist.rows)?hist.rows:[];build();render();status('')}catch(e){console.error(e);status(e.message||String(e),true)}}
document.getElementById('bucket').onchange=()=>{build();render()};document.getElementById('limit').onchange=render;document.getElementById('search').oninput=render;document.getElementById('refresh').onclick=load;load();
</script>
</body>
</html>
