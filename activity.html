<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>c0ld Activity Chart</title>

<style>
:root{
  --bg:#0d1117;
  --panel:#161b22;
  --panel2:#0d1117;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --link:#ff9b96;
  --good:#7ee787;
  --danger:#f85149;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}

a{
  color:var(--link);
  text-decoration:none;
}

header{
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:12px 22px 10px;
  text-align:center;
}

.logo{
  width:76px;
  border-radius:10px;
}

.menu{
  margin-top:9px;
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  display:inline-block;
  padding:7px 12px;
  border:1px solid var(--border);
  border-radius:5px;
  background:var(--panel2);
  color:var(--text);
  font-size:13px;
}

.btn.active,
.btn:hover{
  border-color:var(--link);
  color:var(--link);
  background:rgba(248,81,73,.12);
}

main{
  max-width:1800px;
  margin:0 auto;
  padding:22px 24px;
}

.top{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:16px;
}

h1{
  margin:0 0 6px;
  font-size:24px;
}

.sub{
  color:var(--muted);
  font-size:13px;
}

.tools{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select,
input,
button{
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--panel2);
  color:var(--text);
  padding:9px 11px;
  font-size:14px;
}

input{
  min-width:230px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:13px;
}

.label{
  color:var(--muted);
  font-size:12px;
  margin-bottom:6px;
}

.value{
  font-weight:bold;
  font-size:18px;
}

.status{
  display:none;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
  margin-bottom:16px;
  color:var(--muted);
}

.status.show{
  display:block;
}

.status.err{
  border-color:var(--danger);
  color:#ffb4ad;
  background:rgba(248,81,73,.12);
}

.panel{
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--panel);
  overflow:hidden;
}

.panel-head{
  padding:13px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.legend{
  color:var(--muted);
  font-size:12px;
}

.wrap{
  overflow:auto;
  max-height:calc(100vh - 285px);
  min-height:520px;
  background:var(--panel2);
}

.grid{
  display:grid;
  min-width:max-content;
  font-size:12px;
}

.cell{
  border-right:1px solid rgba(48,54,61,.7);
  border-bottom:1px solid rgba(48,54,61,.7);
  min-height:28px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:4px 6px;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

.head{
  position:sticky;
  top:0;
  z-index:5;
  background:#111720;
  color:var(--muted);
  font-weight:bold;
  justify-content:center;
  text-align:center;
  min-height:42px;
}

.rank,
.name,
.total{
  position:sticky;
  background:#111720;
  z-index:4;
}

.head.rank,
.head.name,
.head.total{
  z-index:7;
}

.rank{
  left:0;
  width:64px;
  justify-content:center;
}

.name{
  left:64px;
  width:230px;
  justify-content:flex-start;
  font-weight:bold;
  overflow:hidden;
  text-overflow:ellipsis;
}

.total{
  left:294px;
  width:112px;
  color:var(--good);
}

.bucket{
  width:92px;
  color:#fff;
  text-shadow:0 1px 1px #000;
}

.zero{
  color:var(--muted);
  text-shadow:none;
  justify-content:center;
}

.empty{
  padding:36px;
  color:var(--muted);
  text-align:center;
}

@media(max-width:900px){
  .cards{
    grid-template-columns:repeat(2,1fr);
  }

  input,
  select,
  button{
    width:100%;
    min-width:0;
  }

  .tools{
    width:100%;
  }
}

@media(max-width:560px){
  main{
    padding:16px;
  }

  .cards{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<header>
  <a href="index.html">
    <img class="logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld">
  </a>

  <div class="menu">
    <a class="btn" id="home" href="index.html">c0ld Leaderboard</a>
    <a class="btn active" id="activity-link" href="activity.html">Activity Chart</a>
    <a class="btn" href="clans.html">Clans Leaderboard</a>
    <a class="btn" href="live-clan.html">Clan Lookup</a>
    <a class="btn" href="servers.html">Servers</a>
    <a class="btn" href="macros.html">Macros</a>
  </div>
</header>

<main>
  <div class="top">
    <div>
      <h1 id="title">c0ld Member Activity Chart</h1>
      <div class="sub" id="sub">Loading current clan battle activity...</div>
    </div>

    <div class="tools">
      <select id="bucket">
        <option value="1">Hourly</option>
        <option value="12">12 Hours</option>
        <option value="24">Daily</option>
      </select>

      <select id="limit">
        <option value="all">All Members</option>
        <option value="25">Top 25</option>
        <option value="50">Top 50</option>
      </select>

      <input id="search" placeholder="Search members...">
      <button id="refresh" type="button">Refresh</button>
    </div>
  </div>

  <div id="status" class="status show">Loading activity data...</div>

  <section class="cards">
    <div class="card">
      <div class="label">Battle</div>
      <div class="value" id="battle">—</div>
    </div>

    <div class="card">
      <div class="label">Time Range</div>
      <div class="value" id="range">—</div>
    </div>

    <div class="card">
      <div class="label">Members Charted</div>
      <div class="value" id="members">—</div>
    </div>

    <div class="card">
      <div class="label">Total Activity</div>
      <div class="value" id="activity">—</div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <b>Activity by Member</b>
      <div class="legend" id="legend">Darker cells = higher gain</div>
    </div>

    <div class="wrap" id="wrap">
      <div class="empty">Loading chart...</div>
    </div>
  </section>
</main>

<script>
const CURRENT_API = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/current";
const HISTORY_API = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/history";

const RETENTION_HOURS = 336;

// This is the important correction.
// June 13, 2026 at 10:00 AM New Mexico time.
// In June, New Mexico is MDT, UTC-06:00.
const CLAN_BATTLE_START_OVERRIDE_ISO = "2026-06-13T10:00:00-06:00";

// Optional safety: only apply this override to this known current battle.
// Leave blank to force the override regardless of battle key.
const CLAN_BATTLE_START_OVERRIDE_BATTLE = "AngelBattle2026";

let current = null;
let historyRows = [];
let members = [];
let buckets = [];

function getClan() {
  return (new URLSearchParams(location.search).get("clan") || "c0ld")
    .replace(/[^a-z0-9_-]/gi, "") || "c0ld";
}

const CLAN = getClan();
const DISPLAY = CLAN.toLowerCase() === "c0ld" ? "c0ld" : CLAN.toUpperCase();

function withQuery(url, params = {}) {
  const out = new URL(url, location.href);
  out.searchParams.set("clan", CLAN);

  for (const [key, value] of Object.entries(params)) {
    if (value !== undefined && value !== null && value !== "") {
      out.searchParams.set(key, String(value));
    }
  }

  out.searchParams.set("v", String(Date.now()));
  return out.toString();
}

function pageUrl(path) {
  const out = new URL(path, location.href);

  if (CLAN.toLowerCase() !== "c0ld") {
    out.searchParams.set("clan", CLAN);
  }

  return out.pathname.split("/").pop() + out.search;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function toNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function shortNum(value) {
  const n = Number(value);

  if (!Number.isFinite(n)) {
    return "—";
  }

  const tiers = [
    [1e12, "T"],
    [1e9, "B"],
    [1e6, "M"],
    [1e3, "K"]
  ];

  for (const [amount, suffix] of tiers) {
    if (Math.abs(n) >= amount) {
      return (n / amount).toFixed(2).replace(/\.?0+$/, "") + suffix;
    }
  }

  return Math.round(n).toLocaleString("en-US");
}

function fullNum(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n.toLocaleString("en-US") : "—";
}

function fmtDateTime(value) {
  const d = new Date(value);

  if (Number.isNaN(d.getTime())) {
    return "—";
  }

  return d.toLocaleString(undefined, {
    dateStyle: "short",
    timeStyle: "short",
    timeZone: "America/Denver"
  });
}

function fmtBucketLabel(ms, hours) {
  const d = new Date(ms);

  if (hours >= 24) {
    return d.toLocaleDateString(undefined, {
      month: "short",
      day: "numeric",
      timeZone: "America/Denver"
    });
  }

  return d.toLocaleString(undefined, {
    month: "short",
    day: "numeric",
    hour: "numeric",
    timeZone: "America/Denver"
  });
}

function setStatus(text, isError = false) {
  const el = document.getElementById("status");
  el.textContent = text || "";
  el.className = "status " + (text ? "show " : "") + (isError ? "err" : "");
}

async function getJson(url, label) {
  const response = await fetch(url, { cache: "no-store" });

  if (!response.ok) {
    throw new Error("Could not load " + label + ". HTTP " + response.status);
  }

  return response.json();
}

function shouldUseStartOverride() {
  if (!CLAN_BATTLE_START_OVERRIDE_ISO) {
    return false;
  }

  if (!CLAN_BATTLE_START_OVERRIDE_BATTLE) {
    return true;
  }

  const battle = String(current?.battle || current?.battle_key || "").trim();
  return battle === CLAN_BATTLE_START_OVERRIDE_BATTLE;
}

function getStartMs() {
  if (shouldUseStartOverride()) {
    const overrideMs = new Date(CLAN_BATTLE_START_OVERRIDE_ISO).getTime();

    if (Number.isFinite(overrideMs)) {
      return overrideMs;
    }
  }

  const apiStart = current?.battle_start_iso;
  const apiStartMs = new Date(apiStart || "").getTime();

  if (Number.isFinite(apiStartMs)) {
    return apiStartMs;
  }

  const fallback = current?.snapshot_at || current?.generated_at;
  const fallbackMs = new Date(fallback || "").getTime();

  if (Number.isFinite(fallbackMs)) {
    return fallbackMs;
  }

  return Date.now() - 24 * 60 * 60 * 1000;
}

function getEndMs() {
  const apiEndMs = new Date(current?.battle_end_iso || "").getTime();

  if (Number.isFinite(apiEndMs)) {
    return Math.min(apiEndMs, Date.now());
  }

  return Date.now();
}

function makeBuckets() {
  const bucketHours = Number(document.getElementById("bucket").value) || 1;
  const step = bucketHours * 60 * 60 * 1000;
  const start = getStartMs();
  const end = Math.max(getEndMs(), start + step);
  const out = [];

  // Important: starts exactly at battle start, not midnight.
  for (let cursor = start; cursor <= end; cursor += step) {
    out.push({
      key: String(cursor),
      start,
      startMs: cursor,
      endMs: cursor + step
    });
  }

  buckets = out;
}

function getBucketKey(ms) {
  for (const bucket of buckets) {
    if (ms >= bucket.startMs && ms < bucket.endMs) {
      return bucket.key;
    }
  }

  return null;
}

function buildActivityModel() {
  makeBuckets();

  const start = getStartMs();
  const end = getEndMs();
  const memberMap = new Map();
  const seriesByUser = new Map();

  for (const row of current?.rows || []) {
    const id = String(row.user_id || "");

    if (!id) {
      continue;
    }

    memberMap.set(id, {
      id,
      name: row.username || id,
      rank: row.rank,
      currentTotal: toNumber(row.total_points) || 0,
      activity: 0,
      buckets: new Map()
    });
  }

  for (const row of historyRows) {
    const id = String(row.user_id || "");
    const total = toNumber(row.total_points);
    const ms = new Date(row.fetched_at || "").getTime();

    if (!id || total === null || !Number.isFinite(ms)) {
      continue;
    }

    // Keep a little pre-start data so the first post-start delta can be calculated.
    if (ms < start - 12 * 60 * 60 * 1000 || ms > end + 60 * 60 * 1000) {
      continue;
    }

    if (!seriesByUser.has(id)) {
      seriesByUser.set(id, []);
    }

    seriesByUser.get(id).push({
      ms,
      total,
      name: row.username || id,
      rank: row.rank
    });

    if (!memberMap.has(id)) {
      memberMap.set(id, {
        id,
        name: row.username || id,
        rank: row.rank,
        currentTotal: total,
        activity: 0,
        buckets: new Map()
      });
    }
  }

  for (const [id, series] of seriesByUser.entries()) {
    series.sort((a, b) => a.ms - b.ms);

    const member = memberMap.get(id);

    if (!member) {
      continue;
    }

    for (let i = 1; i < series.length; i++) {
      const prev = series[i - 1];
      const curr = series[i];

      // Only count gains whose newer snapshot lands inside the battle window.
      if (curr.ms < start || curr.ms > end) {
        continue;
      }

      const gain = Math.max(0, curr.total - prev.total);

      if (!gain) {
        continue;
      }

      const key = getBucketKey(curr.ms);

      if (!key) {
        continue;
      }

      member.buckets.set(key, (member.buckets.get(key) || 0) + gain);
      member.activity += gain;
    }
  }

  members = Array.from(memberMap.values()).sort((a, b) => {
    if (b.activity !== a.activity) {
      return b.activity - a.activity;
    }

    if (b.currentTotal !== a.currentTotal) {
      return b.currentTotal - a.currentTotal;
    }

    return String(a.name).localeCompare(String(b.name));
  });
}

function getFilteredMembers() {
  const query = document.getElementById("search").value.toLowerCase().trim();
  const limit = document.getElementById("limit").value;

  let out = members.slice();

  if (query) {
    out = out.filter(member =>
      member.name.toLowerCase().includes(query) ||
      member.id.includes(query)
    );
  }

  if (limit !== "all") {
    out = out.slice(0, Number(limit));
  }

  return out;
}

function renderChart() {
  const wrap = document.getElementById("wrap");
  const rows = getFilteredMembers();

  let totalActivity = 0;
  let maxBucket = 0;

  for (const member of rows) {
    totalActivity += member.activity;

    for (const value of member.buckets.values()) {
      maxBucket = Math.max(maxBucket, value);
    }
  }

  document.getElementById("battle").textContent =
    current?.display_name || current?.battle || "Current";

  document.getElementById("range").textContent =
    fmtDateTime(getStartMs()) + " → " + fmtDateTime(getEndMs());

  document.getElementById("members").textContent =
    rows.length.toLocaleString("en-US") + " / " + members.length.toLocaleString("en-US");

  document.getElementById("activity").textContent = shortNum(totalActivity);

  document.getElementById("sub").textContent =
    "Showing " + DISPLAY + " member point gains by " +
    document.getElementById("bucket").selectedOptions[0].text.toLowerCase() +
    ". Start locked to June 13, 2026 at 10:00 AM NM time.";

  document.getElementById("legend").textContent =
    maxBucket
      ? "Darker cells = higher gain. Max bucket: " + shortNum(maxBucket)
      : "Darker cells = higher gain";

  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">No activity found.</div>';
    return;
  }

  const cols = [
    "64px",
    "230px",
    "112px",
    ...buckets.map(() => "92px")
  ].join(" ");

  const html = [];

  html.push('<div class="grid" style="grid-template-columns:' + cols + '">');
  html.push('<div class="cell head rank">Rank</div>');
  html.push('<div class="cell head name">Player</div>');
  html.push('<div class="cell head total">Total</div>');

  const bucketHours = Number(document.getElementById("bucket").value) || 1;

  for (const bucket of buckets) {
    html.push(
      '<div class="cell head bucket" title="' +
      escapeHtml(fmtDateTime(bucket.startMs)) +
      '">' +
      escapeHtml(fmtBucketLabel(bucket.startMs, bucketHours)) +
      '</div>'
    );
  }

  rows.forEach((member, index) => {
    html.push('<div class="cell rank">#' + escapeHtml(member.rank ?? index + 1) + '</div>');
    html.push('<div class="cell name" title="' + escapeHtml(member.name) + '">' + escapeHtml(member.name) + '</div>');
    html.push('<div class="cell total" title="' + fullNum(member.activity) + '">' + shortNum(member.activity) + '</div>');

    for (const bucket of buckets) {
      const value = member.buckets.get(bucket.key) || 0;
      const alpha = value
        ? Math.max(0.08, Math.min(0.95, value / maxBucket))
        : 0.03;

      const title =
        member.name + "\n" +
        fmtDateTime(bucket.startMs) + " → " + fmtDateTime(bucket.endMs) + "\n" +
        "Gain: " + fullNum(value);

      html.push(
        '<div class="cell bucket ' + (value ? "" : "zero") + '" ' +
        'style="background:rgba(255,155,150,' + alpha + ')" ' +
        'title="' + escapeHtml(title) + '">' +
        (value ? shortNum(value) : "—") +
        '</div>'
      );
    }
  });

  html.push("</div>");
  wrap.innerHTML = html.join("");
}

async function loadData() {
  try {
    setStatus("Loading activity data...");

    document.title = DISPLAY + " Activity Chart";
    document.getElementById("title").textContent = DISPLAY + " Member Activity Chart";
    document.getElementById("home").href = pageUrl("index.html");
    document.getElementById("activity-link").href = pageUrl("activity.html");

    current = await getJson(withQuery(CURRENT_API), DISPLAY + " current");

    const start = getStartMs();
    const end = getEndMs();

    // Pull enough data to reach the corrected start time, plus a small buffer
    // so the first delta can compare against the snapshot before start.
    const hoursNeeded = Math.ceil((end - start) / (60 * 60 * 1000)) + 12;
    const hours = Math.min(RETENTION_HOURS, Math.max(1, hoursNeeded));

    const history = await getJson(
      withQuery(HISTORY_API, {
        battle: current?.battle || "current",
        hours,
        limit: 50000
      }),
      DISPLAY + " history"
    );

    historyRows = Array.isArray(history.rows) ? history.rows : [];

    buildActivityModel();
    renderChart();
    setStatus("");
  } catch (error) {
    console.error(error);
    setStatus(error.message || String(error), true);
  }
}

document.getElementById("bucket").addEventListener("change", () => {
  buildActivityModel();
  renderChart();
});

document.getElementById("limit").addEventListener("change", renderChart);
document.getElementById("search").addEventListener("input", renderChart);
document.getElementById("refresh").addEventListener("click", loadData);

loadData();
</script>
</body>
</html>
