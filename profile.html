<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Player Profile</title>
<style>
*{box-sizing:border-box}:root{--bg:#0d1117;--panel:#161b22;--panel2:#0d1117;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--link:#ff9b96;--rank:#f2cc60}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}a{color:var(--link);text-decoration:none}header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 22px}.header-inner{max-width:1200px;margin:auto;display:flex;justify-content:center}.site-logo{width:76px;border-radius:10px}.menu-bar{max-width:1200px;margin:9px auto 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.menu-btn{padding:7px 12px;border:1px solid var(--border);border-radius:5px;background:var(--panel2);color:var(--text);font-size:13px}.menu-btn:hover,.menu-btn.active{border-color:var(--link);color:var(--link);background:#1f2630}main{max-width:1200px;margin:auto;padding:22px 24px}.profile-header,.card,.battle-card,.empty,.error{border:1px solid var(--border);border-radius:10px;background:var(--panel)}.profile-header{display:flex;gap:18px;align-items:center;padding:18px;margin-bottom:24px}.avatar{width:96px;height:96px;border-radius:10px;background:#21262d;object-fit:cover}.profile-name{margin:0 0 6px;font-size:34px}.meta,.label,.dates,.chart-title,.muted{color:var(--muted);font-size:13px;line-height:1.45}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}.card{padding:16px;min-height:82px}.value{font-size:21px;font-weight:700}.section-title-row{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin:24px 0 14px}.section-title{margin:0;font-size:24px}select{min-width:230px;padding:9px 11px;border:1px solid var(--border);border-radius:6px;background:var(--panel2);color:var(--text)}.battle-card{overflow:hidden}.battle-head{padding:16px;border-bottom:1px solid var(--border)}.battle-title{margin:0 0 10px}.stats{padding:8px 16px 16px}.stat-row{display:grid;grid-template-columns:minmax(190px,1fr) minmax(100px,1fr);gap:16px;padding:8px;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:0}.stat-value{text-align:right;font-variant-numeric:tabular-nums}.chart-wrap{position:relative;padding:0 16px 16px}.controls{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 10px;color:var(--muted);font-size:13px}.controls label{display:inline-flex;gap:6px;align-items:center}.chart{width:100%;height:280px;border:1px solid var(--border);border-radius:8px;background:var(--panel2);cursor:crosshair}.tip{position:absolute;display:none;pointer-events:none;z-index:5;min-width:220px;max-width:320px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#0b0f14;box-shadow:0 8px 24px #0008;font-size:13px;line-height:1.45}.empty,.error{padding:18px;color:var(--muted)}.error{border-color:#f85149;background:rgba(248,81,73,.12);color:#ffb4ad}@media(max-width:700px){main{padding:16px}.menu-bar{justify-content:flex-start}.cards{grid-template-columns:1fr}.stat-row{grid-template-columns:1fr}.stat-value{text-align:left}.chart{height:230px}select{width:100%;min-width:0}}
</style>
</head>
<body>
<header><div class="header-inner"><a id="clan-mascot-link" class="site-logo-link" href="index.html?clan=WMSY"><img id="site-mascot" class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a></div><div class="menu-bar"><a class="menu-btn" data-page="index.html" href="index.html">c0ld Leaderboard</a><a class="menu-btn active" data-page="players.html" href="players.html">Players</a><a class="menu-btn" data-page="clans.html" href="clans.html">Clans Leaderboard</a><a class="menu-btn" data-page="live-clan.html" href="live-clan.html">Clan Lookup</a><a class="menu-btn" data-page="servers.html" href="servers.html">Servers</a><a class="menu-btn" data-page="macros.html" href="macros.html">Macros</a></div></header>
<main id="app"><div class="empty">Loading player profile...</div></main>
<script>
const CLANS={c0ld:{key:"c0ld",label:"c0ld",mascot:"assets/c0ld-kitsune-logo.gif",switch:"WMSY",color:"#ff9b96"},wmsy:{key:"wmsy",label:"WMSY",mascot:"assets/mascots/wmsy-frog.png",switch:"c0ld",color:"#74d99f"}};
const ACTIVE="https://ps99.biggamesapi.io/api/activeClanBattle",CUR="https://c0ld-clan-api-worker.opal-dde.workers.dev/api/current";
const AV="data:image/svg+xml;utf8,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150"><rect width="150" height="150" rx="16" fill="#21262d"/><circle cx="75" cy="58" r="26" fill="#6e7681"/><path d="M36 123c8-20 24-32 39-32s31 12 39 32" fill="#6e7681"/></svg>`);
let activeInfo=null,profile=null,sel=0,showP=true,showR=true,cache=null;
function n(v){return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}function c(){return CLANS[n(new URLSearchParams(location.search).get("clan"))]||CLANS.c0ld}function id(){return new URLSearchParams(location.search).get("id")||""}function e(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function num(v){if(v===null||v===undefined||v==="")return null;const x=Number(v);return Number.isFinite(x)?x:null}function fmt(v){const x=num(v);return x===null?"—":x.toLocaleString("en-US")}function d(v){if(!v)return"—";const x=new Date(v);return Number.isNaN(x.getTime())?"—":x.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})}function dt(v){if(!v)return"—";const x=new Date(v);return Number.isNaN(x.getTime())?"—":x.toLocaleString(undefined,{dateStyle:"short",timeStyle:"medium"})}function sh(v){const x=num(v);if(x===null)return"—";for(const t of[{v:1e12,s:"T"},{v:1e9,s:"B"},{v:1e6,s:"M"},{v:1e3,s:"K"}])if(Math.abs(x)>=t.v)return(x/t.v).toFixed(1).replace(/\.0$/,'')+t.s;return String(Math.round(x))}
async function fj(url){const r=await fetch(`${url}${url.includes("?")?"&":"?"}v=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}async function opt(url){try{return await fj(url)}catch{return null}}
function setup(){const cc=c(),sw=CLANS[n(cc.switch)]||CLANS.c0ld;document.documentElement.style.setProperty("--link",cc.color);document.getElementById("site-mascot").src=cc.mascot;document.getElementById("clan-mascot-link").href=home(sw.label);document.querySelectorAll("[data-page]").forEach(a=>{a.href=url(a.dataset.page);if(a.dataset.page==="index.html")a.textContent=`${cc.label} Leaderboard`})}function url(p){const u=new URL(p,location.href);u.search="";if(c().key!=="c0ld")u.searchParams.set("clan",c().label);return p+u.search}function home(label){return n(label)==="c0ld"?"index.html":"index.html?clan="+encodeURIComponent(label)}
function isoUnix(v){const x=Number(v);return Number.isFinite(x)&&x>0?new Date(x*1000).toISOString():null}function startFromEnd(endIso){const x=new Date(endIso);if(Number.isNaN(x.getTime()))return null;x.setUTCFullYear(2026,5,13);return x.toISOString()}function activeRange(){const cfg=activeInfo?.data?.configData||{},end=isoUnix(cfg.FinishTime),apiStart=isoUnix(cfg.StartTime);return{start:startFromEnd(end)||apiStart,end}}function activeTitle(){return activeInfo?.data?.configData?.Title||activeInfo?.data?.configName||activeInfo?.data?._id||""}function bkey(b){return n(b?.battle||b?.display_name||b?.api_battle_key||"")}function isActive(b){const a=n(activeTitle());return a&&[b?.battle,b?.display_name,b?.api_battle_key].some(x=>n(x)===a)||/backrooms/i.test(String(b?.battle||b?.display_name||""))}function range(b){if(isActive(b)){const r=activeRange();if(r.start||r.end)return r}return{start:b.battle_start_iso||b.battle_first_snapshot||b.first_snapshot||b.first_seen||null,end:b.battle_end_iso||b.battle_last_snapshot||b.last_snapshot||b.last_seen||null}}
function rowPoints(r){return r.total_points??r.points??0}function normName(v){return String(v||"").trim().toLowerCase().replace(/\s+/g,"").replace(/[^a-z0-9_]/g,"")}function find(cur,key){const raw=String(key),nn=normName(raw);return(cur.rows||[]).find(r=>String(r.user_id||"")===raw||normName(r.profile_key)===nn||normName(r.username)===nn)||null}
async function loadStatic(key){const r=await fetch(`Data/players/${encodeURIComponent(key)}.json?v=${Date.now()}`,{cache:"no-store"});return r.ok?r.json():null}async function loadLive(key){const cur=await opt(`${CUR}?clan=${encodeURIComponent(c().label)}`);if(!cur)return null;const r=find(cur,key);if(!r)return null;return{username:r.username,user_id:r.user_id,avatar_url:r.avatar_url,latest_rank:r.rank,latest_points:rowPoints(r),latest_seen:r.fetched_at||cur.snapshot_at||cur.generated_at,total_battles:1,battles:[{battle:cur.battle,display_name:cur.display_name||cur.battle,ending_rank:r.rank,ending_points:rowPoints(r),last_seen:r.fetched_at||cur.snapshot_at||cur.generated_at,series:[{t:r.fetched_at||cur.snapshot_at||cur.generated_at,rank:r.rank,points:rowPoints(r)}]}]}}function merge(st,lv){if(!st)return lv;if(!lv)return st;const out={...st,...lv,username:lv.username||st.username,avatar_url:lv.avatar_url||st.avatar_url,battles:[]},seen=new Set();for(const b of[...(lv.battles||[]),...(st.battles||[])]){const k=bkey(b)||String(out.battles.length);if(!seen.has(k)){seen.add(k);out.battles.push(b)}}out.total_battles=out.battles.length;return out}
function battles(){return(profile.battles||[]).slice().sort((a,b)=>new Date(b.battle_last_snapshot||b.last_seen||0)-new Date(a.battle_last_snapshot||a.last_seen||0))}function pts(b){let a=(b.series||[]).map(p=>({t:new Date(p.t).getTime(),raw:p.t,points:num(p.points),rank:num(p.rank),inferred:p.inferred})).filter(p=>!Number.isNaN(p.t));const r=range(b);a.sort((x,y)=>x.t-y.t);if(a.length&&r.start&&new Date(r.start).getTime()<a[0].t&&Number(a[0].points||0)>0)a.unshift({t:new Date(r.start).getTime(),raw:r.start,points:0,rank:null,inferred:true});if(a.length&&r.end&&new Date(r.end).getTime()>a[a.length-1].t){const last=a[a.length-1];a.push({...last,t:new Date(r.end).getTime(),raw:r.end,inferred:true})}return a}function zs(b){const a=pts(b).filter(p=>p.points!==null),z=a.filter(p=>p.points===0);let ranges=0,was=false;for(const p of a){if(p.points===0&&!was){ranges++;was=true}else if(p.points!==0)was=false}return{total:a.length,zero:z.length,ranges}}
function render(){const bs=battles(),app=document.getElementById("app");app.innerHTML=`<section class="profile-header"><img class="avatar" src="${e(profile.avatar_url||AV)}" alt=""><div><h1 class="profile-name">${e(profile.username||"Unknown")}</h1><div class="meta">User ID: ${e(profile.user_id??"N/A")}<br>${profile.profile_url?`<a href="${e(profile.profile_url)}" target="_blank" rel="noopener">Open Roblox Profile</a>`:""}</div></div></section><section class="cards"><div class="card"><div class="label">Battles</div><div class="value">${fmt(profile.total_battles)}</div></div><div class="card"><div class="label">Latest Rank</div><div class="value">${fmt(profile.latest_rank)}</div></div><div class="card"><div class="label">Latest Points</div><div class="value">${fmt(profile.latest_points)}</div></div><div class="card"><div class="label">Latest Seen</div><div class="value">${dt(profile.latest_seen)}</div></div></section><div class="section-title-row"><h2 class="section-title">Battle History</h2><select id="battle-select">${bs.map((b,i)=>`<option value="${i}">${e(b.display_name||b.battle||`Battle ${i+1}`)}</option>`).join("")}</select></div><section id="battle"></section>`;app.querySelector(".avatar").onerror=function(){this.onerror=null;this.src=AV};document.getElementById("battle-select").onchange=x=>{sel=Number(x.target.value);renderBattle()};renderBattle()}
function renderBattle(){const b=battles()[sel],r=range(b),z=zs(b),endRank=b.ending_rank??b.end_rank??b.last_rank??null;document.getElementById("battle").innerHTML=`<article class="battle-card"><div class="battle-head"><h2 class="battle-title">${e(b.display_name||b.battle||"Unknown Battle")}</h2><div class="dates">${d(r.start)} → ${d(r.end)}</div></div><div class="stats"><div class="stat-row"><div class="label">Starting Rank</div><div class="stat-value">${fmt(b.starting_rank)}</div></div><div class="stat-row"><div class="label">End Rank</div><div class="stat-value">${fmt(endRank)}</div></div><div class="stat-row"><div class="label">Ending Points</div><div class="stat-value">${fmt(b.ending_points)}</div></div><div class="stat-row"><div class="label">0-Point Snapshots</div><div class="stat-value">${z.total?`${z.zero} / ${z.total}`:"—"}</div></div><div class="stat-row"><div class="label">0-Point Periods</div><div class="stat-value">${z.total?fmt(z.ranges):"—"}</div></div></div><div class="chart-wrap"><div class="chart-title">Progression <span class="muted">· downtime is the red/green activity strip along the bottom of the same timeline</span></div><div class="controls"><label style="color:${c().color}"><input id="tp" type="checkbox" ${showP?"checked":""}> Points</label><label style="color:var(--rank)"><input id="tr" type="checkbox" ${showR?"checked":""}> Rank</label></div><canvas class="chart" id="chart"></canvas><div class="tip" id="tip"></div></div></article>`;document.getElementById("tp").onchange=x=>{if(!x.target.checked&&!showR)x.target.checked=true;showP=x.target.checked;draw()};document.getElementById("tr").onchange=x=>{if(!x.target.checked&&!showP)x.target.checked=true;showR=x.target.checked;draw()};requestAnimationFrame(draw)}
function y(v,min,max,top,h,type){if(max===min)return top+h/2;const p=(v-min)/(max-min);return type==="rank"?top+p*h:top+(1-p)*h}function line(ctx,a,x,yy,col){if(!a.length)return;ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();a.forEach((p,i)=>i?ctx.lineTo(x(p),yy(p)):ctx.moveTo(x(p),yy(p)));ctx.stroke();ctx.restore()}function strip(ctx,a,x,sy){if(a.length<2)return;ctx.save();ctx.lineCap="round";ctx.lineWidth=7;for(let i=0;i<a.length-1;i++){ctx.strokeStyle=a[i].points===0?"#f85149":"#3fb950";ctx.beginPath();ctx.moveTo(x(a[i]),sy);ctx.lineTo(x(a[i+1]),sy);ctx.stroke()}ctx.fillStyle="#8b949e";ctx.font="11px Arial";ctx.fillText("0-point activity",8,sy+4);ctx.restore()}
function draw(){const cv=document.getElementById("chart"),tip=document.getElementById("tip");if(!cv)return;const ctx=cv.getContext("2d"),rect=cv.getBoundingClientRect(),dpr=devicePixelRatio||1,b=battles()[sel],all=pts(b),pr=showP?all.filter(p=>p.points!==null):[],rr=showR?all.filter(p=>p.rank!==null):[],vis=[...pr,...rr];cv.width=Math.floor(rect.width*dpr);cv.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,rect.width,rect.height);if(vis.length<2){ctx.fillStyle="#8b949e";ctx.font="13px Arial";ctx.fillText("Not enough points to chart.",16,28);return}const pl=58,prg=18,pt=18,pb=46,w=rect.width-pl-prg,h=rect.height-pt-pb,sy=rect.height-30,minT=Math.min(...vis.map(p=>p.t)),maxT=Math.max(...vis.map(p=>p.t)),pv=pr.map(p=>p.points),rv=rr.map(p=>p.rank),minP=pv.length?Math.min(...pv):0,maxP=pv.length?Math.max(...pv):0,minR=rv.length?Math.min(...rv):0,maxR=rv.length?Math.max(...rv):0,x=p=>maxT===minT?pl:pl+((p.t-minT)/(maxT-minT))*w,yp=p=>y(p.points,minP,maxP,pt,h,"points"),yr=p=>y(p.rank,minR,maxR,pt,h,"rank");ctx.strokeStyle="#30363d";ctx.font="12px Arial";ctx.fillStyle="#8b949e";const grid=pv.length?{min:minP,max:maxP,type:"points"}:{min:minR,max:maxR,type:"rank"};for(let i=0;i<=4;i++){const q=i/4,yy=pt+q*h,val=grid.type==="rank"?grid.min+q*(grid.max-grid.min):grid.max-q*(grid.max-grid.min);ctx.beginPath();ctx.moveTo(pl,yy);ctx.lineTo(rect.width-prg,yy);ctx.stroke();ctx.fillText(grid.type==="rank"?`#${Math.round(val)}`:sh(val),8,yy+4)}line(ctx,pr,x,yp,c().color);line(ctx,rr,x,yr,"#f2cc60");strip(ctx,all.filter(p=>p.points!==null).sort((a,b)=>a.t-b.t),x,sy);ctx.fillStyle="#8b949e";ctx.fillText(new Date(minT).toLocaleDateString(undefined,{month:"short",day:"numeric"}),pl,rect.height-12);const last=new Date(maxT).toLocaleDateString(undefined,{month:"short",day:"numeric"});ctx.fillText(last,rect.width-prg-ctx.measureText(last).width,rect.height-12);cache={all,x,yp,yr,sy,rect};bindTip(cv,tip)}function bindTip(cv,tip){if(cv.dataset.bound)return;cv.dataset.bound=1;cv.onmouseleave=()=>tip.style.display="none";cv.onmousemove=ev=>{if(!cache)return;const r=cv.getBoundingClientRect(),mx=ev.clientX-r.left;let near=cache.all[0],dist=Math.abs(cache.x(near)-mx);for(const p of cache.all){const dd=Math.abs(cache.x(p)-mx);if(dd<dist){near=p;dist=dd}}draw();const fresh=cache,ctx=cv.getContext("2d"),px=fresh.x(near),py=Math.abs(ev.clientY-r.top-fresh.sy)<18?fresh.sy:(showP&&near.points!==null?fresh.yp(near):fresh.yr(near));ctx.fillStyle="#e6edf3";ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();tip.innerHTML=`<strong>${dt(near.raw)}</strong><div>Points: ${fmt(near.points)}</div><div>Rank: ${fmt(near.rank)}</div><div class="muted">${near.points===0?"Downtime / 0 points":"Active / scoring"}${near.inferred?" · inferred boundary":""}</div>`;tip.style.display="block";tip.style.left=Math.max(8,ev.clientX-r.left+14)+"px";tip.style.top=Math.max(8,ev.clientY-r.top+14)+"px"}}
async function main(){setup();const key=id(),app=document.getElementById("app");if(!key){app.innerHTML='<div class="error">Missing profile ID.</div>';return}try{activeInfo=await opt(ACTIVE);const st=c().key==="c0ld"?await loadStatic(key):null,lv=await loadLive(key);profile=merge(st,lv);if(!profile)throw new Error(`Could not load profile ${key}.`);profile.profile_url=profile.user_id?`https://www.roblox.com/users/${profile.user_id}/profile`:profile.profile_url;document.title=`${profile.username||"Player"} - ${c().label} Profile`;render()}catch(err){console.error(err);app.innerHTML=`<div class="error">${e(err.message)}</div>`}}
window.addEventListener("resize",()=>{clearTimeout(window.__r);window.__r=setTimeout(draw,100)});main();
</script>
