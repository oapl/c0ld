<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Player Profile</title>
<style>
*{box-sizing:border-box}:root{--bg:#0d1117;--panel:#161b22;--panel2:#0d1117;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--link:#58a6ff;--rank:#f2cc60}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}a{color:var(--link);text-decoration:none}header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 22px}.header-inner{max-width:1200px;margin:auto;display:flex;justify-content:center}.site-logo{width:76px;border-radius:10px}.menu-bar{max-width:1200px;margin:9px auto 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.menu-btn{padding:7px 12px;border:1px solid var(--border);border-radius:5px;background:var(--panel2);color:var(--text);font-size:13px}.menu-btn:hover,.menu-btn.active{border-color:var(--link);color:var(--link);background:#1f2630}main{max-width:1200px;margin:auto;padding:22px 24px}.profile-header,.card,.battle-card,.empty,.error{border:1px solid var(--border);border-radius:10px;background:var(--panel)}.profile-header{display:flex;gap:18px;align-items:center;padding:18px;margin-bottom:24px}.avatar{width:96px;height:96px;border-radius:10px;background:#21262d;object-fit:cover}.profile-name{margin:0 0 6px;font-size:34px}.meta,.label,.dates,.chart-title,.note,.muted{color:var(--muted);font-size:13px;line-height:1.45}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}.card{padding:16px;min-height:82px}.value{font-size:21px;font-weight:700}.section-title-row{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin:24px 0 14px}.section-title{margin:0;font-size:24px}select{min-width:230px;padding:9px 11px;border:1px solid var(--border);border-radius:6px;background:var(--panel2);color:var(--text)}.battle-card{overflow:hidden}.battle-head{padding:16px;border-bottom:1px solid var(--border)}.battle-title{margin:0 0 10px}.stats{padding:8px 16px 16px}.stat-row{display:grid;grid-template-columns:minmax(190px,1fr) minma </style>
</head>
<body>
<header><div class="header-inner"><a id="clan-mascot-link" class="site-logo-link" href="index.html?clan=WMSY"><img id="site-mascot" class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a></div><div class="menu-bar"><a class="menu-btn" data-page="index.html" href="index.html">c0ld Leaderboard</a><a class="menu-btn active" data-page="players.html" href="players.html">Players</a><a class="menu-btn" data-page="clans.html" href="clans.html">Clans Leaderboard</a><a class="menu-btn" data-page="live-clan.html" href="live-clan.html">Clan Lookup</a><a class="menu-btn" data-page="servers.html" href="servers.html">Servers</a><a class="menu-btn" data-page="macros.html" href="macros.html">Macros</a></div></header>
<main id="app"><div class="empty">Loading player profile...</div></main>
<script>
const CLANS={c0ld:{key:"c0ld",label:"c0ld",mascot:"assets/c0ld-kitsune-logo.gif",switchTarget:"WMSY",color:"#ff9b96"},wmsy:{key:"wmsy",label:"WMSY",mascot:"assets/mascots/wmsy-frog.png",switchTarget:"c0ld",color:"#74d99f"}};
const MEMBER_CURRENT="https://c0ld-clan-api-worker.opal-dde.workers.dev/api/current",MEMBER_HISTORY="https://c0ld-clan-api-worker.opal-dde.workers.dev/api/history",ACTIVE_BATTLE="https://ps99.biggamesapi.io/api/activeClanBattle";
const DEFAULT_AVATAR="data:image/svg+xml;utf8,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150"><rect width="150" height="150" rx="16" fill="#21262d"/><circle cx="75" cy="58" r="26" fill="#6e7681"/><path d="M36 123c8-20 24-32 39-32s31 12 39 32" fill="#6e7681"/></svg>`);
let activeInfo=null,profile=null,battleIndex=0,showPoints=true,showRank=true,chartCache=null;
function norm(v){return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}function normName(v){return String(v||"").trim().toLowerCase().replace(/\s+/g,"").replace(/[^a-z0-9_]/g,"")}function clan(){return CLANS[norm(new URLSearchParams(location.search).get("clan"))]||CLANS.c0ld}function id(){return new URLSearchParams(location.search).get("id")||""}function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function num(v){if(v===null||v===undefined||v==="")return null;const n=Number(v);return Number.isFinite(n)?n:null}function fmt(v){const n=num(v);return n===null?"—":n.toLocaleString("en-US")}function short(v){const n=num(v);if(n===null)return"—";for(const t of[{v:1e12,s:"T"},{v:1e9,s:"B"},{v:1e6,s:"M"},{v:1e3,s:"K"}])if(Math.abs(n)>=t.v)return(n/t.v).toFixed(1).replace(/\.0$/,'')+t.s;return String(Math.round(n))}function date(v){if(!v)return"—";const d=new Date(v);return Number.isNaN(d.getTime())?"—":d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})}function dt(v){if(!v)return"—";const d=new Date(v);return Number.isNaN(d.getTime())?"—":d.toLocaleString(undefined,{dateStyle:"short",timeStyle:"medium"})}
async function fetchJson(url,label){const r=await fetch(`${url}${url.includes("?")?"&":"?"}v=${Date.now()}`,{cache:"no-store"});if(!r.ok)throw new Error(`Could not load ${label}. HTTP ${r.status}`);return r.json()}async function opt(url){try{return await fetchJson(url,url)}catch{return null}}
function setupChrome(){const c=clan(),sw=CLANS[norm(c.switchTarget)]||CLANS.c0ld;document.documentElement.style.setProperty("--link",c.color);const logo=document.getElementById("site-mascot"),link=document.getElementById("clan-mascot-link");logo.src=c.mascot;logo.alt=c.label;link.href=homeUrl(sw.label);document.querySelectorAll("[data-page]").forEach(a=>{const p=a.dataset.page;a.href=url(p);if(p==="index.html")a.textContent=`${c.label} Leaderboard`})}
function url(page,params={}){const c=clan(),u=new URL(page,location.href);u.search="";if(c.key!=="c0ld")u.searchParams.set("clan",c.label);for(const[k,v]of Object.entries(params))if(v!==undefined&&v!==null&&v!=="")u.searchParams.set(k,v);return`${u.pathname.split('/').pop()}${u.search}`}function homeUrl(label){const u=new URL("index.html",location.href);u.search="";if(norm(label)!=="c0ld")u.searchParams.set("clan",label);return`index.html${u.search}`}
function rowPoints(r){return r.total_points??r.points??0}function findCurrent(cur,key){const raw=String(key||"").trim(),n=normName(raw);return(cur.rows||[]).find(r=>String(r.user_id||"")===raw||normName(r.profile_key)===n||normName(r.username)===n)||null}
function activeTitle(){return activeInfo?.data?.configData?.Title||activeInfo?.data?.configName||activeInfo?.data?._id||null}function isoUnix(v){const n=Number(v);return Number.isFinite(n)&&n>0?new Date(n*1000).toISOString():null}function activeRange(){const cfg=activeInfo?.data?.configData||{};return{start:isoUnix(cfg.StartTime),end:isoUnix(cfg.FinishTime)}}function battleKey(b){return norm(b?.battle||b?.display_name||b?.api_battle_key||"")}function isActiveBattle(b){const a=norm(activeTitle());return a&&[b?.battle,b?.display_name,b?.api_battle_key].some(v=>norm(v)===a)}function eventRange(b){if(isActiveBattle(b)){const r=activeRange();if(r.start||r.end)return r}return{start:b.battle_start_iso||b.battle_first_snapshot||b.first_snapshot||b.first_seen||null,end:b.battle_end_iso||b.battle_last_snapshot||b.last_snapshot||b.last_seen||null}}
function synth(series,b,currentRow,cur){const rows=(series||[]).filter(p=>p.t).slice().sort((a,b)=>new Date(a.t)-new Date(b.t)),range=eventRange(b),add=[];const start=range.start||cur?.battle_start_iso,end=range.end||cur?.battle_end_iso||cur?.snapshot_at||cur?.generated_at;if(start&&rows.length&&new Date(start)<new Date(rows[0].t)&&Number(rows[0].points||0)>0)add.push({t:start,rank:null,points:0,present:false,inferred:true});if(end&&rows.length&&!currentRow&&new Date(end)>new Date(rows[rows.length-1].t))add.push({t:end,rank:null,points:0,present:false,inferred:true});return[...rows,...add].sort((a,b)=>new Date(a.t)-new Date(b.t))}
function summarizeLive(cur,h,key){const cr=findCurrent(cur,key),uid=cr?.user_id||(/^\d+$/.test(String(key))?String(key):null),rows=Array.isArray(h?.rows)?h.rows.slice():[];if(!rows.length&&cr)rows.push({fetched_at:cr.fetched_at||cur.snapshot_at||cur.generated_at,rank:cr.rank,username:cr.username,user_id:cr.user_id,total_points:rowPoints(cr)});if(!rows.length&&!cr)throw new Error(`No live ${clan().label} profile data found for ${key}.`);rows.sort((a,b)=>new Date(a.fetched_at||0)-new Date(b.fetched_at||0));const first=rows[0]||cr||{},last=rows[rows.length-1]||cr||{},ranks=rows.map(r=>num(r.rank)).filter(n=>n!==null),username=cr?.username||last.username||first.username||String(key),latestPoints=cr?.total_points??cr?.points??rowPoints(last),latestRank=cr?.rank??last.rank??null,latestSeen=cr?.fetched_at||last.fetched_at||cur.snapshot_at||cur.generated_at||null;const b={battle:cur.battle||"current",display_name:cur.display_name||cur.battle||"Current Clan Battle",battle_first_snapshot:cur.battle_start_iso||first.fetched_at||null,battle_last_snapshot:latestSeen,battle_start_iso:null,battle_end_iso:null,first_seen:first.fetched_at||null,last_seen:latestSeen,starting_rank:first.rank??null,worst_rank:ranks.length?Math.max(...ranks):null,best_rank:ranks.length?Math.min(...ranks):null,ending_rank:latestRank,ending_points:latestPoints,series:null};b.series=synth(rows.map(r=>({t:r.fetched_at,rank:r.rank??null,points:Number(rowPoints(r)||0),present:true})).filter(p=>p.t),b,cr,cur);return{aliases:[String(key)],username,user_id:uid,avatar_url:cr?.avatar_url||null,profile_url:uid?`https://www.roblox.com/users/${uid}/profile`:null,total_battles:1,latest_rank:latestRank,latest_points:latestPoints,latest_seen:latestSeen,battles:[b]}}
async function liveProfile(key){const cur=await fetchJson(`${MEMBER_CURRENT}?clan=${encodeURIComponent(clan().label)}`,"live leaderboard"),cr=findCurrent(cur,key),uid=cr?.user_id||(/^\d+$/.test(String(key))?key:"");if(!uid)return summarizeLive(cur,{rows:[]},key);const hist=await opt(`${MEMBER_HISTORY}?clan=${encodeURIComponent(clan().label)}&user_id=${encodeURIComponent(uid)}${cur.battle?`&battle=${encodeURIComponent(cur.battle)}`:""}&hours=336&limit=50000`);return summarizeLive(cur,hist||{rows:[]},uid)}async function staticProfile(key){const r=await fetch(`Data/players/${encodeURIComponent(key)}.json?v=${Date.now()}`,{cache:"no-store"});if(!r.ok)return null;return r.json()}function merge(st,lv){const battles=[],seen=new Set();for(const b of[...(lv?.battles||[]),...(st?.battles||[])]){const k=battleKey(b)||`b${battles.length}`;if(!seen.has(k)){seen.add(k);battles.push(b)}}return{...(st||{}),...(lv||{}),username:lv?.username||st?.username||"Unknown",user_id:lv?.user_id||st?.user_id||null,avatar_url:lv?.avatar_url||st?.avatar_url||null,profile_url:lv?.profile_url||st?.profile_url||null,total_battles:battles.length,latest_rank:lv?.latest_rank??st?.latest_rank??null,latest_points:lv?.latest_points??st?.latest_points??null,latest_seen:lv?.latest_seen??st?.latest_seen??null,battles}}
function battles(){return(profile?.battles||[]).slice().sort((a,b)=>new Date(b.battle_last_snapshot||b.last_seen||0)-new Date(a.battle_last_snapshot||a.last_seen||0))}function pts(series){return(series||[]).map(p=>({t:new Date(p.t).getTime(),rawT:p.t,points:num(p.points),rank:num(p.rank),inferred:p.inferred===true})).filter(p=>!Number.isNaN(p.t)&&(p.points!==null||p.rank!==null))}function zeroStats(series){const list=pts(series).filter(p=>p.points!==null).sort((a,b)=>a.t-b.t),zero=list.filter(p=>p.points===0);let ranges=[],s=null,last=null;for(const p of list){if(p.points===0){if(!s)s=p;last=p}else if(s){ranges.push({s,end:last});s=last=null}}if(s)ranges.push({s,end:last});return{total:list.length,zero:zero.length,ranges}}
function render(){const app=document.getElementById("app"),bs=battles();app.innerHTML=`<section class="profile-header"><img class="avatar" src="${esc(profile.avatar_url||DEFAULT_AVATAR)}" alt=""><div><h1 class="profile-name">${esc(profile.username||"Unknown")}</h1><div class="meta">User ID: ${esc(profile.user_id??"N/A")}<br>${profile.profile_url?`<a href="${esc(profile.profile_url)}" target="_blank" rel="noopener">Open Roblox Profile</a>`:""}</div></div></section><section class="cards"><div class="card"><div class="label">Battles</div><div class="value">${fmt(profile.total_battles)}</div></div><div class="card"><div class="label">Latest Rank</div><div class="value">${fmt(profile.latest_rank)}</div></div><div class="card"><div class="label">Latest Points</div><div class="value">${fmt(profile.latest_points)}</div></div><div class="card"><div class="label">Latest Seen</div><div class="value">${dt(profile.latest_seen)}</div></div></section><div class="section-title-row"><h2 class="section-title">Battle History</h2><select id="battle-select">${bs.map((b,i)=>`<option value="${i}">${esc(b.display_name||b.battle||`Battle ${i+1}`)}</option>`).join("")}</select></div><section id="battle-detail"></section>`;app.querySelector(".avatar").onerror=function(){this.onerror=null;this.src=DEFAULT_AVATAR};if(!bs.length){document.getElementById("battle-detail").innerHTML=`<div class="empty">No battle history found.</div>`;return}document.getElementById("battle-select").onchange=e=>{battleIndex=Number(e.target.value||0);renderBattle()};renderBattle()}
function renderBattle(){const b=battles()[battleIndex],r=eventRange(b),zs=zeroStats(b.series),endRank=b.ending_rank??b.end_rank??b.last_rank??null;document.getElementById("battle-detail").innerHTML=`<article class="battle-card"><div class="battle-head"><h2 class="battle-title">${esc(b.display_name||b.battle||"Unknown Battle")}</h2><div class="dates">${date(r.start)} → ${date(r.end)}</div></div><div class="stats"><div class="stat-row"><div class="label">Starting Rank</div><div class="stat-value">${fmt(b.starting_rank)}</div></div><div class="stat-row"><div class="label">End Rank</div><div class="stat-value">${fmt(endRank)}</div></div><div class="stat-row"><div class="label">Ending Points</div><div class="stat-value">${fmt(b.ending_points)}</div></div><div class="stat-row"><div class="label">0-Point Snapshots</div><div class="stat-value">${zs.total?`${zs.zero} / ${zs.total}`:"—"}</div></div><div class="stat-row"><div class="label">0-Point Periods</div><div class="stat-value">${zs.total?fmt(zs.ranges.length):"—"}</div></div></div>${b.series?.length>1?`<div class="chart-wrap"><div class="chart-title">Progression <span class="muted">· downtime is the red/green activity strip along the bottom of the same timeline</span></div><div class="controls"><label style="color:${clan().color}"><input id="toggle-points" type="checkbox" ${showPoints?"checked":""}> Points</label><label style="color:var(--rank)"><input id="toggle-rank" type="checkbox" ${showRank?"checked":""}> Rank</label></div><canvas class="chart" id="chart"></canvas><div class="tip" id="tip"></div></div>`:""}</article>`;document.getElementById("toggle-points")?.addEventListener("change",e=>{if(!e.target.checked&&!showRank)e.target.checked=true;showPoints=e.target.checked;draw()});document.getElementById("toggle-rank")?.addEventListener("change",e=>{if(!e.target.checked&&!showPoints)e.target.checked=true;showRank=e.target.checked;draw()});requestAnimationFrame(draw)}
function y(v,min,max,top,h,type){if(max===min)return top+h/2;const p=(v-min)/(max-min);return type==="rank"?top+p*h:top+(1-p)*h}function line(ctx,rows,x,yy,c){if(!rows.length)return;ctx.save();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();rows.forEach((p,i)=>i?ctx.lineTo(x(p),yy(p)):ctx.moveTo(x(p),yy(p)));ctx.stroke();const l=rows[rows.length-1];ctx.fillStyle=c;ctx.beginPath();ctx.arc(x(l),yy(l),3.5,0,Math.PI*2);ctx.fill();ctx.restore()}function strip(ctx,rows,x,stripY){if(rows.length<2)return;ctx.save();ctx.lineWidth=7;ctx.lineCap="round";for(let i=0;i<rows.length-1;i++){const p=rows[i],n=rows[i+1];ctx.strokeStyle=p.points===0?"#f85149":"#3fb950";ctx.beginPath();ctx.moveTo(x(p),stripY);ctx.lineTo(x(n),stripY);ctx.stroke()}for(const p of rows){if(p.points!==0)continue;ctx.fillStyle="#f85149";ctx.beginPath();ctx.arc(x(p),stripY,4,0,Math.PI*2);ctx.fill()}ctx.fillStyle="#8b949e";ctx.font="11px Arial";ctx.fillText("0-point activity",8,stripY+4);ctx.restore()}
function draw(){const c=document.getElementById("chart"),tip=document.getElementById("tip");if(!c)return;const ctx=c.getContext("2d"),rect=c.getBoundingClientRect(),dpr=devicePixelRatio||1,b=battles()[battleIndex],all=pts(b.series),pr=showPoints?all.filter(p=>p.points!==null):[],rr=showRank?all.filter(p=>p.rank!==null):[],vis=[...pr,...rr];c.width=Math.floor(rect.width*dpr);c.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,rect.width,rect.height);if(vis.length<2){ctx.fillStyle="#8b949e";ctx.font="13px Arial";ctx.fillText("Not enough points to chart.",16,28);return}const pl=58,prg=18,pt=18,pb=46,w=rect.width-pl-prg,h=rect.height-pt-pb,stripY=rect.height-30,minT=Math.min(...vis.map(p=>p.t)),maxT=Math.max(...vis.map(p=>p.t)),pv=pr.map(p=>p.points),rv=rr.map(p=>p.rank),minP=pv.length?Math.min(...pv):0,maxP=pv.length?Math.max(...pv):0,minR=rv.length?Math.min(...rv):0,maxR=rv.length?Math.max(...rv):0,x=p=>maxT===minT?pl:pl+((p.t-minT)/(maxT-minT))*w,yp=p=>y(p.points,minP,maxP,pt,h,"points"),yr=p=>y(p.rank,minR,maxR,pt,h,"rank");ctx.strokeStyle="#30363d";ctx.font="12px Arial";ctx.fillStyle="#8b949e";const grid=pv.length?{min:minP,max:maxP,type:"points"}:{min:minR,max:maxR,type:"rank"};for(let i=0;i<=4;i++){const pct=i/4,yy=pt+pct*h,val=grid.type==="rank"?grid.min+pct*(grid.max-grid.min):grid.max-pct*(grid.max-grid.min);ctx.beginPath();ctx.moveTo(pl,yy);ctx.lineTo(rect.width-prg,yy);ctx.stroke();ctx.fillText(grid.type==="rank"?`#${Math.round(val)}`:short(val),8,yy+4)}line(ctx,pr,x,yp,clan().color);line(ctx,rr,x,yr,"#f2cc60");strip(ctx,all.filter(p=>p.points!==null).sort((a,b)=>a.t-b.t),x,stripY);ctx.fillStyle="#8b949e";ctx.fillText(new Date(minT).toLocaleDateString(undefined,{month:"short",day:"numeric"}),pl,rect.height-12);const last=new Date(maxT).toLocaleDateString(undefined,{month:"short",day:"numeric"});ctx.fillText(last,rect.width-prg-ctx.measureText(last).width,rect.height-12);chartCache={all,x,yp,yr,stripY,pt,pb,rect};bindTip(c,tip)}function bindTip(c,tip){if(c.dataset.bound)return;c.dataset.bound=1;c.onmouseleave=()=>tip.style.display="none";c.onmousemove=e=>{if(!chartCache)return;const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left;let near=chartCache.all[0],dist=Math.abs(chartCache.x(near)-mx);for(const p of chartCache.all){const d=Math.abs(chartCache.x(p)-mx);if(d<dist){near=p;dist=d}}draw();const fresh=chartCache,ctx=c.getContext("2d"),px=fresh.x(near),py=Math.abs(e.clientY-rect.top-fresh.stripY)<18?fresh.stripY:(showPoints&&near.points!==null?fresh.yp(near):fresh.yr(near));ctx.fillStyle="#e6edf3";ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();tip.innerHTML=`<strong>${dt(near.rawT)}</strong><div>Points: ${fmt(near.points)}</div><div>Rank: ${fmt(near.rank)}</div><div class="muted">${near.points===0?"Downtime / 0 points":"Active / scoring"}${near.inferred?" · inferred boundary":""}</div>`;tip.style.display="block";tip.style.left=Math.max(8,e.clientX-rect.left+14)+"px";tip.style.top=Math.max(8,e.clientY-rect.top+14)+"px"}}
async function main(){const app=document.getElementById("app"),key=id();setupChrome();if(!key){app.innerHTML=`<div class="error">Missing profile ID.</div>`;return}try{activeInfo=await opt(ACTIVE_BATTLE);const lv=await liveProfile(key).catch(e=>null),st=clan().key==="c0ld"?await staticProfile(key).catch(e=>null):null;if(!lv&&!st)throw new Error(`Could not load profile ${key}.`);profile=merge(st,lv);if(!profile.avatar_url&&profile.user_id)profile.avatar_url=(await opt(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${profile.user_id}&size=150x150&format=Png&isCircular=false`))?.data?.[0]?.imageUrl||null;document.title=`${profile.username||"Player"} - ${clan().label} Profile`;render()}catch(e){console.error(e);app.innerHTML=`<div class="error">${esc(e.message)}</div>`}}
window.addEventListener("resize",()=>{clearTimeout(window.__r);window.__r=setTimeout(draw,100)});main();
</script>
