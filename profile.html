<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player Profile</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #ff9b96;
      --hover: #1f2630;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .site-logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .site-logo {
      display: block;
      width: 76px;
      height: auto;
      border-radius: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .github-btn {
      display: inline-block;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .github-btn:hover {
      background: var(--hover);
      border-color: var(--link);
    }

    .menu-bar {
      max-width: 1200px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .menu-btn:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .menu-btn.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(248, 81, 73, 0.12);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px 24px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 18px;
      margin-bottom: 24px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 10px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .profile-name {
      margin: 0 0 6px;
      font-size: 34px;
      line-height: 1.05;
    }

    .profile-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      min-height: 82px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 21px;
      font-weight: bold;
      line-height: 1.25;
      word-break: break-word;
    }

    .section-title-row {
      margin: 24px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 24px;
    }

    select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 11px;
      font-size: 14px;
      outline: none;
      min-width: 230px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    select:hover,
    select:focus {
      border-color: var(--link);
      background: var(--hover);
    }

    .battle-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .battle-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .battle-title {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .battle-dates {
      color: var(--muted);
      font-size: 13px;
    }

    .stats {
      padding: 8px 16px 16px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: minmax(190px, 1fr) minmax(100px, 1fr);
      gap: 16px;
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }

    .stat-row:last-child {
      border-bottom: 0;
    }

    .stat-label {
      color: var(--muted);
    }

    .stat-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .chart-wrap {
      padding: 0 16px 16px;
      position: relative;
    }

    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .chart-title {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .chart-toggles {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chart-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .chart-toggle:hover {
      border-color: var(--link);
      background: var(--hover);
    }

    .chart-toggle input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: var(--link);
    }

    .chart-legend {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      min-height: 18px;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
    }

    .legend-points {
      color: #ff9b96;
    }

    .legend-rank {
      color: #e6edf3;
    }

    .chart-box {
      width: 100%;
      height: 240px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      display: block;
      cursor: crosshair;
    }

    .tooltip {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      display: none;
      min-width: 220px;
      max-width: 280px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0b0f14;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    .tooltip strong {
      display: block;
      margin-bottom: 4px;
    }

    .tooltip .muted {
      color: var(--muted);
    }

    .empty, .error {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 18px;
      color: var(--muted);
    }

    .error {
      border-color: var(--danger);
      background: var(--danger-bg);
      color: #ffb4ad;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1000px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 16px 10px;
      }

      main {
        padding: 16px;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      .menu-bar {
        justify-content: flex-start;
      }

      .profile-header {
        align-items: flex-start;
      }

      .profile-name {
        font-size: 26px;
      }

      .avatar {
        width: 76px;
        height: 76px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .section-title-row {
        align-items: stretch;
      }

      select {
        width: 100%;
        min-width: 0;
      }

      .stat-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .stat-value {
        text-align: left;
      }

      .chart-box {
        height: 210px;
      }

      .chart-head,
      .chart-toggles {
        align-items: stretch;
      }

      .chart-toggle {
        flex: 1 1 130px;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <a class="site-logo-link" href="index.html" aria-label="c0ld home">
        <img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld">
      </a>
    </div>

    <div class="menu-bar">
      <a class="menu-btn" id="home-leaderboard-link" href="index.html">c0ld Leaderboard</a>
      <a class="menu-btn" id="wmsy-leaderboard-link" href="wmsy.html">WMSY Leaderboard</a>
      <a class="menu-btn" href="clans.html">Clans Leaderboard</a>
      <a class="menu-btn" href="live-clan.html">Clan Lookup</a>
      <a class="menu-btn" href="servers.html">Servers</a>
      <a class="menu-btn" href="macros.html">Macros</a>
    </div>
  </header>

  <main id="app">
    <div class="empty">Loading player profile...</div>
  </main>

  <script>
    const MEMBER_API_CURRENT_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/current";
    const MEMBER_API_HISTORY_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/history";
    const PROFILE_CLAN = getRequestedClanName();
    const PROFILE_CLAN_KEY = normalizeClanKey(PROFILE_CLAN);
    const PROFILE_CLAN_DISPLAY = formatClanDisplayName(PROFILE_CLAN);
    const DEFAULT_AVATAR_SVG =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
          <rect width="150" height="150" rx="16" fill="#21262d"/>
          <circle cx="75" cy="58" r="26" fill="#6e7681"/>
          <path d="M36 123c8-20 24-32 39-32s31 12 39 32" fill="#6e7681"/>
        </svg>
      `);

    let loadedProfile = null;
    let selectedBattleIndex = 0;
    let currentChart = null;
    let chartOptions = {
      points: true,
      rank: false
    };

    function getRequestedClanName() {
      const raw = new URLSearchParams(window.location.search).get("clan") || "c0ld";
      return String(raw).trim().replace(/[^a-z0-9_-]/gi, "") || "c0ld";
    }

    function normalizeClanKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function formatClanDisplayName(clan) {
      return normalizeClanKey(clan) === "c0ld" ? "c0ld" : String(clan || "").toUpperCase();
    }

    function isDefaultClan() {
      return PROFILE_CLAN_KEY === "c0ld";
    }

    function withClanQuery(url, params = {}) {
      const out = new URL(url, window.location.href);
      out.searchParams.set("clan", PROFILE_CLAN);

      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          out.searchParams.set(key, String(value));
        }
      }

      return out.toString();
    }

    function pageUrl(path, params = {}) {
      const out = new URL(path, window.location.href);

      if (!isDefaultClan()) {
        out.searchParams.set("clan", PROFILE_CLAN);
      }

      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          out.searchParams.set(key, String(value));
        }
      }

      return `${out.pathname.split("/").pop()}${out.search}${out.hash}`;
    }

    function applyClanChrome() {
      const logoLink = document.querySelector(".site-logo-link");
      if (logoLink) {
        logoLink.href = pageUrl("index.html");
        logoLink.setAttribute("aria-label", `${PROFILE_CLAN_DISPLAY} home`);
      }

      const logo = document.querySelector(".site-logo");
      if (logo) {
        logo.alt = PROFILE_CLAN_DISPLAY;
      }

      const homeLink = document.getElementById("home-leaderboard-link");
      if (homeLink) {
        homeLink.href = pageUrl("index.html");
        homeLink.textContent = `${PROFILE_CLAN_DISPLAY} Leaderboard`;
      }

      const wmsyLink = document.getElementById("wmsy-leaderboard-link");
      if (wmsyLink) {
        wmsyLink.classList.toggle("hidden", PROFILE_CLAN_KEY === "wmsy");
      }
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function fmtNum(n) {
      if (n === null || n === undefined || n === "" || Number.isNaN(Number(n))) return "—";
      return Number(n).toLocaleString("en-US");
    }

    function finiteNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function fmtDate(s) {
      if (!s) return "—";
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return "—";

      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function fmtDateTime(s) {
      if (!s) return "—";
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return "—";

      return d.toLocaleString(undefined, {
        dateStyle: "short",
        timeStyle: "medium"
      });
    }

    function getProfileId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function getBattleSortTime(battle) {
      const d = new Date(
        battle.battle_last_snapshot ||
        battle.last_snapshot ||
        battle.last_seen ||
        0
      );
      return Number.isNaN(d.getTime()) ? 0 : d.getTime();
    }

    function getSortedBattles(profile) {
      return (profile.battles || [])
        .slice()
        .sort((a, b) => getBattleSortTime(b) - getBattleSortTime(a));
    }

    function getFirstActiveDate(battle) {
      const series = Array.isArray(battle.series) ? battle.series : [];

      const firstActive = series.find(item => Number(item.points || 0) > 0 && item.t);

      if (firstActive) {
        return firstActive.t;
      }

      if (Number(battle.starting_points || 0) > 0) {
        return battle.first_seen || battle.battle_first_snapshot || battle.first_snapshot || null;
      }

      return null;
    }

    function getEventStartDate(battle) {
      return battle.battle_first_snapshot || battle.first_snapshot || battle.first_seen || null;
    }

    function getEventEndDate(battle) {
      return battle.battle_last_snapshot || battle.last_snapshot || battle.last_seen || null;
    }

    function getEndRank(battle) {
      if (battle.ending_rank !== undefined && battle.ending_rank !== null) return battle.ending_rank;
      if (battle.end_rank !== undefined && battle.end_rank !== null) return battle.end_rank;
      if (battle.last_known_rank !== undefined && battle.last_known_rank !== null) return battle.last_known_rank;
      return null;
    }

    function getChartPoints(series) {
      return (series || [])
        .map(item => ({
          t: new Date(item.t).getTime(),
          rawT: item.t,
          points: finiteNumber(item.points),
          rank: finiteNumber(item.rank)
        }))
        .filter(item => !Number.isNaN(item.t) && (item.points !== null || item.rank !== null));
    }

    function chartRange(values) {
      const numeric = values.filter(value => value !== null && Number.isFinite(value));
      if (!numeric.length) return null;
      return {
        min: Math.min(...numeric),
        max: Math.max(...numeric)
      };
    }

    function drawChart(canvas, tooltip, series, options = chartOptions) {
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      const chartPoints = getChartPoints(series);
      const showPoints = options.points !== false;
      const showRank = options.rank === true;
      const visiblePoints = chartPoints.filter(p =>
        (showPoints && p.points !== null) || (showRank && p.rank !== null)
      );
      const pointSeries = showPoints ? chartPoints.filter(p => p.points !== null) : [];
      const rankSeries = showRank ? chartPoints.filter(p => p.rank !== null) : [];

      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);

      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, rect.width, rect.height);

      if (visiblePoints.length < 2) {
        ctx.fillStyle = "#8b949e";
        ctx.font = "13px Arial";
        ctx.fillText("Not enough progression data to chart.", 16, 28);
        currentChart = null;
        return;
      }

      const minT = Math.min(...visiblePoints.map(p => p.t));
      const maxT = Math.max(...visiblePoints.map(p => p.t));
      const pointsRange = chartRange(pointSeries.map(p => p.points));
      const rankRange = chartRange(rankSeries.map(p => p.rank));

      const padLeft = 48;
      const padRight = showRank ? 48 : 18;
      const padTop = 18;
      const padBottom = 34;

      const width = rect.width - padLeft - padRight;
      const height = rect.height - padTop - padBottom;

      function x(t) {
        if (maxT === minT) return padLeft;
        return padLeft + ((t - minT) / (maxT - minT)) * width;
      }

      function yPoints(v) {
        if (!pointsRange) return padTop + height / 2;
        if (pointsRange.max === pointsRange.min) return padTop + height / 2;
        return padTop + (1 - ((v - pointsRange.min) / (pointsRange.max - pointsRange.min))) * height;
      }

      function yRank(v) {
        if (!rankRange) return padTop + height / 2;
        if (rankRange.max === rankRange.min) return padTop + height / 2;
        return padTop + ((v - rankRange.min) / (rankRange.max - rankRange.min)) * height;
      }

      function niceLabel(v) {
        const tiers = [
          { value: 1e12, suffix: "T" },
          { value: 1e9, suffix: "B" },
          { value: 1e6, suffix: "M" },
          { value: 1e3, suffix: "K" }
        ];

        for (const tier of tiers) {
          if (Math.abs(v) >= tier.value) {
            return (v / tier.value).toFixed(1).replace(/\.0$/, "") + tier.suffix;
          }
        }

        return String(Math.round(v));
      }

      function rankLabel(v) {
        return `#${Math.round(v)}`;
      }

      ctx.strokeStyle = "#30363d";
      ctx.lineWidth = 1;
      ctx.font = "12px Arial";
      ctx.fillStyle = "#8b949e";

      const gridLines = 4;

      for (let i = 0; i <= gridLines; i++) {
        const pct = i / gridLines;
        const yy = padTop + pct * height;

        ctx.beginPath();
        ctx.moveTo(padLeft, yy);
        ctx.lineTo(rect.width - padRight, yy);
        ctx.stroke();

        if (pointsRange) {
          const value = pointsRange.max - pct * (pointsRange.max - pointsRange.min);
          ctx.textAlign = "left";
          ctx.fillText(niceLabel(value), 8, yy + 4);
        } else if (rankRange) {
          const value = rankRange.min + pct * (rankRange.max - rankRange.min);
          ctx.textAlign = "left";
          ctx.fillText(rankLabel(value), 8, yy + 4);
        }

        if (pointsRange && rankRange) {
          const rankValue = rankRange.min + pct * (rankRange.max - rankRange.min);
          const label = rankLabel(rankValue);
          ctx.textAlign = "right";
          ctx.fillText(label, rect.width - 8, yy + 4);
        }
      }

      function drawSeries(points, valueKey, yFn, color, widthPx = 2) {
        if (points.length < 2) return;

        ctx.strokeStyle = color;
        ctx.lineWidth = widthPx;
        ctx.beginPath();

        points.forEach((p, i) => {
          const px = x(p.t);
          const py = yFn(p[valueKey]);

          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });

        ctx.stroke();

        const last = points[points.length - 1];
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x(last.t), yFn(last[valueKey]), 3, 0, Math.PI * 2);
        ctx.fill();
      }

      drawSeries(pointSeries, "points", yPoints, "#ff9b96", 2);
      drawSeries(rankSeries, "rank", yRank, "#e6edf3", 2);

      ctx.fillStyle = "#8b949e";
      ctx.textAlign = "left";

      const firstDate = new Date(minT);
      const lastDate = new Date(maxT);

      ctx.fillText(
        firstDate.toLocaleDateString(undefined, { month: "short", day: "numeric" }),
        padLeft,
        rect.height - 12
      );

      const lastLabel = lastDate.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      const labelWidth = ctx.measureText(lastLabel).width;

      ctx.textAlign = "left";
      ctx.fillText(
        lastLabel,
        rect.width - padRight - labelWidth,
        rect.height - 12
      );

      currentChart = {
        canvas,
        tooltip,
        points: visiblePoints,
        x,
        yPoints,
        yRank,
        showPoints: Boolean(pointsRange),
        showRank: Boolean(rankRange),
        rect,
        padTop,
        padBottom
      };
    }

    function redrawActiveChart() {
      if (!loadedProfile) return;

      const battles = getSortedBattles(loadedProfile);
      const battle = battles[selectedBattleIndex];

      if (!battle) return;

      const canvas = document.querySelector(".chart-box");
      const tooltip = document.querySelector(".tooltip");

      if (!canvas || !tooltip) return;

      drawChart(canvas, tooltip, battle.series || [], chartOptions);
    }

    function updateChartLegend() {
      const pointsLegend = document.querySelector(".legend-points");
      const rankLegend = document.querySelector(".legend-rank");

      if (pointsLegend) pointsLegend.hidden = !chartOptions.points;
      if (rankLegend) rankLegend.hidden = !chartOptions.rank;
    }

    function bindChartControls() {
      const pointsToggle = document.getElementById("chart-points-toggle");
      const rankToggle = document.getElementById("chart-rank-toggle");

      if (!pointsToggle || !rankToggle) return;

      pointsToggle.checked = chartOptions.points;
      rankToggle.checked = chartOptions.rank;
      updateChartLegend();

      function update(ev) {
        if (!pointsToggle.checked && !rankToggle.checked) {
          ev.target.checked = true;
          return;
        }

        chartOptions = {
          points: pointsToggle.checked,
          rank: rankToggle.checked
        };

        updateChartLegend();
        redrawActiveChart();
      }

      pointsToggle.addEventListener("change", update);
      rankToggle.addEventListener("change", update);
    }

    function bindChartHover() {
      const canvas = document.querySelector(".chart-box");
      const tooltip = document.querySelector(".tooltip");

      if (!canvas || !tooltip) return;

      function hideTooltip() {
        tooltip.style.display = "none";
      }

      function showTooltip(ev) {
        if (!currentChart || !currentChart.points.length) return;

        const rect = canvas.getBoundingClientRect();
        const mx = ev.clientX - rect.left;

        let nearest = currentChart.points[0];
        let nearestDist = Math.abs(currentChart.x(nearest.t) - mx);

        for (const p of currentChart.points) {
          const dist = Math.abs(currentChart.x(p.t) - mx);
          if (dist < nearestDist) {
            nearest = p;
            nearestDist = dist;
          }
        }

        redrawActiveChart();

        const ctx = canvas.getContext("2d");
        const px = currentChart.x(nearest.t);
        ctx.save();
        ctx.strokeStyle = "rgba(248, 81, 73, 0.45)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px, currentChart.padTop);
        ctx.lineTo(px, currentChart.rect.height - currentChart.padBottom);
        ctx.stroke();

        if (currentChart.showPoints && nearest.points !== null) {
          ctx.fillStyle = "#ff9b96";
          ctx.beginPath();
          ctx.arc(px, currentChart.yPoints(nearest.points), 4, 0, Math.PI * 2);
          ctx.fill();
        }

        if (currentChart.showRank && nearest.rank !== null) {
          ctx.fillStyle = "#e6edf3";
          ctx.beginPath();
          ctx.arc(px, currentChart.yRank(nearest.rank), 4, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();

        tooltip.innerHTML = `
          <strong>${fmtDateTime(nearest.rawT)}</strong>
          ${currentChart.showPoints ? `<div>Points: ${fmtNum(nearest.points)}</div>` : ""}
          ${currentChart.showRank ? `<div>Rank: ${nearest.rank === null ? "-" : fmtNum(nearest.rank)}</div>` : ""}
        `;

        tooltip.style.display = "block";

        const tooltipRect = tooltip.getBoundingClientRect();
        let left = ev.clientX - rect.left + 14;
        let top = ev.clientY - rect.top + 14;

        if (left + tooltipRect.width > rect.width) {
          left = ev.clientX - rect.left - tooltipRect.width - 14;
        }

        if (top + tooltipRect.height > rect.height) {
          top = ev.clientY - rect.top - tooltipRect.height - 14;
        }

        tooltip.style.left = `${Math.max(8, left)}px`;
        tooltip.style.top = `${Math.max(8, top)}px`;
      }

      canvas.addEventListener("mousemove", showTooltip);
      canvas.addEventListener("mouseleave", hideTooltip);
      canvas.addEventListener("touchstart", ev => {
        if (ev.touches && ev.touches[0]) showTooltip(ev.touches[0]);
      }, { passive: true });
      canvas.addEventListener("touchmove", ev => {
        if (ev.touches && ev.touches[0]) showTooltip(ev.touches[0]);
      }, { passive: true });
      canvas.addEventListener("touchend", hideTooltip);
    }

    function renderBattle(profile, battleIndex) {
      const battles = getSortedBattles(profile);
      const battle = battles[battleIndex];
      const container = document.getElementById("battle-detail");

      if (!battle) {
        container.innerHTML = `<div class="empty">No battle selected.</div>`;
        return;
      }

      const eventStart = fmtDate(getEventStartDate(battle));
      const eventEnd = fmtDate(getEventEndDate(battle));
      const firstActiveDate = fmtDate(getFirstActiveDate(battle));
      const endRank = getEndRank(battle);

      container.innerHTML = `
        <article class="battle-card">
          <div class="battle-header">
            <h3 class="battle-title">${escapeHtml(battle.display_name || battle.battle || "Unknown Battle")}</h3>
            <div class="battle-dates">${eventStart} → ${eventEnd}</div>
          </div>

          <div class="stats">
            <div class="stat-row">
              <div class="stat-label">First Active Date</div>
              <div class="stat-value">${firstActiveDate}</div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Starting Rank</div>
              <div class="stat-value">${fmtNum(battle.starting_rank)}</div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Worst Rank</div>
              <div class="stat-value">${fmtNum(battle.worst_rank)}</div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Best Rank</div>
              <div class="stat-value">${fmtNum(battle.best_rank)}</div>
            </div>

            <div class="stat-row">
              <div class="stat-label">End Rank</div>
              <div class="stat-value">${fmtNum(endRank)}</div>
            </div>

            <div class="stat-row">
              <div class="stat-label">Ending Points</div>
              <div class="stat-value">${fmtNum(battle.ending_points)}</div>
            </div>
          </div>

          ${
            Array.isArray(battle.series) && battle.series.length > 1
              ? `
                <div class="chart-wrap">
                  <div class="chart-head">
                    <div class="chart-title">Progression</div>
                    <div class="chart-toggles" role="group" aria-label="Progression series">
                      <label class="chart-toggle">
                        <input id="chart-points-toggle" type="checkbox" checked>
                        <span>Points</span>
                      </label>
                      <label class="chart-toggle">
                        <input id="chart-rank-toggle" type="checkbox">
                        <span>Rank</span>
                      </label>
                    </div>
                  </div>
                  <div class="chart-legend" aria-hidden="true">
                    <span class="legend-item legend-points"><span class="legend-dot"></span>Points Progression</span>
                    <span class="legend-item legend-rank"><span class="legend-dot"></span>Rank Progression</span>
                  </div>
                  <canvas class="chart-box"></canvas>
                  <div class="tooltip"></div>
                </div>
              `
              : ""
          }
        </article>
      `;

      requestAnimationFrame(() => {
        bindChartControls();
        redrawActiveChart();
        bindChartHover();
      });
    }

    function render(profile) {
      loadedProfile = profile;

      const app = document.getElementById("app");
      const battles = getSortedBattles(profile);

      selectedBattleIndex = 0;

      app.innerHTML = `
        <section class="profile-header">
          <img class="avatar" src="${escapeHtml(profile.avatar_url || DEFAULT_AVATAR_SVG)}" alt="">
          <div>
            <h2 class="profile-name">${escapeHtml(profile.username || "Unknown")}</h2>
            <div class="profile-meta">
              User ID: ${escapeHtml(profile.user_id ?? "N/A")}<br>
              ${
                profile.profile_url
                  ? `<a href="${escapeHtml(profile.profile_url)}" target="_blank" rel="noopener">Open Roblox Profile</a>`
                  : ""
              }
            </div>
          </div>
        </section>

        <section class="cards">
          <div class="card">
            <div class="label">Battles</div>
            <div class="value">${fmtNum(profile.total_battles)}</div>
          </div>

          <div class="card">
            <div class="label">Latest Rank</div>
            <div class="value">${fmtNum(profile.latest_rank)}</div>
          </div>

          <div class="card">
            <div class="label">Latest Points</div>
            <div class="value">${fmtNum(profile.latest_points)}</div>
          </div>

          <div class="card">
            <div class="label">Latest Seen</div>
            <div class="value">${fmtDateTime(profile.latest_seen)}</div>
          </div>
        </section>

        <div class="section-title-row">
          <h2 class="section-title">Battle History</h2>

          <select id="battle-select">
            ${battles.map((battle, index) => `
              <option value="${index}">
                ${escapeHtml(battle.display_name || battle.battle || `Battle ${index + 1}`)}
              </option>
            `).join("")}
          </select>
        </div>

        <section id="battle-detail"></section>
      `;

      if (!battles.length) {
        document.getElementById("battle-detail").innerHTML = `<div class="empty">No battle history found for this player.</div>`;
        return;
      }

      document.getElementById("battle-select").addEventListener("change", ev => {
        selectedBattleIndex = Number(ev.target.value || 0);
        renderBattle(profile, selectedBattleIndex);
      });

      renderBattle(profile, selectedBattleIndex);
    }

    function normalizeProfileKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[^a-z0-9_]/g, "");
    }

    async function fetchLiveJson(url, label) {
      const res = await fetch(`${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`, {
        cache: "no-store"
      });

      if (!res.ok) {
        throw new Error(`Could not load ${label}. HTTP ${res.status}`);
      }

      return res.json();
    }

    function findCurrentRow(current, id) {
      const raw = String(id || "").trim();
      const normalized = normalizeProfileKey(raw);

      return (current.rows || []).find(row =>
        String(row.user_id || "") === raw ||
        normalizeProfileKey(row.username) === normalized
      ) || null;
    }

    function summarizeLiveProfile(current, history, id) {
      const currentRow = findCurrentRow(current, id);
      const userId = currentRow?.user_id || (/^\d+$/.test(String(id)) ? Number(id) : null);
      const rows = Array.isArray(history?.rows) ? history.rows.slice() : [];

      if (!rows.length && currentRow) {
        rows.push({
          fetched_at: currentRow.fetched_at || current.snapshot_at || current.generated_at,
          rank: currentRow.rank,
          username: currentRow.username,
          user_id: currentRow.user_id,
          total_points: currentRow.total_points
        });
      }

      if (!rows.length && !currentRow) {
        throw new Error(`No live ${PROFILE_CLAN_DISPLAY} profile data found for ${id}.`);
      }

      rows.sort((a, b) => new Date(a.fetched_at || 0) - new Date(b.fetched_at || 0));

      const first = rows[0] || currentRow || {};
      const last = rows[rows.length - 1] || currentRow || {};
      const ranks = rows.map(row => Number(row.rank)).filter(Number.isFinite);
      const points = rows.map(row => Number(row.total_points || 0)).filter(Number.isFinite);
      const username = currentRow?.username || last.username || first.username || String(id);
      const latestPoints = currentRow?.total_points ?? last.total_points ?? 0;
      const latestRank = currentRow?.rank ?? last.rank ?? null;
      const latestSeen = currentRow?.fetched_at || last.fetched_at || current.snapshot_at || current.generated_at || null;

      const battle = {
        battle: current.battle || "current",
        display_name: current.display_name || current.battle || "Current Clan Battle",
        battle_first_snapshot: current.battle_start_iso || first.fetched_at || null,
        battle_last_snapshot: latestSeen,
        first_seen: first.fetched_at || null,
        last_seen: latestSeen,
        starting_rank: first.rank ?? null,
        starting_points: first.total_points ?? null,
        worst_rank: ranks.length ? Math.max(...ranks) : null,
        best_rank: ranks.length ? Math.min(...ranks) : null,
        ending_rank: latestRank,
        ending_points: latestPoints,
        series: rows.map(row => ({
          t: row.fetched_at,
          rank: row.rank ?? null,
          points: Number(row.total_points || 0)
        })).filter(point => point.t)
      };

      return {
        aliases: [String(id)],
        username,
        user_id: userId,
        avatar_url: currentRow?.avatar_url || null,
        profile_url: userId ? `https://www.roblox.com/users/${userId}/profile` : null,
        total_battles: 1,
        latest_rank: latestRank,
        latest_points: latestPoints,
        latest_seen: latestSeen,
        battles: [battle]
      };
    }

    async function loadLiveProfile(id) {
      const current = await fetchLiveJson(
        withClanQuery(MEMBER_API_CURRENT_URL),
        `live ${PROFILE_CLAN_DISPLAY} leaderboard`
      );
      const currentRow = findCurrentRow(current, id);
      const userId = currentRow?.user_id || (/^\d+$/.test(String(id)) ? id : "");

      if (!userId) {
        return summarizeLiveProfile(current, { rows: [] }, id);
      }

      const historyUrl = withClanQuery(MEMBER_API_HISTORY_URL, {
        user_id: String(userId),
        battle: current.battle || undefined,
        hours: "336",
        limit: "50000"
      });

      const history = await fetchLiveJson(historyUrl, `live ${PROFILE_CLAN_DISPLAY} profile history`);
      return summarizeLiveProfile(current, history, userId);
    }

    async function main() {
      applyClanChrome();

      const app = document.getElementById("app");
      const id = getProfileId();

      if (!id) {
        app.innerHTML = `<div class="error">Missing profile ID.</div>`;
        return;
      }

      try {
        const profile = await loadLiveProfile(id);

        document.title = `${profile.username || "Player"} - ${PROFILE_CLAN_DISPLAY} Profile`;
        render(profile);
      } catch (err) {
        console.error(err);
        app.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
      }
    }

    window.addEventListener("resize", () => {
      redrawActiveChart();
    });

    main();
  </script>
</body>
