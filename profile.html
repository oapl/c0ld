<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NONG Player Profile</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #58a6ff;
      --hover: #1f2630;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .github-btn {
      display: inline-block;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .github-btn:hover {
      background: var(--hover);
      border-color: var(--link);
    }

    .menu-bar {
      max-width: 1200px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .menu-btn:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px 24px;
    }

    .profile {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-bottom: 24px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 10px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0 0 6px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
    }

    .battle {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 8px;
      text-align: left;
    }

    th {
      color: var(--muted);
      font-weight: normal;
    }

    canvas {
      margin-top: 18px;
      max-height: 360px;
    }

    .error {
      border: 1px solid var(--danger);
      background: var(--danger-bg);
      color: #ffb4ad;
      border-radius: 10px;
      padding: 16px;
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 16px 10px;
      }

      main {
        padding: 16px;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      .profile {
        align-items: flex-start;
      }

      .avatar {
        width: 72px;
        height: 72px;
      }

      .menu-bar {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="title-wrap">
        <h1>Player Profile</h1>
        <div class="subtitle">NONG clan battle history</div>
      </div>

      <a
        class="github-btn"
        href="https://github.com/OpalApocalypse/NONG_Leaderboard"
        target="_blank"
        rel="noopener"
      >GitHub</a>
    </div>

    <div class="menu-bar">
      <a class="menu-btn" href="index.html">Current Leaderboard</a>
      <a class="menu-btn" href="players.html">Player Profiles</a>
      <a class="menu-btn" href="index.html#history">Clan History</a>
    </div>
  </header>

  <main>
    <div id="status">Loading profile...</div>
    <div id="content" style="display:none;"></div>
  </main>

  <script>
    function fmtNum(n) {
      if (n === null || n === undefined || n === "" || Number.isNaN(Number(n))) return "N/A";
      return Number(n).toLocaleString("en-US");
    }

    function fmtDate(s) {
      if (!s) return "N/A";
      return new Date(s).toLocaleString();
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getProfileId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function card(label, value) {
      return `
        <div class="card">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </div>
      `;
    }

    function renderChart(canvas, battle) {
      const labels = battle.series.map(p => new Date(p.t).toLocaleString());
      const points = battle.series.map(p => p.points);

      new Chart(canvas, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Points",
              data: points,
              tension: 0.25
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: {
                color: "#e6edf3"
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: "#8b949e",
                maxTicksLimit: 8
              },
              grid: {
                color: "#30363d"
              }
            },
            y: {
              ticks: {
                color: "#8b949e"
              },
              grid: {
                color: "#30363d"
              }
            }
          }
        }
      });
    }

    async function main() {
      const id = getProfileId();

      if (!id) {
        document.getElementById("status").textContent = "Missing profile id.";
        return;
      }

      const res = await fetch(`Data/players/${encodeURIComponent(id)}.json?v=${Date.now()}`);

      if (!res.ok) {
        document.getElementById("status").textContent = "Profile not found.";
        return;
      }

      const p = await res.json();

      document.title = `${p.username} - NONG Profile`;

      const content = document.getElementById("content");

      content.innerHTML = `
        <div class="profile">
          <img class="avatar" src="${p.avatar_url || "assets/embed-spacer.png"}" alt="">
          <div>
            <h1>${escapeHtml(p.username)}</h1>
            <div class="muted">User ID: ${p.user_id ?? "N/A"}</div>
            ${p.profile_url ? `<div><a href="${p.profile_url}" target="_blank" rel="noopener">Open Roblox Profile</a></div>` : ""}
          </div>
        </div>

        <div class="cards">
          ${card("Battles", p.total_battles)}
          ${card("Latest Rank", p.latest_rank ?? "N/A")}
          ${card("Latest Points", fmtNum(p.latest_points))}
          ${card("Latest Seen", fmtDate(p.latest_seen))}
        </div>

        <h2>Battle History</h2>
        <div id="battles"></div>
      `;

      const battlesDiv = content.querySelector("#battles");

      for (const battle of p.battles) {
        const div = document.createElement("div");
        div.className = "battle";

        div.innerHTML = `
          <h3>${escapeHtml(battle.display_name)}</h3>
          <div class="muted">${fmtDate(battle.first_seen)} → ${fmtDate(battle.last_seen)}</div>

          <table>
            <tr><th>Starting Rank</th><td>${battle.starting_rank ?? "N/A"}</td></tr>
            <tr><th>Last Known Rank</th><td>${battle.last_rank ?? "N/A"}</td></tr>
            <tr><th>Best Rank</th><td>${battle.best_rank ?? "N/A"}</td></tr>
            <tr><th>Starting Points</th><td>${fmtNum(battle.starting_points)}</td></tr>
            <tr><th>Ending Points</th><td>${fmtNum(battle.ending_points)}</td></tr>
            <tr><th>Gained Points</th><td>${fmtNum(battle.gained_points)}</td></tr>
            <tr><th>Snapshots Seen</th><td>${fmtNum(battle.snapshot_count)}</td></tr>
            <tr><th>Present at Final Snapshot</th><td>${battle.present_at_final_snapshot ? "Yes" : "No"}</td></tr>
          </table>

          ${battle.note ? `<p class="muted">${escapeHtml(battle.note)}</p>` : ""}

          <canvas></canvas>
        `;

        battlesDiv.appendChild(div);
        renderChart(div.querySelector("canvas"), battle);
      }

      document.getElementById("status").style.display = "none";
      content.style.display = "block";
    }

    main().catch(err => {
      console.error(err);
      document.getElementById("status").innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
    });
  </script>
</body>
</html>
