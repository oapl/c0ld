<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YAMO League Tracker</title>
<style>
body{margin:0;background:#0d1117;color:#e6edf3;font-family:Arial,Helvetica,sans-serif}a{color:#ff9b96;text-decoration:none}header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 22px 10px;text-align:center}.site-logo{width:76px;border-radius:10px}.menu{margin-top:9px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.menu a{display:inline-block;padding:7px 12px;border:1px solid #30363d;border-radius:5px;background:#0f141b;color:#e6edf3;font-size:13px}.menu a.active{border-color:#ff9b96;color:#ff9b96;background:rgba(248,81,73,.12)}main{max-width:1280px;margin:0 auto;padding:22px 24px 28px}.hero,.section,.card{background:#161b22;border:1px solid #30363d;border-radius:10px}.hero{padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:12px}.league-main-icon{width:52px;height:52px;border-radius:12px;background:#21262d;object-fit:cover}.hero h1{margin:0;font-size:26px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:18px}.card{padding:16px;text-align:center;min-height:92px;display:flex;flex-direction:column;justify-content:center}.label{color:#8b949e;font-size:13px}.value{font-size:20px;font-weight:700;margin-top:6px}.section{overflow:hidden}.section-header{padding:16px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.section-title{margin:0;font-size:18px}input,button{border:1px solid #30363d;border-radius:6px;background:#0f141b;color:#e6edf3;padding:9px 11px;font-size:14px}button{cursor:pointer}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1000px}th,td{padding:12px 14px;border-bottom:1px solid #30363d;white-space:nowrap;vertical-align:middle}th{color:#8b949e;font-size:13px;font-weight:500;text-align:left;cursor:pointer}.numeric{text-align:right;font-variant-numeric:tabular-nums}.rank{font-weight:700}.player-cell{display:flex;align-items:center;gap:10px;font-weight:700}.avatar{width:36px;height:36px;border-radius:8px;background:#21262d;color:#c9d1d9;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;object-fit:cover}.meta{color:#8b949e;font-size:12px;margin-top:2px}.positive{color:#3fb950;font-weight:700}.negative{color:#f85149;font-weight:700}.zero,.unknown{color:#8b949e}.empty,.error{padding:20px}.error{color:#ffb4ad;background:rgba(248,81,73,.12)}tbody tr:hover{background:rgba(255,255,255,.02)}@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}}@media(max-width:650px){main{padding:16px}.cards{grid-template-columns:1fr}input,button{width:100%}}
</style>
</head>
<body>
<header><a href="index.html"><img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a><div class="menu"><a href="index.html">c0ld Leaderboard</a><a class="active" href="yamo.html">YAMO League</a><a href="top-leagues.html">Top 100 Leagues</a><a href="clans.html">Clans Leaderboard</a><a href="live-clan.html">Clan Lookup</a><a href="servers.html">Servers</a><a href="macros.html">Macros</a></div></header>
<main>
<section class="hero"><img id="league-icon" class="league-main-icon" src="" alt="" hidden><h1 id="page-title">YAMO League Tracker</h1></section>
<section class="cards"><div class="card"><div class="label">League Points</div><div class="value" id="league-points">—</div></div><div class="card"><div class="label">Members</div><div class="value" id="member-count">—</div></div><div class="card"><div class="label">Last DB Update</div><div class="value" id="last-db-update">—</div></div><div class="card"><div class="label">League Rank</div><div class="value" id="league-rank">—</div></div></section>
<section class="section"><div class="section-header"><h2 class="section-title">YAMO Member Progress</h2><div><input id="search-input" type="text" placeholder="Search members..." autocomplete="off"><button id="refresh-btn" type="button">Refresh</button></div></div><div class="table-wrap"><table><thead><tr><th data-sort="rank">Rank</th><th data-sort="display_name">Player</th><th data-sort="total_points" class="numeric">Total Points</th><th data-sort="gain_5m" class="numeric">5 Minutes</th><th data-sort="gain_1h" class="numeric">1 Hour</th><th data-sort="gain_6h" class="numeric">6 Hours</th><th data-sort="gain_12h" class="numeric">12 Hours</th><th data-sort="gain_24h" class="numeric">Daily</th></tr></thead><tbody id="members-tbody"><tr><td colspan="8" class="empty">Loading YAMO league data...</td></tr></tbody></table></div></section>
</main>
<script>
const API="https://yamo-league-api-worker.opal-dde.workers.dev",LEAGUE="YAMO";
let rows=[],sortKey="rank",sortAsc=true,loading=false;
function esc(v){return String(v??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function shortNum(v){const n=Number(v);if(!Number.isFinite(n))return"—";const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2).replace(/\.00$/,"")+"T";if(a>=1e9)return(n/1e9).toFixed(2).replace(/\.00$/,"")+"B";if(a>=1e6)return(n/1e6).toFixed(2).replace(/\.00$/,"")+"M";if(a>=1e3)return(n/1e3).toFixed(2).replace(/\.00$/,"")+"K";return n.toLocaleString("en-US")}
function fullNum(v){const n=Number(v);return Number.isFinite(n)?n.toLocaleString("en-US"):"—"}
function dt(v){const d=new Date(v||0);return Number.isNaN(d.getTime())?"—":d.toLocaleString()}
function delta(v){if(v===null||v===undefined)return'<span class="unknown">—</span>';const n=Number(v);if(!Number.isFinite(n))return'<span class="unknown">—</span>';if(n>0)return'<span class="positive">+'+shortNum(n)+'</span>';if(n<0)return'<span class="negative">'+shortNum(n)+'</span>';return'<span class="zero">0</span>'}
function initials(s){s=String(s||"?").trim();return s.slice(0,2).toUpperCase()}
function iconUrl(icon){const t=String(icon||"").trim();if(!t)return"";if(/^https?:\/\//i.test(t)||t.startsWith("data:"))return t;const m=t.match(/rbxassetid:\/\/(\d+)/i);if(m)return"https://ps99.biggamesapi.io/image/"+encodeURIComponent(m[1]);if(/^\d+$/.test(t))return"https://ps99.biggamesapi.io/image/"+encodeURIComponent(t);return""}
function avatar(r){const url=String(r.avatar_url||"").trim();return url?'<img class="avatar" src="'+esc(url)+'" alt="">':'<span class="avatar">'+esc(initials(r.display_name))+'</span>'}
function compare(a,b,k,asc){const an=Number(a[k]),bn=Number(b[k]);let r=Number.isFinite(an)&&Number.isFinite(bn)?an-bn:String(a[k]||"").localeCompare(String(b[k]||""));return asc?r:-r}
function visible(){const q=document.getElementById("search-input").value.trim().toLowerCase();let list=rows.slice();if(q)list=list.filter(r=>String(r.display_name||"").toLowerCase().includes(q)||String(r.username||"").toLowerCase().includes(q)||String(r.user_id||"").includes(q));list.sort((a,b)=>compare(a,b,sortKey,sortAsc));return list}
function renderCards(data){const list=data.rows||[];document.getElementById("league-points").textContent=shortNum(data.league_points);document.getElementById("league-points").title=fullNum(data.league_points);document.getElementById("member-count").textContent=list.length+"/"+(data.member_capacity||"—");document.getElementById("last-db-update").textContent=data.snapshot_at?dt(data.snapshot_at):"—";document.getElementById("page-title").textContent=(data.league_name||LEAGUE)+" League Tracker";document.getElementById("league-rank").textContent=data.league_rank?"#"+data.league_rank:"—";const img=document.getElementById("league-icon"),src=iconUrl(data.league_icon);if(src){img.src=src;img.hidden=false}else img.hidden=true}
function render(){const tbody=document.getElementById("members-tbody"),list=visible();if(!list.length){tbody.innerHTML='<tr><td colspan="8" class="empty">No stored YAMO members found yet.</td></tr>';return}tbody.innerHTML=list.map(r=>{const name=r.username||r.display_name||r.user_id,profile="https://www.roblox.com/users/"+encodeURIComponent(r.user_id)+"/profile";return'<tr><td class="rank">#'+esc(r.rank)+'</td><td><a class="player-cell" href="'+profile+'" target="_blank" rel="noopener">'+avatar(r)+'<span><span>'+esc(name)+'</span><div class="meta">'+esc(r.user_id)+'</div></span></a></td><td class="numeric" title="'+esc(fullNum(r.total_points))+'">'+esc(shortNum(r.total_points))+'</td><td class="numeric">'+delta(r.gain_5m)+'</td><td class="numeric">'+delta(r.gain_1h)+'</td><td class="numeric">'+delta(r.gain_6h)+'</td><td class="numeric">'+delta(r.gain_12h)+'</td><td class="numeric">'+delta(r.gain_24h)+'</td></tr>'}).join("")}
function showError(msg){document.getElementById("members-tbody").innerHTML='<tr><td colspan="8" class="error">'+esc(msg)+'</td></tr>'}
async function loadData(){if(loading)return;loading=true;try{const u=new URL(API+"/api/leagues/current");u.searchParams.set("league",LEAGUE);u.searchParams.set("v",Date.now());const r=await fetch(u,{cache:"no-store"});const data=await r.json();if(!r.ok||data.ok===false)throw new Error(data.message||"HTTP "+r.status);rows=data.rows||[];renderCards(data);render()}catch(e){console.error(e);showError(e.message||String(e))}finally{loading=false}}
document.getElementById("refresh-btn").addEventListener("click",loadData);document.getElementById("search-input").addEventListener("input",render);document.querySelectorAll("th[data-sort]").forEach(th=>th.addEventListener("click",()=>{const k=th.dataset.sort;if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=k==="rank"||k==="display_name"}render()}));loadData();setInterval(loadData,60000);
</script>
</body>
</html>
