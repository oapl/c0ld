<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YAMO League Tracker</title>
<style>
*{box-sizing:border-box}:root{--bg:#0d1117;--panel:#161b22;--panel2:#0f141b;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--link:#ff9b96;--hover:#1f2630;--good:#3fb950;--danger-bg:rgba(248,81,73,.12)}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}a{color:var(--link);text-decoration:none}header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 22px 10px}.header-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:center}.site-logo{display:block;width:76px;border-radius:10px}.menu-bar{max-width:1280px;margin:9px auto 0;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.menu-btn{display:inline-block;padding:7px 12px;border:1px solid var(--border);border-radius:5px;background:var(--panel2);color:var(--text);font-size:13px}.menu-btn:hover{background:var(--hover);border-color:var(--link)}.menu-btn.active{border-color:var(--link);color:var(--link);background:rgba(248,81,73,.12)}main{max-width:1280px;margin:0 auto;padding:22px 24px 28px}.hero{border:1px solid var(--border);border-radius:10px;background:var(--panel);padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:12px}.league-icon{width:52px;height:52px;border-radius:12px;background:#21262d;object-fit:cover}h1{margin:0;font-size:26px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:18px}.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;min-height:92px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.label{color:var(--muted);font-size:13px;margin-bottom:6px}.value{font-size:20px;font-weight:700}.section{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}.section-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.section-title{margin:0;font-size:18px}.controls{display:flex;gap:10px;flex-wrap:wrap}input,button{border:1px solid var(--border);border-radius:6px;background:var(--panel2);color:var(--text);padding:9px 11px;font-size:14px}button{cursor:pointer}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1000px}th,td{padding:12px 14px;border-bottom:1px solid var(--border);white-space:nowrap}th{color:var(--muted);font-size:13px;font-weight:500;text-align:left;cursor:pointer}.numeric{text-align:right;font-variant-numeric:tabular-nums}.rank{font-weight:700}.player-cell{display:flex;align-items:center;gap:10px;font-weight:700}.avatar{width:36px;height:36px;border-radius:8px;background:#21262d;color:#c9d1d9;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;object-fit:cover}.player-meta{color:var(--muted);font-size:12px;margin-top:2px;font-weight:400}.positive{color:var(--good);font-weight:700}.zero,.unknown{color:var(--muted)}.empty-state,.error-state{padding:20px 18px}.error-state{color:#ffb4ad;background:var(--danger-bg)}tbody tr:hover{background:rgba(255,255,255,.02)}@media(max-width:1050px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:700px){main{padding:16px}.cards{grid-template-columns:1fr}.controls,input,button{width:100%;min-width:0}.menu-bar{justify-content:flex-start}}
</style>
</head>
<body>
<header>
<div class="header-inner"><a href="index.html"><img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a></div>
<div class="menu-bar"><a class="menu-btn" href="index.html">c0ld Leaderboard</a><a class="menu-btn active" href="yamo.html">YAMO League</a><a class="menu-btn" href="clans.html">Clans Leaderboard</a><a class="menu-btn" href="live-clan.html">Clan Lookup</a><a class="menu-btn" href="servers.html">Servers</a><a class="menu-btn" href="macros.html">Macros</a></div>
</header>
<main>
<section class="hero"><img id="league-icon" class="league-icon" src="" alt="" hidden><h1 id="page-title">YAMO League Tracker</h1></section>
<section class="cards"><div class="card"><div class="label">League Points</div><div class="value" id="league-points">—</div></div><div class="card"><div class="label">Members</div><div class="value" id="member-count">—</div></div><div class="card"><div class="label">Last DB Update</div><div class="value" id="last-db-update">—</div></div><div class="card"><div class="label">League Rank</div><div class="value" id="league-rank">—</div></div></section>
<section class="section"><div class="section-header"><h2 class="section-title">YAMO Member Progress</h2><div class="controls"><input id="search-input" type="text" placeholder="Search members..." autocomplete="off"><button id="refresh-btn" type="button">Refresh</button><button id="export-btn" type="button">Export 24h History</button></div></div><div class="table-wrap"><table><thead><tr><th data-sort="rank">Rank</th><th data-sort="display_name">Player</th><th data-sort="total_points" class="numeric">Total Points</th><th data-sort="gain_5m" class="numeric">5 Minutes</th><th data-sort="gain_1h" class="numeric">1 Hour</th><th data-sort="gain_6h" class="numeric">6 Hours</th><th data-sort="gain_12h" class="numeric">12 Hours</th><th data-sort="gain_24h" class="numeric">Daily</th></tr></thead><tbody id="members-tbody"><tr><td colspan="8" class="empty-state">Loading YAMO league data...</td></tr></tbody></table></div></section>
</main>
<script>
const LEAGUE_NAME="YAMO";
const LEAGUE_API_BASE="https://c0ld-league-api-worker.opal-dde.workers.dev";
const AUTO_REFRESH_MS=60*1000;
const DEFAULT_ICON="data:image/svg+xml;utf8,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96"><rect width="96" height="96" rx="18" fill="#21262d"/><path d="M29 65V34l19-10 19 10v31L48 75 29 65z" fill="#6e7681"/></svg>');
let currentRows=[];
let sortKey="rank";
let sortAsc=true;
let isLoading=false;
function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function shortNum(v){if(v===null||v===undefined||v==="")return"—";const n=Number(v);if(!Number.isFinite(n))return esc(v);const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2).replace(/\.00$/,"")+"T";if(a>=1e9)return(n/1e9).toFixed(2).replace(/\.00$/,"")+"B";if(a>=1e6)return(n/1e6).toFixed(2).replace(/\.00$/,"")+"M";if(a>=1e3)return(n/1e3).toFixed(2).replace(/\.00$/,"")+"K";return n.toLocaleString("en-US")}
function fullNum(v){const n=Number(v);return Number.isFinite(n)?n.toLocaleString("en-US"):"—"}
function delta(v){if(v===null||v===undefined)return'<span class="unknown">—</span>';const n=Number(v);if(!Number.isFinite(n))return'<span class="unknown">—</span>';if(n>0)return'<span class="positive">+'+esc(shortNum(n))+'</span>';if(n<0)return'<span class="positive">'+esc(shortNum(n))+'</span>';return'<span class="zero">0</span>'}
function pad(n){return String(n).padStart(2,"0")}
function dt(v){if(!v)return"—";const d=new Date(v);if(Number.isNaN(d.getTime()))return"—";return pad(d.getMonth()+1)+"/"+pad(d.getDate())+"/"+d.getFullYear()+", "+pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())}
function key(v){return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"")}
function initials(v){const s=String(v||"?").trim();return s?s.slice(0,2).toUpperCase():"?"}
function iconUrl(icon){const t=String(icon||"").trim();if(!t)return DEFAULT_ICON;if(/^https?:\/\//i.test(t)||t.startsWith("data:"))return t;const m=t.match(/rbxassetid:\/\/(\d+)/i);if(m)return"https://ps99.biggamesapi.io/image/"+encodeURIComponent(m[1]);if(/^\d+$/.test(t))return"https://ps99.biggamesapi.io/image/"+encodeURIComponent(t);return DEFAULT_ICON}
function apiUrl(path,params={}){const u=new URL(LEAGUE_API_BASE+path);u.searchParams.set("league",LEAGUE_NAME);u.searchParams.set("v",Date.now());for(const[k,v]of Object.entries(params))u.searchParams.set(k,String(v));return u.toString()}
async function getJson(url,label){const r=await fetch(url,{cache:"no-store"});const j=await r.json().catch(()=>null);if(!r.ok||!j||j.ok===false)throw new Error((j&&j.message)||"Could not load "+label+". HTTP "+r.status);return j}
function avatarHtml(r){const url=String(r.avatar_url||"").trim();if(url)return'<img class="avatar" src="'+esc(url)+'" alt="" loading="lazy" onerror="this.outerHTML=&quot;<span class=\\&quot;avatar\\&quot;>'+esc(initials(r.display_name))+'</span>&quot;">';return'<span class="avatar">'+esc(initials(r.display_name))+'</span>'}
function leagueObjects(value,out=[]){if(!value||typeof value!=="object")return out;if(Array.isArray(value)){value.forEach(x=>leagueObjects(x,out));return out}const hasName=value.Name!==undefined||value.name!==undefined||value.LeagueName!==undefined;const hasPoints=value.Points!==undefined||value.points!==undefined||value.TotalPoints!==undefined;if(hasName&&hasPoints)out.push(value);Object.values(value).forEach(x=>leagueObjects(x,out));return out}
function lname(r){return String(r.Name??r.name??r.LeagueName??"").trim()}
function lpoints(r){const n=Number(r.Points??r.points??r.TotalPoints??r.Score??0);return Number.isFinite(n)?n:0}
async function fetchRank(){try{const j=await getJson("https://ps99.biggamesapi.io/v1/leagues?v="+Date.now(),"v1 leagues");const leagues=leagueObjects(j).sort((a,b)=>lpoints(b)-lpoints(a));const found=leagues.find(x=>key(lname(x))===key(LEAGUE_NAME));if(!found)return null;const explicit=Number(found.Rank??found.rank??found.Place??found.place??found.Position??found.position);if(Number.isFinite(explicit)&&explicit>0)return explicit;return leagues.indexOf(found)+1}catch(e){console.warn(e);return null}}
function visibleRows(){const q=document.getElementById("search-input").value.trim().toLowerCase();let list=currentRows.slice();if(q)list=list.filter(r=>String(r.display_name||"").toLowerCase().includes(q)||String(r.username||"").toLowerCase().includes(q)||String(r.user_id||"").includes(q));list.sort((a,b)=>{const av=a[sortKey],bv=b[sortKey],an=Number(av),bn=Number(bv);let r;if(Number.isFinite(an)&&Number.isFinite(bn))r=an-bn;else r=String(av||"").localeCompare(String(bv||""));return sortAsc?r:-r});return list}
async function renderCards(data){const rows=data.rows||[];document.getElementById("league-points").textContent=shortNum(data.league_points);document.getElementById("league-points").title=fullNum(data.league_points);document.getElementById("member-count").textContent=rows.length+"/"+(data.member_capacity||"—");document.getElementById("last-db-update").textContent=data.snapshot_at?dt(data.snapshot_at):"—";document.getElementById("page-title").textContent=(data.league_name||LEAGUE_NAME)+" League Tracker";const img=document.getElementById("league-icon");img.src=iconUrl(data.league_icon);img.hidden=false;const rank=await fetchRank();document.getElementById("league-rank").textContent=rank?"#"+rank:"—"}
function renderTable(){const tbody=document.getElementById("members-tbody");const rows=visibleRows();if(!rows.length){tbody.innerHTML='<tr><td colspan="8" class="empty-state">No stored YAMO members found yet.</td></tr>';return}tbody.innerHTML=rows.map(r=>{const name=r.username||r.display_name||r.user_id;const profile="https://www.roblox.com/users/"+encodeURIComponent(r.user_id)+"/profile";return '<tr><td class="rank">#'+esc(r.rank)+'</td><td><a class="player-cell" href="'+profile+'" target="_blank" rel="noopener">'+avatarHtml(r)+'<span><span>'+esc(name)+'</span><div class="player-meta">'+esc(r.user_id)+'</div></span></a></td><td class="numeric" title="'+esc(fullNum(r.total_points))+'">'+esc(shortNum(r.total_points))+'</td><td class="numeric">'+delta(r.gain_5m)+'</td><td class="numeric">'+delta(r.gain_1h)+'</td><td class="numeric">'+delta(r.gain_6h)+'</td><td class="numeric">'+delta(r.gain_12h)+'</td><td class="numeric">'+delta(r.gain_24h)+'</td></tr>'}).join("")}
function renderError(msg){document.getElementById("members-tbody").innerHTML='<tr><td colspan="8" class="error-state">'+esc(msg)+'</td></tr>'}
async function loadData(){if(isLoading)return;isLoading=true;try{const data=await getJson(apiUrl("/api/leagues/current"),"YAMO league data");currentRows=data.rows||[];await renderCards(data);renderTable()}catch(e){console.error(e);renderError(e.message||String(e))}finally{isLoading=false}}
async function exportHistory(){const history=await getJson(apiUrl("/api/leagues/history",{hours:24,limit:5000}),"YAMO 24h history");const blob=new Blob([JSON.stringify({league:LEAGUE_NAME,exportedAt:new Date().toISOString(),history},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="yamo-supabase-history-"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function wire(){document.getElementById("refresh-btn").addEventListener("click",loadData);document.getElementById("search-input").addEventListener("input",renderTable);document.getElementById("export-btn").addEventListener("click",()=>exportHistory().catch(e=>renderError(e.message||String(e))));document.querySelectorAll("th[data-sort]").forEach(th=>th.addEventListener("click",()=>{const k=th.dataset.sort;if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=k==="rank"||k==="display_name"}renderTable()}))}
wire();loadData();setInterval(loadData,AUTO_REFRESH_MS);
</script>
</body>
</html>
