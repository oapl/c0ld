<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>League Player Profile</title>
<style>body{margin:0;background:#0d1117;color:#e6edf3;font-family:Arial,Helvetica,sans-serif}
a{color:#ff9b96;text-decoration:none}
header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 22px 10px}
.logo-wrap{display:flex;justify-content:center;align-items:center;width:100%}
.site-logo{display:block;width:76px;border-radius:10px;margin:0 auto}
.menu{margin-top:9px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.menu a{display:inline-block;padding:7px 12px;border:1px solid #30363d;border-radius:5px;background:#0f141b;color:#e6edf3;font-size:13px}
.menu a.active{border-color:#ff9b96;color:#ff9b96;background:rgba(248,81,73,.12)}
main{max-width:1280px;margin:0 auto;padding:22px 24px 28px}
.hero,.section,.card,.profile-hero{background:#161b22;border:1px solid #30363d;border-radius:10px}
.hero{padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:12px}
.league-main-icon{width:52px;height:52px;border-radius:12px;background:#21262d;object-fit:cover}
.hero h1{margin:0;font-size:26px}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:18px}
.card{padding:16px;text-align:center;min-height:92px;display:flex;flex-direction:column;justify-content:center}
.label{color:#8b949e;font-size:13px}.value{font-size:20px;font-weight:700;margin-top:6px}
.section{overflow:hidden;margin-bottom:18px}.section-header{padding:16px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.section-title{margin:0;font-size:18px}
button{border:1px solid #30363d;border-radius:6px;background:#0f141b;color:#e6edf3;padding:9px 11px;font-size:14px;cursor:pointer}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1000px}th,td{padding:12px 14px;border-bottom:1px solid #30363d;white-space:nowrap;vertical-align:middle}th{color:#8b949e;font-size:13px;font-weight:500;text-align:left;cursor:pointer}.numeric{text-align:right;font-variant-numeric:tabular-nums}.rank{font-weight:700}
.player-cell{display:flex;align-items:center;gap:10px;font-weight:700}.player-link{display:inline-flex;align-items:center;gap:10px;color:#e6edf3}.roblox-link{font-size:12px;color:#ff9b96;margin-left:6px}
.avatar{width:36px;height:36px;border-radius:8px;background:#21262d;color:#c9d1d9;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;object-fit:cover}.meta{color:#8b949e;font-size:12px;margin-top:2px}
.positive{color:#3fb950;font-weight:700}.negative{color:#f85149;font-weight:700}.zero,.unknown{color:#8b949e}.empty,.error{padding:20px}.error{color:#ffb4ad;background:rgba(248,81,73,.12)}tbody tr:hover{background:rgba(255,255,255,.02)}
.profile-hero{padding:18px;margin-bottom:18px;display:flex;gap:18px;align-items:center}.profile-avatar{width:76px;height:76px;border-radius:12px;background:#21262d;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;overflow:hidden}.profile-avatar img{width:100%;height:100%;object-fit:cover}.profile-hero h1{margin:0 0 6px;font-size:30px}.subtitle{color:#8b949e;margin-bottom:6px}.stat-line{display:flex;justify-content:space-between;gap:16px;padding:10px 12px;border-bottom:1px solid #30363d}.stat-line span{color:#8b949e}.chart-controls{display:flex;gap:14px;flex-wrap:wrap;padding:0 0 10px}.chart-wrap{padding:16px}.chart-wrap canvas{width:100%;height:340px;display:block;border:1px solid #30363d;border-radius:8px;background:#0f141b}
@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}}@media(max-width:650px){main{padding:16px}.cards{grid-template-columns:1fr}.profile-hero{align-items:flex-start}}</style>
</head>
<body>
<header><div class="logo-wrap"><a href="index.html"><img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a></div><div class="menu"><a href="index.html">c0ld Leaderboard</a><a href="yamo.html">YAMO League</a><a href="layok.html">LAYOK League</a><a href="top-leagues.html">Top 100 Leagues</a><a href="clans.html">Clans Leaderboard</a><a href="live-clan.html">Clan Lookup</a><a href="servers.html">Servers</a><a href="macros.html">Macros</a></div></header>
<main>
<div id="error" class="error" style="display:block;min-height:0;padding:0;background:transparent"></div>
<section class="profile-hero"><div class="profile-avatar" id="profile-avatar">?</div><div><h1 id="profile-name">Loading...</h1><div class="subtitle" id="profile-subtitle">—</div><a id="roblox-link" href="#" target="_blank" rel="noopener">Open Roblox Profile</a></div></section>
<section class="cards"><div class="card"><div class="label">Snapshots</div><div class="value" id="card-snapshots">—</div></div><div class="card"><div class="label">Latest Rank</div><div class="value" id="card-rank">—</div></div><div class="card"><div class="label">Latest Points</div><div class="value" id="card-points">—</div></div><div class="card"><div class="label">Latest Seen</div><div class="value" id="card-seen">—</div></div></section>
<h2>League History</h2>
<section class="section"><div class="section-header"><div><h2 class="section-title" id="history-title">League Performance</h2><div class="meta" id="date-range">—</div></div></div><div class="chart-wrap"><div class="chart-controls"><label><input id="points-toggle" type="checkbox" checked> Points</label><label><input id="rank-toggle" type="checkbox" checked> Rank</label></div><canvas id="progress-chart"></canvas></div><div id="summary-rows"></div></section>
</main>
<script src="assets/league-profile.js"></script>
<script src="assets/site-announcement.js"></script>
</body>
</html>
