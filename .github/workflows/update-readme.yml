name: Update leaderboard

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
      triggered_at_utc:
        description: "Cloudflare trigger timestamp"
        required: false
        default: ""

concurrency:
  group: update-leaderboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Debug trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "source=${{ github.event.inputs.source }}"
          echo "triggered_at_utc=${{ github.event.inputs.triggered_at_utc }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_number=${{ github.run_number }}"
          date -u

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch, store and broadcast leaderboard
        env:
          CLAN_NAME:            ${{ vars.CLAN_NAME }}
          TOP_N:                ${{ vars.TOP_N }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DISCORD_BOT_TOKEN:    ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:   ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_MESSAGE_IDS:  ${{ secrets.DISCORD_MESSAGE_IDS }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_SOURCE:           ${{ github.event.inputs.source }}
        run: node ingest.js

      - name: Build player profile data
        env:
          CLAN_NAME:            ${{ vars.CLAN_NAME }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/build-player-profiles.js

      - name: Show generated avatar files
        run: |
          echo "Generated avatar files:"
          find assets/avatars -maxdepth 1 -type f | sort | head -50 || true
          echo "Avatar file count:"
          find assets/avatars -maxdepth 1 -type f | wc -l || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md Data/ assets/avatars/

          if git diff --cached --quiet; then
            echo "No README, Data, or avatar changes to commit."
            exit 0
          fi

          git commit -m "Update leaderboard"
          git pull --rebase origin main
          git push origin main
