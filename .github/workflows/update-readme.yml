name: Update leaderboard

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
      triggered_at_utc:
        description: "Cloudflare trigger timestamp"
        required: false
        default: ""

concurrency:
  group: update-leaderboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Debug trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "source=${{ github.event.inputs.source }}"
          echo "triggered_at_utc=${{ github.event.inputs.triggered_at_utc }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_number=${{ github.run_number }}"
          date -u

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch, store and broadcast leaderboard
        env:
          CLAN_NAME: ${{ vars.CLAN_NAME }}
          TOP_N: ${{ vars.TOP_N }}

          CURRENT_BATTLE_NAME: ${{ vars.CURRENT_BATTLE_NAME }}
          CURRENT_BATTLE_DISPLAY_NAME: ${{ vars.CURRENT_BATTLE_DISPLAY_NAME }}
          CURRENT_BATTLE_END_ISO: ${{ vars.CURRENT_BATTLE_END_ISO }}
          CURRENT_NONG_TABLE: ${{ vars.CURRENT_NONG_TABLE }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_MESSAGE_IDS: ${{ secrets.DISCORD_MESSAGE_IDS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          RUN_SOURCE: ${{ github.event.inputs.source }}
        run: node ingest.js

      - name: Ingest clan rank snapshots
        env:
          CLAN_NAME: ${{ vars.CLAN_NAME }}
          CURRENT_BATTLE_NAME: ${{ vars.CURRENT_BATTLE_NAME }}
          CURRENT_BATTLE_HISTORY_TABLE: ${{ vars.CURRENT_BATTLE_HISTORY_TABLE }}
          CLAN_RANK_TOP_N: ${{ vars.CLAN_RANK_TOP_N }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/ingest-clan-ranks.js

      - name: Build player profile data
        env:
          CLAN_NAME: ${{ vars.CLAN_NAME }}
          CURRENT_BATTLE_NAME: ${{ vars.CURRENT_BATTLE_NAME }}
          CURRENT_BATTLE_DISPLAY_NAME: ${{ vars.CURRENT_BATTLE_DISPLAY_NAME }}
          CURRENT_BATTLE_END_ISO: ${{ vars.CURRENT_BATTLE_END_ISO }}
          CURRENT_NONG_TABLE: ${{ vars.CURRENT_NONG_TABLE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/build-player-profiles.js

      - name: Merge manual battle history
        run: node scripts/merge-manual-battles.js

      - name: Build historical NONG leaderboard data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/build-nong-history.js

      - name: Build historical clan leaderboard data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/build-clan-history.js

      - name: Build clan leaderboard data
        env:
          CLAN_NAME: ${{ vars.CLAN_NAME }}
          CURRENT_BATTLE_NAME: ${{ vars.CURRENT_BATTLE_NAME }}
          CURRENT_BATTLE_DISPLAY_NAME: ${{ vars.CURRENT_BATTLE_DISPLAY_NAME }}
          CURRENT_BATTLE_END_ISO: ${{ vars.CURRENT_BATTLE_END_ISO }}
          CURRENT_BATTLE_HISTORY_TABLE: ${{ vars.CURRENT_BATTLE_HISTORY_TABLE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/build-clan-leaderboard.js

      - name: Show generated avatar files
        run: |
          echo "Generated avatar files:"
          find assets/avatars -maxdepth 1 -type f | sort | head -50 || true
          echo "Avatar file count:"
          find assets/avatars -maxdepth 1 -type f | wc -l || true

      - name: Show generated Data files
        run: |
          echo "Generated Data files:"
          find Data -maxdepth 1 -type f | sort || true
          echo ""
          echo "Preview nong-history.json:"
          head -100 Data/nong-history.json || true
          echo ""
          echo "Preview clans-current.json:"
          head -120 Data/clans-current.json || true

      - name: Commit and push if changed
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          GENERATED_PATHS=(
            README.md
            Data/
            assets/avatars/
            index.html
            clans.html
            players.html
            profile.html
            scripts/
            ingest.js
            .github/workflows/update-readme.yml
          )

          git add "${GENERATED_PATHS[@]}"

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Update leaderboard"

          for i in 1 2 3; do
            echo "Push attempt $i..."

            git fetch origin main

            if git merge -X ours --no-edit origin/main; then
              echo "Merge succeeded."
            else
              echo "Merge had conflicts. Resolving generated files in favor of current run..."
              git checkout --ours -- README.md Data assets/avatars index.html clans.html players.html profile.html scripts ingest.js .github/workflows/update-readme.yml || true
              git add README.md Data assets/avatars index.html clans.html players.html profile.html scripts ingest.js .github/workflows/update-readme.yml
              git commit --no-edit || true
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed, retrying..."
            sleep 5
          done

          echo "Failed to push after retries."
          exit 1
