name: Backfill Roblox User IDs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backfill-userids:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Roblox lookup test
        run: node scripts/test-roblox-lookup.js
