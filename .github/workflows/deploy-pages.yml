name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir _site
          cp -v *.html _site/
          cp -R Data assets _site/
          touch _site/.nojekyll

      - name: Add clan switcher script tag
        run: |
          python3 -c "from pathlib import Path; tag='  <script src=\"assets/clan-switcher.js\"></script>\n'; [p.write_text(p.read_text(encoding='utf-8').replace('</body>', tag+'</body>', 1), encoding='utf-8') for p in Path('_site').glob('*.html') if 'assets/clan-switcher.js' not in p.read_text(encoding='utf-8') and '</body>' in p.read_text(encoding='utf-8')]"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
