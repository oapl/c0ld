name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir _site
          cp -v *.html _site/
          cp -R Data assets _site/
          touch _site/.nojekyll

      - name: Generate individual clan pages
        run: node scripts/generate-clan-pages.js _site

      - name: Add shared site scripts
        run: |
          python3 - <<'PY'
          from pathlib import Path

          script_tags = [
              '  <script src="assets/clan-switcher.js"></script>\n',
              '  <script src="assets/site-announcement.js"></script>\n',
              '  <script src="assets/site-enhancements.js"></script>\n',
              '  <script src="assets/site-enhancements-compat.js"></script>\n',
              '  <script src="assets/clan-page-links.js"></script>\n',
              '  <script src="assets/clan-row-final-links.js"></script>\n',
              '  <script src="assets/profile-stat-cleanup.js"></script>\n',
              '  <script src="assets/reward-threshold-chart.js"></script>\n',
          ]

          for path in Path('_site').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              if '</body>' not in text:
                  continue

              inject = ''
              for tag in script_tags:
                  marker = tag.split('src="', 1)[1].split('"', 1)[0]
                  if marker not in text:
                      inject += tag

              if inject:
                  text = text.replace('</body>', inject + '</body>', 1)
                  path.write_text(text, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
