<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>c0ld Leaderboard</title>

  <meta property="og:title" content="c0ld Leaderboard" />
  <meta property="og:description" content="Pet Simulator 99 c0ld clan leaderboard, member stats, clan history, and battle projections." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://oapl.github.io/c0ld/" />
  <meta property="og:image" content="https://oapl.github.io/c0ld/assets/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="c0ld Leaderboard" />
  <meta name="twitter:description" content="Pet Simulator 99 c0ld clan leaderboard, member stats, clan history, and battle projections." />
  <meta name="twitter:image" content="https://oapl.github.io/c0ld/assets/preview.png" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #ff9b96;
      --hover: #1f2630;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .site-logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .site-logo {
      display: block;
      width: 76px;
      height: auto;
      border-radius: 10px;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .menu-bar {
      max-width: 1200px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .menu-btn:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .menu-btn.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(248, 81, 73, 0.12);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px 24px;
    }

    #status {
      display: none;
      margin-bottom: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
      line-height: 1.25;
      word-break: break-word;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel + .panel {
      margin-top: 24px;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input, button, select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 11px;
      font-size: 14px;
      outline: none;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    input {
      min-width: 230px;
    }

    button {
      cursor: pointer;
    }

    button:hover,
    select:hover,
    input:focus {
      border-color: var(--link);
      background: var(--hover);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    th, td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-weight: normal;
      font-size: 13px;
      user-select: none;
      cursor: pointer;
    }

    th:hover {
      color: var(--text);
    }

    tbody tr {
      transition: background 0.12s ease;
    }

    tbody tr:hover {
      background: var(--hover);
    }

    .rank {
      width: 80px;
      font-weight: bold;
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 7px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .player-name {
      font-weight: bold;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .hidden {
      display: none;
    }

    .history-note {
      color: var(--muted);
      font-size: 13px;
      padding: 0 16px 16px;
      line-height: 1.5;
    }

    .history-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 0 16px 16px;
    }

    .history-stat {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 11px 12px;
      min-height: 64px;
    }

    .history-stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .history-stat-value {
      color: var(--text);
      font-size: 18px;
      font-weight: bold;
      line-height: 1.2;
    }

    .error {
      border: 1px solid var(--danger);
      background: var(--danger-bg);
      color: #ffb4ad;
      border-radius: 10px;
      padding: 16px;
      display: block;
      margin-bottom: 18px;
    }

    @media (max-width: 1000px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .history-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 16px 10px;
      }

      main {
        padding: 16px;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      input, select {
        width: 100%;
        min-width: 0;
      }

      .toolbar {
        width: 100%;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .menu-bar {
        justify-content: flex-start;
      }
    }

    @media (max-width: 550px) {
      .history-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <script>
    const AUTO_REFRESH_MS = 60 * 1000;
    const MEMBER_API_CURRENT_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/current";
    const MEMBER_API_BATTLES_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/battles";
    const CLANS_API_CURRENT_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/clans/current";
    const TRACKED_CLAN = getRequestedClanName();
    const TRACKED_CLAN_KEY = normalizeKey(TRACKED_CLAN);
    const TRACKED_CLAN_DISPLAY = formatClanDisplayName(TRACKED_CLAN);
    const DEFAULT_AVATAR_SVG =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
          <rect width="150" height="150" rx="16" fill="#21262d"/>
          <circle cx="75" cy="58" r="26" fill="#6e7681"/>
          <path d="M36 123c8-20 24-32 39-32s31 12 39 32" fill="#6e7681"/>
        </svg>
      `);

    let currentData = null;
    let clanData = null;
    let clansCurrentData = null;
    let currentRows = [];
    let battles = [];
    let c0ldHistoryData = [];
    let playerIndex = [];
    let liveAvatarUrls = new Map();

    let playerIndexByUserId = new Map();
    let playerIndexByProfileKey = new Map();
    let playerIndexByUsername = new Map();

    let activeBattle = "current";

    let sortKey = "rank";
    let sortAsc = true;

    let historySortKey = "update_number";
    let historySortAsc = false;

    let refreshTimer = null;
    let countdownTimer = null;
    let isLoading = false;

    function getRequestedClanName() {
      const raw = new URLSearchParams(window.location.search).get("clan") || "c0ld";
      return String(raw).trim().replace(/[^a-z0-9_-]/gi, "") || "c0ld";
    }

    function formatClanDisplayName(clan) {
      return normalizeKey(clan) === "c0ld" ? "c0ld" : String(clan || "").toUpperCase();
    }

    function isDefaultClan() {
      return TRACKED_CLAN_KEY === "c0ld";
    }

    function withClanQuery(url, params = {}) {
      const out = new URL(url, window.location.href);
      out.searchParams.set("clan", TRACKED_CLAN);

      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          out.searchParams.set(key, String(value));
        }
      }

      return out.toString();
    }

    function pageUrl(path, params = {}) {
      const out = new URL(path, window.location.href);

      if (!isDefaultClan()) {
        out.searchParams.set("clan", TRACKED_CLAN);
      }

      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          out.searchParams.set(key, String(value));
        }
      }

      return `${out.pathname.split("/").pop()}${out.search}${out.hash}`;
    }

    function applyClanChrome() {
      document.title = `${TRACKED_CLAN_DISPLAY} Leaderboard`;

      const logoLink = document.querySelector(".site-logo-link");
      if (logoLink) {
        logoLink.href = pageUrl("index.html");
        logoLink.setAttribute("aria-label", `${TRACKED_CLAN_DISPLAY} home`);
      }

      const logo = document.querySelector(".site-logo");
      if (logo) {
        logo.alt = TRACKED_CLAN_DISPLAY;
      }

      const leaderboardBtn = document.getElementById("tab-btn-leaderboard");
      if (leaderboardBtn) {
        leaderboardBtn.textContent = `${TRACKED_CLAN_DISPLAY} Leaderboard`;
      }

      const wmsyLink = document.getElementById("wmsy-leaderboard-link");
      if (wmsyLink) {
        wmsyLink.classList.toggle("hidden", TRACKED_CLAN_KEY === "wmsy");
      }

      const rankLabel = document.getElementById("tracked-rank-label");
      if (rankLabel) {
        rankLabel.textContent = `${TRACKED_CLAN_DISPLAY} Current Rank`;
      }

      const title = document.getElementById("leaderboard-title");
      if (title) {
        title.textContent = `${TRACKED_CLAN_DISPLAY} Leaderboard`;
      }
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalizeKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function prettifyBattleName(value) {
      return String(value || "")
        .trim()
        .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
        .replace(/(\D)(20\d{2})$/i, "$1 $2")
        .replace(/\s+/g, " ")
        .trim();
    }

    function isLegacyNongBattle(item) {
      const keys = [
        item?.battle,
        item?.battle_key,
        item?.api_battle_key,
        item?.display_name,
        item?.battle_display_name,
        item?.source_table,
        item?.c0ld_results_table,
        item?.clan_results_table
      ].map(normalizeKey);

      const isApiSource = String(item?.source || "").toLowerCase() === "api";
      const isAlwaysLegacy = keys.some(key =>
        key === "safetybattle" ||
        key === "poisonbattle" ||
        key === "poisonturtlebattle" ||
        key === "abstractbattle" ||
        key === "abstractc0ld" ||
        key === "spring2026"
      );
      const isStaticOnlyLegacy = !isApiSource && keys.some(key =>
        key === "angelbattle2026" ||
        key === "angelbattle2026c0ld" ||
        key === "angelbattle2026clans" ||
        key === "starrybattle" ||
        key === "starryc0ld" ||
        key === "starryclans"
      );

      return isAlwaysLegacy || isStaticOnlyLegacy;
    }

    function battleDisplayName(item) {
      const key = battleKeyOf(item);
      const raw = String(item?.display_name || item?.battle_display_name || "").trim();
      const pretty = prettifyBattleName(key);

      if (key && raw && normalizeKey(raw).includes("backrooms") && !normalizeKey(key).includes("backrooms")) {
        return pretty || key;
      }

      return raw || pretty || key;
    }

    function normalizeName(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[^a-z0-9_]/g, "");
    }

    function fmtNum(n) {
      if (n === null || n === undefined || n === "" || Number.isNaN(Number(n))) return "—";
      return Number(n).toLocaleString("en-US");
    }

    function fmtShortNum(n) {
      if (n === null || n === undefined || n === "" || Number.isNaN(Number(n))) return "—";

      const num = Number(n);
      const tiers = [
        { value: 1e12, suffix: "T" },
        { value: 1e9, suffix: "B" },
        { value: 1e6, suffix: "M" },
        { value: 1e3, suffix: "K" }
      ];

      for (const tier of tiers) {
        if (Math.abs(num) >= tier.value) {
          return (num / tier.value).toFixed(2).replace(/\.?0+$/, "") + tier.suffix;
        }
      }

      return String(num);
    }

    function fmtDate(s) {
      if (!s) return "—";
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return "—";

      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function fmtDateTime(s) {
      if (!s) return "—";
      const d = new Date(s);
      if (Number.isNaN(d.getTime())) return "—";

      return d.toLocaleString(undefined, {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function fmtCountdown(ms) {
      if (ms <= 0) return "Ended";

      const totalSeconds = Math.floor(ms / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    function parseDateValue(v) {
      const t = new Date(v).getTime();
      return Number.isNaN(t) ? null : t;
    }

    function toFiniteNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function chooseClanProjectionRate(row) {
      const windows = [
        { key: "gain_1h", basis: "1h", hours: 1 },
        { key: "gain_12h", basis: "12h", hours: 12 },
        { key: "gain_24h", basis: "24h", hours: 24 },
        { key: "gain_5m", basis: "5m", hours: 5 / 60 }
      ];

      for (const window of windows) {
        const gain = toFiniteNumber(row[window.key]);
        if (gain === null) continue;

        return {
          basis: window.basis,
          rate_per_hour: gain / window.hours
        };
      }

      return {
        basis: "none",
        rate_per_hour: 0
      };
    }

    function withClanProjections(data) {
      if (!data || !Array.isArray(data.rows)) return data;

      const battleEndMs = new Date(data.battle_end_iso || "").getTime();
      if (!Number.isFinite(battleEndMs)) return data;

      const remainingHours = Math.max(0, (battleEndMs - Date.now()) / (60 * 60 * 1000));
      const rows = data.rows.map(row => {
        const rate = chooseClanProjectionRate(row);
        const points = toFiniteNumber(row.points ?? row.total_points) || 0;

        return {
          ...row,
          projection_basis: row.projection_basis || rate.basis,
          rate_per_hour: row.rate_per_hour ?? rate.rate_per_hour,
          projected_points: row.projected_points ?? Math.round(points + rate.rate_per_hour * remainingHours)
        };
      });

      const sorted = rows.slice().sort((a, b) => {
        const ap = toFiniteNumber(a.projected_points) ?? toFiniteNumber(a.points) ?? 0;
        const bp = toFiniteNumber(b.projected_points) ?? toFiniteNumber(b.points) ?? 0;
        if (bp !== ap) return bp - ap;

        const ar = toFiniteNumber(a.rank);
        const br = toFiniteNumber(b.rank);
        if (ar !== null && br !== null && ar !== br) return ar - br;

        return String(a.clan_name || "").localeCompare(String(b.clan_name || ""));
      });

      const rankByClan = new Map();
      sorted.forEach((row, index) => {
        rankByClan.set(normalizeKey(row.clan_name), index + 1);
      });

      const rowsWithRanks = rows.map(row => ({
        ...row,
        projected_rank: row.projected_rank ?? rankByClan.get(normalizeKey(row.clan_name)) ?? null
      }));

      const tracked = rowsWithRanks.find(row => normalizeKey(row.clan_name) === TRACKED_CLAN_KEY) || null;

      return {
        ...data,
        rows: rowsWithRanks,
        clan_rank: tracked?.rank ?? data.clan_rank,
        clan_points: tracked?.points ?? data.clan_points,
        projected_rank: tracked?.projected_rank ?? data.projected_rank,
        projected_points: tracked?.projected_points ?? data.projected_points,
        projection_basis: tracked?.projection_basis ?? data.projection_basis
      };
    }

    function rebuildPlayerIndexMaps() {
      playerIndexByUserId = new Map();
      playerIndexByProfileKey = new Map();
      playerIndexByUsername = new Map();

      for (const p of playerIndex || []) {
        const userId = String(p.user_id || "").trim();
        const profileKey = String(p.profile_key || "").trim();
        const usernameKey = normalizeName(p.username);

        if (userId) playerIndexByUserId.set(userId, p);
        if (profileKey) playerIndexByProfileKey.set(profileKey, p);
        if (usernameKey) playerIndexByUsername.set(usernameKey, p);
      }
    }

    async function resolveLiveAvatarUrls(rows) {
      const ids = [...new Set(
        rows
          .map(r => String(r.user_id || "").trim())
          .filter(Boolean)
      )];

      if (!ids.length) {
        liveAvatarUrls = new Map();
        return;
      }

      const chunks = [];
      for (let i = 0; i < ids.length; i += 100) {
        chunks.push(ids.slice(i, i + 100));
      }

      const out = new Map();

      for (const chunk of chunks) {
        const url =
          "https://thumbnails.roblox.com/v1/users/avatar-headshot" +
          `?userIds=${encodeURIComponent(chunk.join(","))}` +
          "&size=150x150&format=Png&isCircular=false";

        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) continue;

          const json = await res.json();
          const data = Array.isArray(json?.data) ? json.data : [];

          for (const item of data) {
            const id = String(item?.targetId || "").trim();
            const imageUrl = String(item?.imageUrl || "").trim();
            const state = String(item?.state || "").trim();

            if (id && imageUrl && state === "Completed") {
              out.set(id, imageUrl);
            }
          }
        } catch {
        }
      }

      liveAvatarUrls = out;
    }

    function getPlacement(b) {
      return b?.placement ?? null;
    }

    function getNumericPlacement(battle) {
      const raw = getPlacement(battle);

      if (raw === null || raw === undefined || raw === "") {
        return null;
      }

      const cleaned = String(raw).replace("#", "").trim();
      const value = Number(cleaned);

      return Number.isFinite(value) ? value : null;
    }

    function fmtPlacement(b) {
      const placement = getPlacement(b);

      if (placement !== null && placement !== undefined && placement !== "") {
        const numeric = getNumericPlacement(b);

        if (numeric !== null) {
          return `#${numeric}`;
        }

        return String(placement);
      }

      const endMs = parseDateValue(b.last_snapshot);
      const nowMs = Date.now();

      if (endMs && endMs > nowMs - 48 * 60 * 60 * 1000) {
        return "TBD";
      }

      return "—";
    }

    function calculateHistoryStats() {
      const totalBattles = battles.length;

      const numericPlacements = battles
        .map(getNumericPlacement)
        .filter(value => value !== null);

      const participated = numericPlacements.length;

      const top10 = numericPlacements.filter(value => value >= 1 && value <= 10).length;
      const top30 = numericPlacements.filter(value => value >= 11 && value <= 30).length;
      const top100 = numericPlacements.filter(value => value >= 31 && value <= 100).length;

      return {
        totalBattles,
        participated,
        top10,
        top30,
        top100
      };
    }

    function renderHistoryStats() {
      if (!document.getElementById("stat-participation")) return;

      const stats = calculateHistoryStats();

      document.getElementById("stat-participation").textContent =
        `${stats.participated}/${stats.totalBattles}`;

      document.getElementById("stat-top-10").textContent =
        stats.top10.toLocaleString("en-US");

      document.getElementById("stat-top-30").textContent =
        stats.top30.toLocaleString("en-US");

      document.getElementById("stat-top-100").textContent =
        stats.top100.toLocaleString("en-US");
    }

    function fmtUpdateLink(battle) {
      const updateNumber = battle.update_number;
      const updateUrl = battle.update_url;

      if (updateNumber === null || updateNumber === undefined || updateNumber === "") {
        return "—";
      }

      const label = `Update #${escapeHtml(updateNumber)}`;

      if (updateUrl) {
        return `<a href="${escapeHtml(updateUrl)}" target="_blank" rel="noopener">${label}</a>`;
      }

      return label;
    }

    function fmtBattleHistoryLink(battle) {
      const label = escapeHtml(battle.display_name || battle.battle || "Unknown");

      if (!battle.c0ld_results_table) {
        return label;
      }

      return `<a href="${escapeHtml(pageUrl("index.html", { battle: battle.battle }))}">${label}</a>`;
    }

    function getCurrentFetchedAt() {
      const rowTimes = currentRows
        .map(r => r.fetched_at)
        .map(parseDateValue)
        .filter(v => v !== null);

      if (!rowTimes.length) return currentData?.generated_at || null;

      return new Date(Math.max(...rowTimes)).toISOString();
    }

    function getAvatarMatch(row) {
      const userId = String(row.user_id || "").trim();
      const profileKey = String(row.profile_key || "").trim();
      const usernameKey = normalizeName(row.username);

      if (userId && playerIndexByUserId.has(userId)) {
        return playerIndexByUserId.get(userId);
      }

      if (profileKey && playerIndexByProfileKey.has(profileKey)) {
        return playerIndexByProfileKey.get(profileKey);
      }

      if (usernameKey && playerIndexByUsername.has(usernameKey)) {
        return playerIndexByUsername.get(usernameKey);
      }

      return null;
    }

    function getAvatar(row) {
      const userId = String(row.user_id || "").trim();

      if (row.avatar_url) return row.avatar_url;
      if (userId && liveAvatarUrls.has(userId)) return liveAvatarUrls.get(userId);

      return DEFAULT_AVATAR_SVG;
    }

    function getProfileKey(row) {
      const userId = String(row.user_id || "").trim();
      const profileKey = String(row.profile_key || "").trim();
      const usernameKey = normalizeName(row.username);

      if (profileKey) return profileKey;

      if (userId && playerIndexByUserId.has(userId)) {
        return playerIndexByUserId.get(userId).profile_key || userId;
      }

      if (usernameKey && playerIndexByUsername.has(usernameKey)) {
        return playerIndexByUsername.get(usernameKey).profile_key || row.username;
      }

      if (userId) return userId;
      return row.username;
    }

    function normalizeCurrentRows(rows) {
      return rows.map(row => {
        return {
          ...row,
          profile_key: row.profile_key || row.user_id || row.username,
          avatar_url: row.avatar_url || null
        };
      });
    }

    function buildAvatarImg(row) {
      const primary = escapeHtml(getAvatar(row));
      const fallback = escapeHtml(DEFAULT_AVATAR_SVG);

      return `<img class="avatar" src="${primary}" alt="" loading="lazy"
        onerror="this.onerror=null;this.src='${fallback}';">`;
    }

    async function buildHistoricalRows(battleName) {
      const battle = (c0ldHistoryData || []).find(
        item => normalizeKey(item.battle) === normalizeKey(battleName)
      );

      if (!battle || !Array.isArray(battle.rows)) {
        return [];
      }

      return battle.rows.map(row => {
        return {
          rank: row.rank,
          stored_rank: row.rank,
          username: row.username,
          user_id: row.user_id,
          profile_key: row.profile_key || row.user_id || row.username,
          avatar_url: row.avatar_url || null,
          total_points: row.total_points,
          gain_5m: row.gain_5m ?? null,
          gain_1h: row.gain_1h ?? null,
          gain_12h: row.gain_12h ?? null,
          gain_24h: row.gain_24h ?? null,
          fetched_at: row.fetched_at || battle.snapshot_at || null
        };
      });
    }

    function getVisibleRows() {
      const q = document.getElementById("search").value.trim().toLowerCase();

      let list = currentRows.slice();

      if (q) {
        list = list.filter(r =>
          String(r.username || "").toLowerCase().includes(q) ||
          String(r.user_id || "").includes(q)
        );
      }

      list.sort((a, b) => {
        const av = a[sortKey];
        const bv = b[sortKey];

        const an = Number(av);
        const bn = Number(bv);

        let result;

        if (!Number.isNaN(an) && !Number.isNaN(bn)) {
          result = an - bn;
        } else {
          result = String(av || "").localeCompare(String(bv || ""));
        }

        return sortAsc ? result : -result;
      });

      return list;
    }

    function getVisibleHistory() {
      const list = battles.slice();

      list.sort((a, b) => {
        let av;
        let bv;

        if (historySortKey === "placement") {
          av = getNumericPlacement(a);
          bv = getNumericPlacement(b);
        } else if (historySortKey === "update_number") {
          av = a.update_number;
          bv = b.update_number;
        } else {
          av = a[historySortKey];
          bv = b[historySortKey];
        }

        const ad = parseDateValue(av);
        const bd = parseDateValue(bv);

        let result;

        if (ad !== null && bd !== null) {
          result = ad - bd;
        } else {
          const an = Number(av);
          const bn = Number(bv);

          if (!Number.isNaN(an) && !Number.isNaN(bn)) {
            result = an - bn;
          } else {
            result = String(av || "").localeCompare(String(bv || ""));
          }
        }

        return historySortAsc ? result : -result;
      });

      return list;
    }

    function sortBattlesForDropdown(list) {
      return list.slice().sort((a, b) => {
        const au = Number(a.update_number);
        const bu = Number(b.update_number);

        if (Number.isFinite(au) && Number.isFinite(bu) && au !== bu) {
          return bu - au;
        }

        if (Number.isFinite(au) && !Number.isFinite(bu)) return -1;
        if (!Number.isFinite(au) && Number.isFinite(bu)) return 1;

        const ad = parseDateValue(a.last_snapshot) || 0;
        const bd = parseDateValue(b.last_snapshot) || 0;

        if (ad !== bd) return bd - ad;

        return String(a.display_name || a.battle || "").localeCompare(
          String(b.display_name || b.battle || "")
        );
      });
    }

    function battleKeyOf(item) {
      return String(item?.battle || item?.battle_key || item?.api_battle_key || "").trim();
    }

    function isApiBattle(item) {
      return String(item?.source || "").toLowerCase() === "api";
    }

    function mergeBattleLists(...lists) {
      const merged = new Map();

      for (const list of lists) {
        for (const item of Array.isArray(list) ? list : []) {
          if (isLegacyNongBattle(item)) continue;

          const key = battleKeyOf(item);
          const normalized = normalizeKey(key);
          if (!normalized) continue;

          const existing = merged.get(normalized);

          if (!existing) {
            merged.set(normalized, {
              ...item,
              battle: key,
              display_name: battleDisplayName(item) || key,
              first_snapshot: item.first_snapshot || item.battle_start_iso || null,
              last_snapshot: item.last_snapshot || item.latest_snapshot_at || item.snapshot_at || null,
              source: isApiBattle(item) ? "api" : "static",
              has_static_rows: Array.isArray(item.rows)
            });
            continue;
          }

          const itemIsApi = isApiBattle(item);
          const existingIsApi = isApiBattle(existing);
          const primary = existingIsApi && !itemIsApi ? existing : item;
          const fallback = primary === item ? existing : item;

          merged.set(normalized, {
            ...fallback,
            ...primary,
            battle: battleKeyOf(primary) || battleKeyOf(fallback) || key,
            display_name: battleDisplayName(primary) || battleDisplayName(fallback) || key,
            first_snapshot: primary.first_snapshot || fallback.first_snapshot || primary.battle_start_iso || fallback.battle_start_iso || null,
            last_snapshot: primary.last_snapshot || fallback.last_snapshot || primary.latest_snapshot_at || primary.snapshot_at || fallback.latest_snapshot_at || fallback.snapshot_at || null,
            source: existingIsApi || itemIsApi ? "api" : "static",
            has_static_rows: existing.has_static_rows || Array.isArray(item.rows)
          });
        }
      }

      return [...merged.values()];
    }

    function getBattleEndIso() {
      return clanData?.battle_end_iso || currentData?.battle_end_iso || null;
    }

    function getCurrentBattleLabel() {
      return battleDisplayName(currentData) || currentData?.battle || "Current Clan Battle";
    }

    function renderCards() {
      const rank = clanData?.clan_rank ?? currentData?.clan_rank ?? null;
      const projectedRank = clanData?.projected_rank ?? currentData?.projected_rank ?? null;
      const countdownLabel = document.getElementById("countdown-label");

      if (countdownLabel) {
        countdownLabel.textContent = `${getCurrentBattleLabel()} Ends in:`;
      }

      document.getElementById("c0ld-rank-value").textContent =
        rank ? `#${rank}` : "—";

      const latest = clanData?.snapshot_at || getCurrentFetchedAt();

      document.getElementById("db-update-value").textContent =
        latest ? fmtDateTime(latest) : "—";

      document.getElementById("projected-rank-value").textContent =
        projectedRank ? `#${projectedRank}` : "—";
    }

    function renderLeaderboard() {
      const tbody = document.getElementById("leaderboard-body");
      const visible = getVisibleRows();

      tbody.innerHTML = "";

      if (!visible.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" style="text-align:center;padding:32px;color:#8b949e;">
              No players found.
            </td>
          </tr>
        `;
        return;
      }

      for (const row of visible) {
        const tr = document.createElement("tr");
        const profileUrl = pageUrl("profile.html", { id: getProfileKey(row) });

        tr.innerHTML = `
          <td class="rank">#${escapeHtml(row.rank ?? "—")}</td>
          <td>
            <a class="player-cell" href="${profileUrl}">
              ${buildAvatarImg(row)}
              <div>
                <div class="player-name">${escapeHtml(row.username ?? "Unknown")}</div>
              </div>
            </a>
          </td>
          <td class="num" title="${fmtNum(row.total_points)}">${fmtShortNum(row.total_points)}</td>
          <td class="num" title="${fmtNum(row.gain_5m)}">${fmtShortNum(row.gain_5m)}</td>
          <td class="num" title="${fmtNum(row.gain_1h)}">${fmtShortNum(row.gain_1h)}</td>
          <td class="num" title="${fmtNum(row.gain_12h)}">${fmtShortNum(row.gain_12h)}</td>
          <td class="num" title="${fmtNum(row.gain_24h)}">${fmtShortNum(row.gain_24h)}</td>
        `;

        tbody.appendChild(tr);
      }
    }

    function renderHistoryTable() {
      const tbody = document.getElementById("history-body");
      if (!tbody) return;

      const visible = getVisibleHistory();

      tbody.innerHTML = "";

      if (!visible.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align:center;padding:32px;color:#8b949e;">
              No clan history found.
            </td>
          </tr>
        `;
        return;
      }

      for (const battle of visible) {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${fmtUpdateLink(battle)}</td>
          <td>${fmtBattleHistoryLink(battle)}</td>
          <td>${escapeHtml(fmtPlacement(battle))}</td>
          <td>${escapeHtml(fmtDate(battle.first_snapshot))}</td>
          <td>${escapeHtml(fmtDate(battle.last_snapshot))}</td>
        `;

        tbody.appendChild(tr);
      }
    }

    function renderBattleOptions() {
      const select = document.getElementById("battle-select");

      const filteredBattles = sortBattlesForDropdown(
        (battles || []).filter(battle => battle && battle.battle)
      );

      const options = [
        { value: "current", label: "Current Clan Battle" },
        ...filteredBattles.map(battle => ({
          value: battle.battle,
          label: battleDisplayName(battle)
        }))
      ];

      const exists = options.some(
        option => normalizeKey(option.value) === normalizeKey(activeBattle)
      );

      if (!exists) {
        activeBattle = "current";
      }

      select.innerHTML = options.map(option => `
        <option value="${escapeHtml(option.value)}" ${
          normalizeKey(option.value) === normalizeKey(activeBattle) ? "selected" : ""
        }>
          ${escapeHtml(option.label)}
        </option>
      `).join("");
    }

    async function renderAll() {
      await resolveLiveAvatarUrls(currentRows);
      renderCards();
      renderBattleOptions();
      renderLeaderboard();
      renderHistoryStats();
      renderHistoryTable();
    }

    function updateView() {
      const leaderboardView = document.getElementById("view-leaderboard");
      const historyView = document.getElementById("view-history");
      const leaderboardBtn = document.getElementById("tab-btn-leaderboard");

      if (window.location.hash) {
        window.history.replaceState(null, "", window.location.pathname + window.location.search);
      }

      leaderboardView.classList.remove("hidden");
      if (historyView) historyView.classList.add("hidden");
      leaderboardBtn.classList.add("active");
    }

    function startCountdown(endValue) {
      const el = document.getElementById("countdown-value");

      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }

      if (!endValue) {
        el.textContent = "—";
        return;
      }

      const end = new Date(endValue);
      if (Number.isNaN(end.getTime())) {
        el.textContent = "—";
        return;
      }

      function tick() {
        el.textContent = fmtCountdown(end.getTime() - Date.now());
      }

      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    async function applyBattleSelection() {
      if (activeBattle === "current") {
        clanData = clansCurrentData || currentData;
        currentRows = normalizeCurrentRows(currentData?.rows || []);
        startCountdown(getBattleEndIso());
        await renderAll();
        return;
      }

      const selected = battles.find(b => normalizeKey(b.battle) === normalizeKey(activeBattle));

      if (!selected) {
        activeBattle = "current";
        clanData = clansCurrentData || currentData;
        currentRows = normalizeCurrentRows(currentData?.rows || []);
        startCountdown(getBattleEndIso());
        await renderAll();
        return;
      }

      const historicalMeta = (c0ldHistoryData || []).find(
        item => normalizeKey(item.battle) === normalizeKey(selected.battle)
      );

      const preferLiveRows = selected.source === "api";
      const historicalRows = preferLiveRows ? [] : await buildHistoricalRows(selected.battle);

      if (historicalRows.length) {
        currentRows = historicalRows;

        clanData = {
          battle: selected.battle,
          display_name: battleDisplayName(selected),
          battle_end_iso: selected.battle_end_iso || null,
          clan_rank: getNumericPlacement(selected),
          projected_rank: null,
          snapshot_at: historicalMeta?.snapshot_at || selected.last_snapshot || null
        };
      } else {
        const liveBattle = await fetchLiveJson(
          withClanQuery(MEMBER_API_CURRENT_URL, { battle: selected.battle }),
          `${TRACKED_CLAN_DISPLAY} ${battleDisplayName(selected)} leaderboard`
        );

        currentRows = normalizeCurrentRows(liveBattle?.rows || []);
        clanData = {
          ...liveBattle,
          snapshot_at: liveBattle?.snapshot_at || selected.last_snapshot || null,
          battle: liveBattle?.battle || selected.battle,
          display_name: battleDisplayName(liveBattle || selected),
          battle_end_iso: liveBattle?.battle_end_iso || selected.battle_end_iso || null,
          projected_rank: null
        };
      }

      startCountdown(null);
      await renderAll();
    }

    async function fetchLiveJson(url, label) {
      const res = await fetch(`${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`, {
        cache: "no-store"
      });

      if (!res.ok) {
        throw new Error(`Could not load ${label}. HTTP ${res.status}`);
      }

      return res.json();
    }

    async function loadData() {
      if (isLoading) return;
      isLoading = true;

      const status = document.getElementById("status");

      try {
        const cacheBust = Date.now();
        const [currentJson, clansJson, liveBattlesJson, staticBattlesRes, playerIndexRes, historyRes] = await Promise.all([
          fetchLiveJson(withClanQuery(MEMBER_API_CURRENT_URL), `live ${TRACKED_CLAN_DISPLAY} leaderboard`),
          fetchLiveJson(CLANS_API_CURRENT_URL, "live clans leaderboard"),
          fetchLiveJson(withClanQuery(MEMBER_API_BATTLES_URL), `live ${TRACKED_CLAN_DISPLAY} battles`).catch(() => ({ rows: [] })),
          fetch(`Data/manual-battles.json?v=${cacheBust}`, { cache: "no-store" }),
          fetch(`Data/player-index.json?v=${cacheBust}`, { cache: "no-store" }),
          fetch(`Data/c0ld-history.json?v=${cacheBust}`, { cache: "no-store" })
        ]);

        currentData = currentJson;
        clansCurrentData = withClanProjections(clansJson);

        if (!currentData || !Array.isArray(currentData.rows)) {
          throw new Error(`Live ${TRACKED_CLAN_DISPLAY} leaderboard does not contain a rows array.`);
        }

        if (clansCurrentData) {
          currentData = {
            ...currentData,
            clan_rank: clansCurrentData.clan_rank ?? currentData.clan_rank,
            clan_points: clansCurrentData.clan_points ?? currentData.clan_points,
            projected_rank: clansCurrentData.projected_rank ?? currentData.projected_rank,
            projected_points: clansCurrentData.projected_points ?? currentData.projected_points,
            projection_basis: clansCurrentData.projection_basis ?? currentData.projection_basis,
            battle_end_iso: currentData.battle_end_iso || clansCurrentData.battle_end_iso,
            clan_rank_source: "clans-current-api",
            clan_rank_snapshot_at: clansCurrentData.snapshot_at || currentData.clan_rank_snapshot_at
          };
        }

        const staticBattles = isDefaultClan() && staticBattlesRes.ok ? await staticBattlesRes.json() : [];
        c0ldHistoryData = isDefaultClan() && historyRes.ok ? await historyRes.json() : [];
        if (!Array.isArray(c0ldHistoryData)) c0ldHistoryData = [];

        battles = mergeBattleLists(liveBattlesJson?.rows || [], staticBattles, c0ldHistoryData);
        playerIndex = playerIndexRes.ok ? await playerIndexRes.json() : [];
        if (!Array.isArray(playerIndex)) playerIndex = [];
        rebuildPlayerIndexMaps();

        if (!activeBattle) {
          activeBattle = "current";
        }

        await applyBattleSelection();

        status.style.display = "none";
        status.className = "";
        status.textContent = "";
      } catch (error) {
        console.error(error);
        status.style.display = "block";
        status.className = "error";
        status.textContent = error.message || String(error);
      } finally {
        isLoading = false;
      }
    }

    function wireEvents() {
      document.getElementById("refresh").addEventListener("click", () => {
        loadData();
      });

      document.getElementById("search").addEventListener("input", () => {
        renderLeaderboard();
      });

      document.getElementById("battle-select").addEventListener("change", async (event) => {
        activeBattle = event.target.value;
        await applyBattleSelection();
      });

      document.getElementById("tab-btn-leaderboard").addEventListener("click", () => {
        window.location.hash = "";
        updateView();
      });

      window.addEventListener("hashchange", updateView);

      document.querySelectorAll("th[data-sort]").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.sort;

          if (sortKey === key) {
            sortAsc = !sortAsc;
          } else {
            sortKey = key;
            sortAsc = key === "username";
          }

          renderLeaderboard();
        });
      });

      document.querySelectorAll("th[data-history-sort]").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.historySort;

          if (historySortKey === key) {
            historySortAsc = !historySortAsc;
          } else {
            historySortKey = key;
            historySortAsc = key === "display_name";
          }

          renderHistoryTable();
        });
      });
    }

    async function init() {
      applyClanChrome();
      wireEvents();
      updateView();

      if (window.location.search) {
        const params = new URLSearchParams(window.location.search);
        const battle = params.get("battle");
        if (battle) {
          activeBattle = battle;
        }
      }

      await loadData();

      if (refreshTimer) {
        clearInterval(refreshTimer);
      }

      refreshTimer = setInterval(() => {
        loadData();
      }, AUTO_REFRESH_MS);
    }

    init();
  </script>
</body>
