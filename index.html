<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NONG Leaderboard</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header {
      padding: 24px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
    }

    .header-inner {
      max-width: 1150px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      line-height: 1.1;
    }

    .subtitle {
      color: #8b949e;
      font-size: 14px;
    }

    nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 14px;
    }

    .nav-pill {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid #30363d;
      border-radius: 999px;
      background: #0d1117;
    }

    main {
      max-width: 1150px;
      margin: 0 auto;
      padding: 24px;
    }

    .status {
      color: #8b949e;
      margin-bottom: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      padding: 16px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
    }

    .label {
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.2;
    }

    .panel {
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input, select, button {
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #0d1117;
      color: #e6edf3;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    input {
      min-width: 240px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      border-color: #58a6ff;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 11px 14px;
      border-bottom: 1px solid #30363d;
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: #8b949e;
      font-weight: normal;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      color: #e6edf3;
    }

    tbody tr:hover {
      background: #1f2630;
    }

    .rank {
      font-weight: bold;
      width: 70px;
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .player-name {
      font-weight: bold;
    }

    .muted {
      color: #8b949e;
      font-size: 13px;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .battle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .battle-card {
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      background: #0d1117;
    }

    .battle-card h3 {
      margin: 0 0 10px;
    }

    .battle-meta {
      color: #8b949e;
      font-size: 13px;
      line-height: 1.6;
    }

    .error {
      border: 1px solid #f85149;
      color: #ffb4ad;
      background: rgba(248, 81, 73, 0.1);
      border-radius: 12px;
      padding: 16px;
    }

    @media (max-width: 650px) {
      h1 {
        font-size: 24px;
      }

      main, header {
        padding: 18px;
      }

      input {
        width: 100%;
        min-width: 0;
      }

      .toolbar {
        width: 100%;
      }

      .nav-pill {
        padding: 7px 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>NONG Leaderboard</h1>
        <div class="subtitle">Pet Simulator 99 · Clan battle dashboard</div>
      </div>

      <nav>
        <a class="nav-pill" href="players.html">Player Profiles</a>
        <a class="nav-pill" href="https://github.com/OpalApocalypse/NONG_Leaderboard" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    <div id="status" class="status">Loading leaderboard data...</div>

    <section class="cards">
      <div class="card">
        <div class="label">Tracked Players</div>
        <div id="stat-players" class="value">—</div>
      </div>

      <div class="card">
        <div class="label">Battles Archived</div>
        <div id="stat-battles" class="value">—</div>
      </div>

      <div class="card">
        <div class="label">Latest Snapshot</div>
        <div id="stat-updated" class="value">—</div>
      </div>

      <div class="card">
        <div class="label">Current Top Player</div>
        <div id="stat-top" class="value">—</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Current Leaderboard</h2>
        <div class="toolbar">
          <input id="search" type="text" placeholder="Search members..." autocomplete="off" />
          <select id="battle-filter">
            <option value="latest">Latest/current data</option>
            <option value="all">All players</option>
          </select>
          <button id="refresh">Refresh</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort="latest_rank">Rank</th>
              <th data-sort="username">Player</th>
              <th data-sort="latest_points" class="num">Latest Points</th>
              <th data-sort="total_battles" class="num">Battles</th>
              <th data-sort="latest_seen">Latest Seen</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Battle Archives</h2>
      </div>
      <div id="battle-grid" class="battle-grid"></div>
    </section>
  </main>

  <script>
    let players = [];
    let battles = [];
    let sortKey = "latest_points";
    let sortAsc = false;

    function fmtNum(n) {
      if (n === null || n === undefined || Number.isNaN(Number(n))) return "N/A";
      return Number(n).toLocaleString("en-US");
    }

    function fmtAbbrev(n) {
      if (n === null || n === undefined || Number.isNaN(Number(n))) return "N/A";

      const num = Number(n);
      const tiers = [
        { value: 1e12, suffix: "T" },
        { value: 1e9, suffix: "B" },
        { value: 1e6, suffix: "M" },
        { value: 1e3, suffix: "K" }
      ];

      for (const tier of tiers) {
        if (Math.abs(num) >= tier.value) {
          return (num / tier.value).toFixed(2).replace(/\.?0+$/, "") + tier.suffix;
        }
      }

      return String(num);
    }

    function fmtDate(s) {
      if (!s) return "N/A";
      return new Date(s).toLocaleString(undefined, {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function getLatestPlayersOnly(list) {
      const latestSeen = list
        .map(p => p.latest_seen)
        .filter(Boolean)
        .sort((a, b) => new Date(b) - new Date(a))[0];

      if (!latestSeen) return list;

      const latestTime = new Date(latestSeen).getTime();

      return list.filter(p => {
        if (!p.latest_seen) return false;
        const t = new Date(p.latest_seen).getTime();
        return Math.abs(latestTime - t) <= 30 * 60 * 1000;
      });
    }

    function getVisiblePlayers() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const mode = document.getElementById("battle-filter").value;

      let list = mode === "latest" ? getLatestPlayersOnly(players) : players.slice();

      if (q) {
        list = list.filter(p =>
          String(p.username || "").toLowerCase().includes(q) ||
          String(p.user_id || "").includes(q)
        );
      }

      list.sort((a, b) => {
        const av = a[sortKey];
        const bv = b[sortKey];

        const an = Number(av);
        const bn = Number(bv);

        let result;

        if (!Number.isNaN(an) && !Number.isNaN(bn)) {
          result = an - bn;
        } else {
          result = String(av || "").localeCompare(String(bv || ""));
        }

        return sortAsc ? result : -result;
      });

      return list;
    }

    function renderStats() {
      const latestPlayers = getLatestPlayersOnly(players);
      const top = latestPlayers
        .slice()
        .sort((a, b) => Number(a.latest_rank || 999999) - Number(b.latest_rank || 999999))[0];

      const latestSeen = players
        .map(p => p.latest_seen)
        .filter(Boolean)
        .sort((a, b) => new Date(b) - new Date(a))[0];

      document.getElementById("stat-players").textContent = fmtNum(players.length);
      document.getElementById("stat-battles").textContent = fmtNum(battles.length);
      document.getElementById("stat-updated").textContent = fmtDate(latestSeen);
      document.getElementById("stat-top").textContent = top ? top.username : "N/A";
    }

    function renderTable() {
      const tbody = document.getElementById("leaderboard-body");
      const visible = getVisiblePlayers();

      tbody.innerHTML = "";

      if (!visible.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align:center;padding:32px;color:#8b949e;">
              No players found.
            </td>
          </tr>`;
        return;
      }

      for (const p of visible) {
        const tr = document.createElement("tr");

        const avatar = p.avatar_url || "assets/embed-spacer.png";
        const profileUrl = `profile.html?id=${encodeURIComponent(p.profile_key)}`;

        tr.innerHTML = `
          <td class="rank">#${p.latest_rank ?? "—"}</td>
          <td>
            <a class="player-cell" href="${profileUrl}">
              <img class="avatar" src="${avatar}" alt="">
              <div>
                <div class="player-name">${escapeHtml(p.username)}</div>
                <div class="muted">${p.user_id ? "ID " + p.user_id : "Username-only"}</div>
              </div>
            </a>
          </td>
          <td class="num" title="${fmtNum(p.latest_points)}">${fmtAbbrev(p.latest_points)}</td>
          <td class="num">${fmtNum(p.total_battles)}</td>
          <td>${fmtDate(p.latest_seen)}</td>
        `;

        tbody.appendChild(tr);
      }
    }

    function renderBattles() {
      const grid = document.getElementById("battle-grid");
      grid.innerHTML = "";

      for (const b of battles) {
        const card = document.createElement("div");
        card.className = "battle-card";

        card.innerHTML = `
          <h3>${escapeHtml(b.display_name || b.battle)}</h3>
          <div class="battle-meta">
            First snapshot: ${fmtDate(b.first_snapshot)}<br>
            Last snapshot: ${fmtDate(b.last_snapshot)}<br>
            Snapshots: ${fmtNum(b.total_snapshots)}<br>
            Rows: ${fmtNum(b.total_rows)}<br>
            Unique players: ${fmtNum(b.unique_players)}
          </div>
        `;

        grid.appendChild(card);
      }
    }

    function wireEvents() {
      document.getElementById("search").addEventListener("input", renderTable);
      document.getElementById("battle-filter").addEventListener("change", renderTable);
      document.getElementById("refresh").addEventListener("click", loadData);

      document.querySelectorAll("th[data-sort]").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.sort;

          if (sortKey === key) {
            sortAsc = !sortAsc;
          } else {
            sortKey = key;
            sortAsc = key === "latest_rank";
          }

          renderTable();
        });
      });
    }

    async function loadData() {
      const status = document.getElementById("status");
      status.textContent = "Loading leaderboard data...";

      try {
        const cacheBust = Date.now();

        const [playersRes, battlesRes] = await Promise.all([
          fetch(`Data/players.json?v=${cacheBust}`),
          fetch(`Data/battles.json?v=${cacheBust}`)
        ]);

        if (!playersRes.ok) {
          throw new Error(`Could not load Data/players.json. HTTP ${playersRes.status}`);
        }

        if (!battlesRes.ok) {
          throw new Error(`Could not load Data/battles.json. HTTP ${battlesRes.status}`);
        }

        players = await playersRes.json();
        battles = await battlesRes.json();

        renderStats();
        renderTable();
        renderBattles();

        status.textContent = `Loaded ${players.length} players from generated Supabase archive data.`;
      } catch (err) {
        console.error(err);
        status.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
      }
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.addEventListener("DOMContentLoaded", () => {
      wireEvents();
      loadData();
    });
  </script>
</body>
</html>
