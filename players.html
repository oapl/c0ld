<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>c0ld Players</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { --bg:#0d1117; --panel:#161b22; --panel-2:#0d1117; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --link:#ff9b96; --hover:#1f2630; --danger:#f85149; --danger-bg:rgba(248,81,73,.12); }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    a { color:var(--link); text-decoration:none; }
    a:hover { text-decoration:none; }
    header { background:var(--panel); border-bottom:1px solid var(--border); padding:12px 22px 10px; }
    .header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; }
    .site-logo-link { display:inline-flex; align-items:center; justify-content:center; line-height:0; }
    .site-logo { display:block; width:76px; height:auto; border-radius:10px; }
    .menu-bar { max-width:1200px; margin:9px auto 0; display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
    .menu-btn { display:inline-block; padding:7px 12px; border:1px solid var(--border); border-radius:5px; background:var(--panel-2); color:var(--text); cursor:pointer; font-size:13px; line-height:1; transition:background .15s ease,border-color .15s ease,color .15s ease,transform .12s ease; }
    .menu-btn:hover { background:var(--hover); border-color:var(--link); transform:translateY(-1px); }
    .menu-btn.active { border-color:var(--link); color:var(--link); background:rgba(248,81,73,.12); }
    main { max-width:1200px; margin:0 auto; padding:22px 24px 24px; }
    .toolbar { margin-bottom:18px; display:grid; grid-template-columns:180px minmax(0,1fr) 220px; gap:12px; align-items:center; }
    input, select { width:100%; border:1px solid var(--border); border-radius:6px; background:var(--panel-2); color:var(--text); padding:11px 12px; font-size:14px; outline:none; transition:background .15s ease,border-color .15s ease; }
    input:focus, select:focus { border-color:var(--link); background:var(--hover); }
    .section { border:1px solid var(--border); border-radius:10px; background:var(--panel); overflow:hidden; margin-bottom:24px; }
    .section-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .section-title { margin:0; font-size:18px; }
    .section-count { color:var(--muted); font-size:13px; }
    .section-note { color:var(--muted); font-size:12px; width:100%; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; padding:16px; }
    .card { display:flex; gap:12px; align-items:center; padding:14px; border:1px solid var(--border); border-radius:10px; background:var(--panel-2); transition:background .15s ease,border-color .15s ease,transform .12s ease; min-height:86px; }
    .card:hover { background:var(--hover); border-color:var(--link); transform:translateY(-1px); }
    .avatar { width:56px; height:56px; border-radius:8px; background:#21262d; object-fit:cover; flex:0 0 auto; }
    .name { font-weight:bold; font-size:16px; margin-bottom:4px; }
    .meta { color:var(--muted); font-size:13px; line-height:1.45; }
    .empty { color:var(--muted); padding:24px; }
    .pager { display:flex; align-items:center; justify-content:center; gap:8px; padding:0 16px 16px; flex-wrap:wrap; }
    .pager.hidden { display:none; }
    .pager button { border:1px solid var(--border); border-radius:5px; background:var(--panel-2); color:var(--text); padding:7px 11px; cursor:pointer; transition:background .15s ease,border-color .15s ease,color .15s ease,transform .12s ease; }
    .pager button:hover:not(:disabled) { background:var(--hover); border-color:var(--link); transform:translateY(-1px); }
    .pager button:disabled { opacity:.45; cursor:not-allowed; }
    .pager button.active { border-color:var(--link); color:var(--link); background:rgba(248,81,73,.12); font-weight:bold; }
    .pager-info { color:var(--muted); font-size:13px; padding:0 6px; }
    .error { border:1px solid var(--danger); background:var(--danger-bg); color:#ffb4ad; border-radius:10px; padding:16px; }
    @media (max-width:700px) { header{padding:14px 16px 10px;} main{padding:16px;} .menu-bar,.pager{justify-content:flex-start;} .toolbar{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>
    <div class="header-inner"><a class="site-logo-link" href="index.html" aria-label="c0ld home"><img class="site-logo" src="assets/c0ld-kitsune-logo.gif" alt="c0ld"></a></div>
    <div class="menu-bar">
      <a class="menu-btn" href="index.html">c0ld Leaderboard</a>
      <a class="menu-btn active" href="players.html">Players</a>
      <a class="menu-btn" href="clans.html">Clans Leaderboard</a>
      <a class="menu-btn" href="live-clan.html">Clan Lookup</a>
      <a class="menu-btn" href="servers.html">Servers</a>
      <a class="menu-btn" href="macros.html">Macros</a>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <select id="clan-select" aria-label="Clan"><option value="c0ld">c0ld Players</option><option value="WMSY">WMSY Players</option></select>
      <input id="search" placeholder="Search players..." autocomplete="off" />
      <select id="sort-by"><option value="rank">Sort by Rank</option><option value="battles">Sort by # of Battles</option><option value="seen">Sort by Latest Seen</option></select>
    </div>
    <section class="section">
      <div class="section-header"><h2 class="section-title">Current Members</h2><div id="current-count" class="section-count">—</div><div id="current-note" class="section-note"></div></div>
      <div id="current-players" class="grid"></div>
    </section>
    <section class="section">
      <div class="section-header"><h2 class="section-title">Previous Members</h2><div id="previous-count" class="section-count">—</div><div id="previous-note" class="section-note"></div></div>
      <div id="previous-players" class="grid"></div>
      <div id="previous-pager" class="pager hidden"><button id="prev-page" type="button">Previous</button><span id="page-buttons"></span><button id="next-page" type="button">Next</button><span id="pager-info" class="pager-info"></span></div>
    </section>
  </main>
  <script>
    const PREVIOUS_PAGE_SIZE = 25;
    const MEMBER_API_CURRENT_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/current";
    const MEMBER_API_BATTLES_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/battles";
    const MEMBER_API_HISTORY_URL = "https://c0ld-clan-api-worker.opal-dde.workers.dev/api/history";
    const CLAN_OPTIONS = ["c0ld", "WMSY"];
    const DEFAULT_AVATAR_SVG = "data:image/svg+xml;utf8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150"><rect width="150" height="150" rx="16" fill="#21262d"/><circle cx="75" cy="58" r="26" fill="#6e7681"/><path d="M36 123c8-20 24-32 39-32s31 12 39 32" fill="#6e7681"/></svg>`);
    let allPlayers = [];
    let currentData = null;
    let currentKeys = new Set();
    let playerIndex = [];
    let activeClan = getRequestedClanName();
    let previousPage = 1;
    let lastPreviousTotalPages = 1;

    function normalizeClanKey(value) { return String(value || "").trim().toLowerCase().replace(/[^a-z0-9]/g, ""); }
    function normalizeBattleKey(value) { return String(value || "").trim().toLowerCase().replace(/[^a-z0-9]/g, ""); }
    function normalizeName(value) { return String(value || "").trim().toLowerCase().replace(/\s+/g, "").replace(/[^a-z0-9_]/g, ""); }
    function getRequestedClanName() { const raw = new URLSearchParams(location.search).get("clan") || "c0ld"; return CLAN_OPTIONS.find(c => normalizeClanKey(c) === normalizeClanKey(raw)) || "c0ld"; }
    function formatClanDisplayName(clan) { return normalizeClanKey(clan) === "c0ld" ? "c0ld" : String(clan || "").toUpperCase(); }
    function isDefaultClan() { return normalizeClanKey(activeClan) === "c0ld"; }
    function escapeHtml(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function fmtNum(n) { if (n === null || n === undefined || n === "" || Number.isNaN(Number(n))) return "N/A"; return Number(n).toLocaleString("en-US"); }
    function fmtDate(value) { if (!value) return "N/A"; const d = new Date(value); if (Number.isNaN(d.getTime())) return "N/A"; return d.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" }); }
    function playerKey(p) { return String(p.user_id || p.profile_key || normalizeName(p.username) || "").toLowerCase(); }
    function withClanQuery(url) { const out = new URL(url, location.href); out.searchParams.set("clan", activeClan); return out.toString(); }
    function pageUrl(path, params = {}) { const out = new URL(path, location.href); if (!isDefaultClan()) out.searchParams.set("clan", activeClan); for (const [k,v] of Object.entries(params)) if (v !== undefined && v !== null && v !== "") out.searchParams.set(k, String(v)); return `${out.pathname.split("/").pop()}${out.search}${out.hash}`; }
    function getProfileLink(player) { return pageUrl("profile.html", { id: player.user_id || player.profile_key || player.username || "" }); }
    function getAvatarUrl(player) { return player.avatar_url || DEFAULT_AVATAR_SVG; }
    function isLegacyNongBattle(item) {
      const keys = [
        item?.battle,
        item?.battle_key,
        item?.api_battle_key,
        item?.display_name,
        item?.battle_display_name,
        item?.source_table,
        item?.c0ld_results_table,
        item?.clan_results_table
      ].map(normalizeBattleKey);

      const isApiSource = String(item?.source || "").toLowerCase() === "api";
      const isAlwaysLegacy = keys.some(key =>
        key === "safetybattle" ||
        key === "poisonbattle" ||
        key === "poisonturtlebattle" ||
        key === "abstractbattle" ||
        key === "abstractc0ld" ||
        key === "spring2026"
      );
      const isStaticOnlyLegacy = !isApiSource && keys.some(key =>
        key === "angelbattle2026" ||
        key === "angelbattle2026c0ld" ||
        key === "angelbattle2026clans" ||
        key === "starrybattle" ||
        key === "starryc0ld" ||
        key === "starryclans"
      );

      return isAlwaysLegacy || isStaticOnlyLegacy;
    }
    function battleIdentity(item) { return String(item?.battle || item?.battle_key || item?.api_battle_key || "").trim(); }
    function playerLookupKeys(row) {
      const keys = [];
      [row?.user_id, row?.profile_key, row?.username, normalizeName(row?.username)].forEach(value => {
        const key = String(value || "").trim().toLowerCase();
        if (key && !keys.includes(key)) keys.push(key);
      });
      return keys;
    }

    function applyClanChrome() {
      const display = formatClanDisplayName(activeClan);
      document.title = `${display} Players`;
      document.querySelector(".site-logo-link").href = pageUrl("index.html");
      document.getElementById("clan-select").value = activeClan;
      document.querySelectorAll(".menu-btn").forEach(link => {
        const href = link.getAttribute("href") || "";
        if (["index.html","players.html","clans.html","live-clan.html","servers.html","macros.html"].includes(href.split("?")[0])) link.href = pageUrl(href.split("?")[0]);
      });
    }

    async function fetchLiveJson(url, label) {
      const res = await fetch(`${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`, { cache:"no-store" });
      if (!res.ok) throw new Error(`Could not load ${label} (HTTP ${res.status})`);
      return res.json();
    }
    async function fetchOptionalJson(path, fallback) {
      try {
        const res = await fetch(`${path}${path.includes("?") ? "&" : "?"}v=${Date.now()}`, { cache:"no-store" });
        if (!res.ok) return fallback;
        return res.json();
      } catch { return fallback; }
    }

    function normalizeCurrentRows(rows) {
      return (rows || []).map(row => ({
        username: row.username || "",
        user_id: row.user_id || null,
        profile_key: row.profile_key || row.user_id || row.username || null,
        latest_rank: row.rank ?? null,
        latest_points: row.total_points ?? row.points ?? null,
        latest_seen: row.fetched_at || currentData?.snapshot_at || currentData?.generated_at || null,
        total_battles: row.total_battles ?? null,
        avatar_url: row.avatar_url || null,
        _source: "live"
      })).filter(row => row.username || row.user_id || row.profile_key);
    }

    function normalizeStaticRows(rows) {
      return (rows || []).map(row => ({
        username: row.username || "",
        user_id: row.user_id || null,
        profile_key: row.profile_key || row.user_id || row.username || null,
        latest_rank: row.latest_rank ?? null,
        latest_points: row.latest_points ?? null,
        latest_seen: row.latest_seen ?? null,
        total_battles: row.total_battles ?? null,
        avatar_url: row.avatar_url || null,
        _source: "static"
      })).filter(row => row.username || row.user_id || row.profile_key);
    }

    function buildCurrentKeys(rows) {
      currentKeys = new Set();
      for (const row of rows || []) {
        [row.user_id, row.profile_key, row.username, normalizeName(row.username)].forEach(value => { if (value) currentKeys.add(String(value).toLowerCase()); });
      }
    }
    function isCurrentPlayer(p) { return [p.user_id, p.profile_key, p.username, normalizeName(p.username)].some(value => value && currentKeys.has(String(value).toLowerCase())); }

    function addBattleCount(countSets, row, battle) {
      const battleKey = normalizeBattleKey(battle);
      if (!battleKey) return;
      for (const key of playerLookupKeys(row)) {
        if (!countSets.has(key)) countSets.set(key, new Set());
        countSets.get(key).add(battleKey);
      }
    }
    function battleCountFor(row, countSets) {
      let count = null;
      for (const key of playerLookupKeys(row)) {
        const size = countSets.get(key)?.size;
        if (Number.isFinite(size)) count = Math.max(count ?? 0, size);
      }
      return count;
    }
    async function loadBattleCountSets(liveRows) {
      const countSets = new Map();
      const currentBattle = battleIdentity(currentData) || "current";

      for (const row of liveRows || []) {
        addBattleCount(countSets, row, currentBattle);
      }

      const battleList = await fetchLiveJson(withClanQuery(`${MEMBER_API_BATTLES_URL}?limit=100`), `${formatClanDisplayName(activeClan)} battle list`).catch(() => ({ rows: [] }));
      const battles = [
        { battle: currentBattle, source: "api" },
        ...(Array.isArray(battleList?.rows) ? battleList.rows : [])
      ];

      const seenBattles = new Set();
      const filteredBattles = battles.filter(battle => {
        if (isLegacyNongBattle(battle)) return false;
        const key = battleIdentity(battle);
        const normalized = normalizeBattleKey(key);
        if (!normalized || seenBattles.has(normalized)) return false;
        seenBattles.add(normalized);
        return true;
      });

      await Promise.all(filteredBattles.map(async battle => {
        const key = battleIdentity(battle);
        const url = withClanQuery(`${MEMBER_API_HISTORY_URL}?battle=${encodeURIComponent(key)}&hours=10000&limit=50000`);
        const history = await fetchLiveJson(url, `${key} member history`).catch(() => ({ rows: [] }));

        for (const row of Array.isArray(history?.rows) ? history.rows : []) {
          addBattleCount(countSets, row, key);
        }
      }));

      return countSets;
    }

    function mergePlayers(staticRows, liveRows, battleCountSets) {
      const map = new Map();
      for (const row of staticRows) map.set(playerKey(row), row);
      for (const live of liveRows) {
        const key = playerKey(live);
        const existing = map.get(key) || {};
        map.set(key, {
          ...existing,
          ...live,
          total_battles: battleCountFor({ ...existing, ...live }, battleCountSets) ?? (isDefaultClan() ? null : existing.total_battles ?? live.total_battles),
          avatar_url: live.avatar_url || existing.avatar_url || null,
          profile_key: live.profile_key || existing.profile_key || null,
          user_id: live.user_id || existing.user_id || null,
          username: live.username || existing.username || "Unknown"
        });
      }
      return [...map.values()].map(row => ({
        ...row,
        total_battles: battleCountFor(row, battleCountSets) ?? (isDefaultClan() ? null : row.total_battles)
      }));
    }

    function compareByRank(a, b) {
      const ar = Number(a.latest_rank), br = Number(b.latest_rank);
      const ah = Number.isFinite(ar), bh = Number.isFinite(br);
      if (ah && bh && ar !== br) return ar - br;
      if (ah && !bh) return -1;
      if (!ah && bh) return 1;
      return compareBySeen(a, b);
    }
    function compareByBattles(a, b) { const diff = Number(b.total_battles || 0) - Number(a.total_battles || 0); return diff || compareByRank(a,b); }
    function compareBySeen(a, b) { const ad = new Date(a.latest_seen || 0).getTime(); const bd = new Date(b.latest_seen || 0).getTime(); if (ad !== bd) return bd - ad; return String(a.username || "").localeCompare(String(b.username || "")); }
    function sortPlayers(list) { const out = list.slice(); const mode = document.getElementById("sort-by").value; out.sort(mode === "battles" ? compareByBattles : mode === "seen" ? compareBySeen : compareByRank); return out; }

    function makeCard(p, groupType) {
      const link = document.createElement("a"); link.href = getProfileLink(p);
      const card = document.createElement("div"); card.className = "card";
      const img = document.createElement("img"); img.className = "avatar"; img.src = getAvatarUrl(p); img.alt = ""; img.loading = "lazy"; img.onerror = function(){ this.onerror=null; this.src=DEFAULT_AVATAR_SVG; };
      const info = document.createElement("div");
      const name = document.createElement("div"); name.className = "name"; name.textContent = p.username || "Unknown";
      const meta = document.createElement("div"); meta.className = "meta";
      meta.innerHTML = groupType === "previous"
        ? `Last Active: ${fmtDate(p.latest_seen)}<br>Battles: ${p.total_battles ?? "N/A"}<br>Latest Rank: ${p.latest_rank ?? "N/A"}`
        : `Latest Rank: ${p.latest_rank ?? "N/A"}<br>Latest Points: ${fmtNum(p.latest_points)}<br>Battles: ${p.total_battles ?? "N/A"}`;
      info.appendChild(name); info.appendChild(meta); card.appendChild(img); card.appendChild(info); link.appendChild(card); return link;
    }
    function renderGroup(el, players, groupType) { el.innerHTML = ""; if (!players.length) { el.innerHTML = `<div class="empty">No players found.</div>`; return; } players.forEach(p => el.appendChild(makeCard(p, groupType))); }
    function getFilteredPlayers() { const q = document.getElementById("search").value.trim().toLowerCase(); let visible = allPlayers.slice(); if (q) visible = visible.filter(p => String(p.username || "").toLowerCase().includes(q) || String(p.user_id || "").includes(q) || String(p.profile_key || "").toLowerCase().includes(q)); return { current: sortPlayers(visible.filter(isCurrentPlayer)), previous: sortPlayers(visible.filter(p => !isCurrentPlayer(p))) }; }

    function buildPageButton(n) { const btn=document.createElement("button"); btn.type="button"; btn.textContent=String(n); if (n===previousPage) btn.className="active"; btn.addEventListener("click",()=>{previousPage=n; render(); scrollPreviousSectionIntoView();}); return btn; }
    function renderPager(previousCount) {
      const pager=document.getElementById("previous-pager"), pageButtons=document.getElementById("page-buttons"), prevBtn=document.getElementById("prev-page"), nextBtn=document.getElementById("next-page"), pagerInfo=document.getElementById("pager-info");
      const totalPages=Math.max(1,Math.ceil(previousCount/PREVIOUS_PAGE_SIZE)); lastPreviousTotalPages=totalPages; if (previousPage>totalPages) previousPage=totalPages;
      if (previousCount<=PREVIOUS_PAGE_SIZE) { pager.classList.add("hidden"); pageButtons.innerHTML=""; pagerInfo.textContent=""; return; }
      pager.classList.remove("hidden"); prevBtn.disabled=previousPage<=1; nextBtn.disabled=previousPage>=totalPages; pageButtons.innerHTML="";
      const pages=new Set([1,totalPages]); for(let i=previousPage-2;i<=previousPage+2;i++) if(i>=1&&i<=totalPages) pages.add(i);
      let last=0; [...pages].sort((a,b)=>a-b).forEach(page=>{ if(last&&page-last>1){ const dots=document.createElement("span"); dots.className="pager-info"; dots.textContent="…"; pageButtons.appendChild(dots);} pageButtons.appendChild(buildPageButton(page)); last=page; });
      const start=(previousPage-1)*PREVIOUS_PAGE_SIZE+1, end=Math.min(previousPage*PREVIOUS_PAGE_SIZE, previousCount); pagerInfo.textContent=`${start}-${end} of ${previousCount}`;
    }
    function scrollPreviousSectionIntoView() { document.getElementById("previous-players")?.scrollIntoView({ behavior:"smooth", block:"start" }); }
    function render() {
      const { current, previous } = getFilteredPlayers();
      const totalPreviousPages = Math.max(1, Math.ceil(previous.length / PREVIOUS_PAGE_SIZE)); if (previousPage > totalPreviousPages) previousPage = totalPreviousPages;
      const start=(previousPage-1)*PREVIOUS_PAGE_SIZE, pageItems=previous.slice(start,start+PREVIOUS_PAGE_SIZE);
      document.getElementById("current-count").textContent = `${current.length} player(s)`;
      document.getElementById("previous-count").textContent = `${previous.length} player(s) · Page ${previousPage} of ${totalPreviousPages}`;
      document.getElementById("previous-note").textContent = isDefaultClan() ? "Historical members are loaded from the full player archive, not just the live pull." : "Historical member archive is only available for clans with saved player history.";
      renderGroup(document.getElementById("current-players"), current, "current"); renderGroup(document.getElementById("previous-players"), pageItems, "previous"); renderPager(previous.length);
    }
    function renderLoading() { ["current-count","previous-count"].forEach(id=>document.getElementById(id).textContent="Loading..."); document.getElementById("current-players").innerHTML=`<div class="empty">Loading players...</div>`; document.getElementById("previous-players").innerHTML=`<div class="empty">Loading players...</div>`; document.getElementById("previous-pager").classList.add("hidden"); }
    function setClanUrl() { const url=new URL(location.href); if (isDefaultClan()) url.searchParams.delete("clan"); else url.searchParams.set("clan", activeClan); history.replaceState(null,"",`${url.pathname}${url.search}${url.hash}`); }

    async function loadPlayers() {
      applyClanChrome(); renderLoading();
      currentData = await fetchLiveJson(withClanQuery(MEMBER_API_CURRENT_URL), `live ${formatClanDisplayName(activeClan)} members`);
      const liveRows = normalizeCurrentRows(currentData.rows || []);
      buildCurrentKeys(liveRows);
      const staticRows = isDefaultClan() ? normalizeStaticRows(await fetchOptionalJson("Data/players.json", [])) : [];
      playerIndex = isDefaultClan() ? await fetchOptionalJson("Data/player-index.json", []) : [];
      const battleCountSets = await loadBattleCountSets(liveRows);
      allPlayers = mergePlayers(staticRows, liveRows, battleCountSets);
      render();
    }
    function wireEvents() {
      document.getElementById("prev-page").addEventListener("click",()=>{ if(previousPage<=1) return; previousPage--; render(); scrollPreviousSectionIntoView(); });
      document.getElementById("next-page").addEventListener("click",()=>{ if(previousPage>=lastPreviousTotalPages) return; previousPage++; render(); scrollPreviousSectionIntoView(); });
      document.getElementById("search").addEventListener("input",()=>{ previousPage=1; render(); });
      document.getElementById("sort-by").addEventListener("change",()=>{ previousPage=1; render(); });
      document.getElementById("clan-select").addEventListener("change",async event=>{ activeClan=event.target.value; previousPage=1; setClanUrl(); try { await loadPlayers(); } catch(err) { console.error(err); document.querySelector("main").innerHTML=`<div class="error">${escapeHtml(err.message)}</div>`; } });
    }
    async function main() { try { wireEvents(); await loadPlayers(); } catch(err) { console.error(err); document.querySelector("main").innerHTML=`<div class="error">${escapeHtml(err.message)}</div>`; } }
    main();
  </script>
</body>
</html>
