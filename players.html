<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NONG Players</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #58a6ff;
      --hover: #1f2630;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .github-btn {
      display: inline-block;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .github-btn:hover {
      background: var(--hover);
      border-color: var(--link);
    }

    .menu-bar {
      max-width: 1200px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .menu-btn:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .menu-btn.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(88, 166, 255, 0.08);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px 24px;
    }

    .toolbar {
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    input:focus {
      border-color: var(--link);
      background: var(--hover);
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .section-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
    }

    .section-count {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
    }

    .card:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      padding: 24px;
    }

    .error {
      border: 1px solid var(--danger);
      background: var(--danger-bg);
      color: #ffb4ad;
      border-radius: 10px;
      padding: 16px;
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 16px 10px;
      }

      main {
        padding: 16px;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      .menu-bar {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="title-wrap">
        <h1>NONG Players</h1>
        <div class="subtitle">Current and previous clan members</div>
      </div>

      <a
        class="github-btn"
        href="https://github.com/OpalApocalypse/NONG_Leaderboard"
        target="_blank"
        rel="noopener"
      >GitHub</a>
    </div>

    <div class="menu-bar">
      <a class="menu-btn" href="index.html">NONG Leaderboard</a>
      <a class="menu-btn" href="clans.html">Clans Leaderboard</a>
      <a class="menu-btn active" href="players.html">Player Profiles</a>
      <a class="menu-btn" href="index.html#history">Clan History</a>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input id="search" placeholder="Search players..." autocomplete="off" />
    </div>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Current Members</h2>
        <div id="current-count" class="section-count">—</div>
      </div>
      <div id="current-players" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Previous Members</h2>
        <div id="previous-count" class="section-count">—</div>
      </div>
      <div id="previous-players" class="grid"></div>
    </section>
  </main>

  <script>
    let allPlayers = [];
    let currentData = null;
    let currentKeys = new Set();

    function fmtNum(n) {
      if (n === null || n === undefined || n === "" || Number.isNaN(Number(n))) return "N/A";
      return Number(n).toLocaleString("en-US");
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getPlayerKey(p) {
      return String(p.user_id || p.profile_key || p.username || "").toLowerCase();
    }

    function buildCurrentKeys() {
      currentKeys = new Set();

      for (const row of currentData?.rows || []) {
        if (row.user_id) currentKeys.add(String(row.user_id).toLowerCase());
        if (row.profile_key) currentKeys.add(String(row.profile_key).toLowerCase());
        if (row.username) currentKeys.add(String(row.username).toLowerCase());
      }
    }

    function isCurrentPlayer(p) {
      return currentKeys.has(String(p.user_id || "").toLowerCase()) ||
             currentKeys.has(String(p.profile_key || "").toLowerCase()) ||
             currentKeys.has(String(p.username || "").toLowerCase());
    }

    function makeCard(p) {
      const link = document.createElement("a");
      link.href = `profile.html?id=${encodeURIComponent(p.profile_key)}`;

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.className = "avatar";
      img.src = p.avatar_url || "assets/embed-spacer.png";
      img.alt = "";

      const info = document.createElement("div");

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = p.username || "Unknown";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML =
        `Latest Rank: ${p.latest_rank ?? "N/A"}<br>` +
        `Latest Points: ${fmtNum(p.latest_points)}<br>` +
        `Battles: ${p.total_battles ?? "N/A"}`;

      info.appendChild(name);
      info.appendChild(meta);

      card.appendChild(img);
      card.appendChild(info);
      link.appendChild(card);

      return link;
    }

    function renderGroup(el, players) {
      el.innerHTML = "";

      if (!players.length) {
        el.innerHTML = `<div class="empty">No players found.</div>`;
        return;
      }

      for (const p of players) {
        el.appendChild(makeCard(p));
      }
    }

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();

      let visible = allPlayers.slice();

      if (q) {
        visible = visible.filter(p =>
          String(p.username || "").toLowerCase().includes(q) ||
          String(p.user_id || "").includes(q)
        );
      }

      const current = visible
        .filter(isCurrentPlayer)
        .sort((a, b) => Number(a.latest_rank || 999999) - Number(b.latest_rank || 999999));

      const previous = visible
        .filter(p => !isCurrentPlayer(p))
        .sort((a, b) => String(a.username || "").localeCompare(String(b.username || "")));

      document.getElementById("current-count").textContent = `${current.length} player(s)`;
      document.getElementById("previous-count").textContent = `${previous.length} player(s)`;

      renderGroup(document.getElementById("current-players"), current);
      renderGroup(document.getElementById("previous-players"), previous);
    }

    async function main() {
      try {
        const cacheBust = Date.now();

        const [playersRes, currentRes] = await Promise.all([
          fetch(`Data/players.json?v=${cacheBust}`),
          fetch(`Data/current.json?v=${cacheBust}`)
        ]);

        if (!playersRes.ok) {
          throw new Error(`Could not load Data/players.json (HTTP ${playersRes.status})`);
        }

        if (!currentRes.ok) {
          throw new Error(`Could not load Data/current.json (HTTP ${currentRes.status})`);
        }

        allPlayers = await playersRes.json();
        currentData = await currentRes.json();

        buildCurrentKeys();
        render();

        document.getElementById("search").addEventListener("input", render);
      } catch (err) {
        console.error(err);
        document.querySelector("main").innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
