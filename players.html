<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NONG Leaderboard - Players</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }

    header {
      padding: 24px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
    }

    h1 {
      margin: 0 0 8px 0;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 16px 0 24px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
    }

    .card:hover {
      border-color: #58a6ff;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
    }

    .meta {
      color: #8b949e;
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.4;
    }

    .toplink {
      margin-top: 8px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <header>
    <h1>NONG Leaderboard Players</h1>
    <div class="toplink">
      <a href="./">Back to leaderboard</a>
    </div>
  </header>

  <main>
    <input id="search" placeholder="Search players..." autocomplete="off" />
    <div id="status">Loading players...</div>
    <div id="players" class="grid"></div>
  </main>

  <script>
    let allPlayers = [];

    function fmtNum(n) {
      if (n === null || n === undefined) return "N/A";
      return Number(n).toLocaleString("en-US");
    }

    function render(players) {
      const container = document.getElementById("players");
      const status = document.getElementById("status");

      container.innerHTML = "";

      if (!players.length) {
        status.textContent = "No players found.";
        return;
      }

      status.textContent = `${players.length} player(s)`;

      for (const p of players) {
        const link = document.createElement("a");
        link.href = `profile.html?id=${encodeURIComponent(p.profile_key)}`;

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.className = "avatar";
        img.src = p.avatar_url || "assets/embed-spacer.png";
        img.alt = "";

        const info = document.createElement("div");

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = p.username;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML =
          `Battles: ${p.total_battles}<br>` +
          `Latest Rank: ${p.latest_rank ?? "N/A"}<br>` +
          `Latest Points: ${fmtNum(p.latest_points)}`;

        info.appendChild(name);
        info.appendChild(meta);

        card.appendChild(img);
        card.appendChild(info);
        link.appendChild(card);
        container.appendChild(link);
      }
    }

    async function main() {
      const res = await fetch("Data/players.json?v=" + Date.now());
      allPlayers = await res.json();

      render(allPlayers);

      document.getElementById("search").addEventListener("input", e => {
        const q = e.target.value.trim().toLowerCase();

        const filtered = allPlayers.filter(p =>
          String(p.username || "").toLowerCase().includes(q) ||
          String(p.user_id || "").includes(q)
        );

        render(filtered);
      });
    }

    main().catch(err => {
      console.error(err);
      document.getElementById("status").textContent = "Failed to load players.";
    });
  </script>
</body>
</html>
