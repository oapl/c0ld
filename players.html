<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NONG Players</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #58a6ff;
      --hover: #1f2630;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 22px 10px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0 0 3px;
      font-size: 27px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .github-btn {
      display: inline-block;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .github-btn:hover {
      background: var(--hover);
      border-color: var(--link);
    }

    .menu-bar {
      max-width: 1200px;
      margin: 9px auto 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu-btn {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .menu-btn:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .menu-btn.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(88, 166, 255, 0.08);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px 24px;
    }

    .toolbar {
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    input:focus {
      border-color: var(--link);
      background: var(--hover);
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .section-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
    }

    .section-count {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
      min-height: 86px;
    }

    .card:hover {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: #21262d;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      padding: 24px;
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px 16px;
      flex-wrap: wrap;
    }

    .pager.hidden {
      display: none;
    }

    .pager button {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel-2);
      color: var(--text);
      padding: 7px 11px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    .pager button:hover:not(:disabled) {
      background: var(--hover);
      border-color: var(--link);
      transform: translateY(-1px);
    }

    .pager button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pager button.active {
      border-color: var(--link);
      color: var(--link);
      background: rgba(88, 166, 255, 0.08);
      font-weight: bold;
    }

    .pager-info {
      color: var(--muted);
      font-size: 13px;
      padding: 0 6px;
    }

    .error {
      border: 1px solid var(--danger);
      background: var(--danger-bg);
      color: #ffb4ad;
      border-radius: 10px;
      padding: 16px;
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 16px 10px;
      }

      main {
        padding: 16px;
      }

      .title-wrap h1 {
        font-size: 24px;
      }

      .menu-bar {
        justify-content: flex-start;
      }

      .pager {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="title-wrap">
        <h1>NONG Players</h1>
        <div class="subtitle">Pet Simulator 99 · Clan battle dashboard</div>
      </div>

      <a
        class="github-btn"
        href="https://github.com/OpalApocalypse/NONG_Leaderboard"
        target="_blank"
        rel="noopener"
      >GitHub</a>
    </div>

    <div class="menu-bar">
      <a class="menu-btn" href="index.html">NONG Leaderboard</a>
      <a class="menu-btn" href="clans.html">Clans Leaderboard</a>
      <a class="menu-btn active" href="players.html">Player Profiles</a>
      <a class="menu-btn" href="index.html#history">Clan History</a>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input id="search" placeholder="Search players..." autocomplete="off" />
    </div>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Current Members</h2>
        <div id="current-count" class="section-count">—</div>
      </div>
      <div id="current-players" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Previous Members</h2>
        <div id="previous-count" class="section-count">—</div>
      </div>

      <div id="previous-players" class="grid"></div>

      <div id="previous-pager" class="pager hidden">
        <button id="prev-page" type="button">Previous</button>
        <span id="page-buttons"></span>
        <button id="next-page" type="button">Next</button>
        <span id="pager-info" class="pager-info"></span>
      </div>
    </section>
  </main>

  <script>
    const PREVIOUS_PAGE_SIZE = 25;
    const DEFAULT_AVATAR_SVG =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
          <rect width="150" height="150" rx="16" fill="#21262d"/>
          <circle cx="75" cy="58" r="26" fill="#6e7681"/>
          <path d="M36 123c8-20 24-32 39-32s31 12 39 32" fill="#6e7681"/>
        </svg>
      `);

    let allPlayers = [];
    let currentData = null;
    let currentKeys = new Set();
    let playerIndex = [];

    let playerIndexByUserId = new Map();
    let playerIndexByProfileKey = new Map();
    let playerIndexByUsername = new Map();

    let previousPage = 1;
    let lastPreviousTotalPages = 1;

    function fmtNum(n) {
      if (n === null || n === undefined || n === "" || Number.isNaN(Number(n))) return "N/A";
      return Number(n).toLocaleString("en-US");
    }

    function fmtDate(value) {
      if (!value) return "N/A";

      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "N/A";

      return d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalizeName(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[^a-z0-9_]/g, "");
    }

    function rebuildPlayerIndexMaps() {
      playerIndexByUserId = new Map();
      playerIndexByProfileKey = new Map();
      playerIndexByUsername = new Map();

      for (const p of playerIndex || []) {
        const userId = String(p.user_id || "").trim();
        const profileKey = String(p.profile_key || "").trim();
        const usernameKey = normalizeName(p.username);

        if (userId) playerIndexByUserId.set(userId, p);
        if (profileKey) playerIndexByProfileKey.set(profileKey, p);
        if (usernameKey) playerIndexByUsername.set(usernameKey, p);
      }
    }

    function getAvatarMatch(player) {
      const userId = String(player.user_id || "").trim();
      const profileKey = String(player.profile_key || "").trim();
      const usernameKey = normalizeName(player.username);

      if (userId && playerIndexByUserId.has(userId)) {
        return playerIndexByUserId.get(userId);
      }

      if (profileKey && playerIndexByProfileKey.has(profileKey)) {
        return playerIndexByProfileKey.get(profileKey);
      }

      if (usernameKey && playerIndexByUsername.has(usernameKey)) {
        return playerIndexByUsername.get(usernameKey);
      }

      return null;
    }

    function getAvatarUrl(player) {
      const match = getAvatarMatch(player);

      if (player.avatar_url) return player.avatar_url;
      if (match?.avatar_url) return match.avatar_url;

      if (player.user_id) return `assets/avatars/${encodeURIComponent(player.user_id)}.png`;
      if (match?.user_id) return `assets/avatars/${encodeURIComponent(match.user_id)}.png`;

      if (player.profile_key) return `assets/avatars/${encodeURIComponent(player.profile_key)}.png`;
      if (match?.profile_key) return `assets/avatars/${encodeURIComponent(match.profile_key)}.png`;

      return DEFAULT_AVATAR_SVG;
    }

    function getProfileLink(player) {
      const match = getAvatarMatch(player);

      if (player.user_id) return `profile.html?id=${encodeURIComponent(player.user_id)}`;
      if (match?.user_id) return `profile.html?id=${encodeURIComponent(match.user_id)}`;
      if (player.profile_key) return `profile.html?id=${encodeURIComponent(player.profile_key)}`;
      if (match?.profile_key) return `profile.html?id=${encodeURIComponent(match.profile_key)}`;
      if (player.username) return `profile.html?id=${encodeURIComponent(player.username)}`;
      return "profile.html";
    }

    function buildCurrentKeys() {
      currentKeys = new Set();

      for (const row of currentData?.rows || []) {
        if (row.user_id) currentKeys.add(String(row.user_id).toLowerCase());
        if (row.profile_key) currentKeys.add(String(row.profile_key).toLowerCase());
        if (row.username) currentKeys.add(String(row.username).toLowerCase());
      }
    }

    function isCurrentPlayer(p) {
      return currentKeys.has(String(p.user_id || "").toLowerCase()) ||
             currentKeys.has(String(p.profile_key || "").toLowerCase()) ||
             currentKeys.has(String(p.username || "").toLowerCase());
    }

    function makeCard(p, groupType) {
      const link = document.createElement("a");
      link.href = getProfileLink(p);

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.className = "avatar";
      img.src = getAvatarUrl(p);
      img.alt = "";
      img.loading = "lazy";
      img.onerror = function () {
        this.onerror = null;
        this.src = DEFAULT_AVATAR_SVG;
      };

      const info = document.createElement("div");

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = p.username || "Unknown";

      const meta = document.createElement("div");
      meta.className = "meta";

      if (groupType === "previous") {
        meta.innerHTML =
          `Last Active: ${fmtDate(p.latest_seen)}<br>` +
          `Battles: ${p.total_battles ?? "N/A"}`;
      } else {
        meta.innerHTML =
          `Latest Rank: ${p.latest_rank ?? "N/A"}<br>` +
          `Latest Points: ${fmtNum(p.latest_points)}<br>` +
          `Battles: ${p.total_battles ?? "N/A"}`;
      }

      info.appendChild(name);
      info.appendChild(meta);

      card.appendChild(img);
      card.appendChild(info);
      link.appendChild(card);

      return link;
    }

    function renderGroup(el, players, groupType) {
      el.innerHTML = "";

      if (!players.length) {
        el.innerHTML = `<div class="empty">No players found.</div>`;
        return;
      }

      for (const p of players) {
        el.appendChild(makeCard(p, groupType));
      }
    }

    function getFilteredPlayers() {
      const q = document.getElementById("search").value.trim().toLowerCase();

      let visible = allPlayers.slice();

      if (q) {
        visible = visible.filter(p =>
          String(p.username || "").toLowerCase().includes(q) ||
          String(p.user_id || "").includes(q)
        );
      }

      const current = visible
        .filter(isCurrentPlayer)
        .sort((a, b) => Number(a.latest_rank || 999999) - Number(b.latest_rank || 999999));

      const previous = visible
        .filter(p => !isCurrentPlayer(p))
        .sort((a, b) => {
          const ad = new Date(a.latest_seen || 0).getTime();
          const bd = new Date(b.latest_seen || 0).getTime();

          if (!Number.isNaN(ad) && !Number.isNaN(bd) && ad !== bd) {
            return bd - ad;
          }

          return String(a.username || "").localeCompare(String(b.username || ""));
        });

      return { current, previous };
    }

    function buildPageButton(pageNumber) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = String(pageNumber);

      if (pageNumber === previousPage) {
        btn.className = "active";
      }

      btn.addEventListener("click", () => {
        previousPage = pageNumber;
        render();
        scrollPreviousSectionIntoView();
      });

      return btn;
    }

    function renderPager(previousCount) {
      const pager = document.getElementById("previous-pager");
      const pageButtons = document.getElementById("page-buttons");
      const prevBtn = document.getElementById("prev-page");
      const nextBtn = document.getElementById("next-page");
      const pagerInfo = document.getElementById("pager-info");

      const totalPages = Math.max(1, Math.ceil(previousCount / PREVIOUS_PAGE_SIZE));
      lastPreviousTotalPages = totalPages;

      if (previousPage > totalPages) {
        previousPage = totalPages;
      }

      if (previousCount <= PREVIOUS_PAGE_SIZE) {
        pager.classList.add("hidden");
        pageButtons.innerHTML = "";
        pagerInfo.textContent = "";
        return;
      }

      pager.classList.remove("hidden");

      prevBtn.disabled = previousPage <= 1;
      nextBtn.disabled = previousPage >= totalPages;

      pageButtons.innerHTML = "";

      const pagesToShow = new Set();
      pagesToShow.add(1);
      pagesToShow.add(totalPages);

      for (let i = previousPage - 2; i <= previousPage + 2; i++) {
        if (i >= 1 && i <= totalPages) {
          pagesToShow.add(i);
        }
      }

      const sortedPages = [...pagesToShow].sort((a, b) => a - b);

      let last = 0;

      for (const page of sortedPages) {
        if (last && page - last > 1) {
          const dots = document.createElement("span");
          dots.className = "pager-info";
          dots.textContent = "…";
          pageButtons.appendChild(dots);
        }

        pageButtons.appendChild(buildPageButton(page));
        last = page;
      }

      const start = (previousPage - 1) * PREVIOUS_PAGE_SIZE + 1;
      const end = Math.min(previousPage * PREVIOUS_PAGE_SIZE, previousCount);

      pagerInfo.textContent = `${start}-${end} of ${previousCount}`;
    }

    function scrollPreviousSectionIntoView() {
      const section = document.getElementById("previous-players");
      if (!section) return;

      section.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function render() {
      const { current, previous } = getFilteredPlayers();

      const totalPreviousPages = Math.max(1, Math.ceil(previous.length / PREVIOUS_PAGE_SIZE));

      if (previousPage > totalPreviousPages) {
        previousPage = totalPreviousPages;
      }

      const previousStart = (previousPage - 1) * PREVIOUS_PAGE_SIZE;
      const previousEnd = previousStart + PREVIOUS_PAGE_SIZE;
      const previousPageItems = previous.slice(previousStart, previousEnd);

      document.getElementById("current-count").textContent = `${current.length} player(s)`;
      document.getElementById("previous-count").textContent =
        `${previous.length} player(s) · Page ${previousPage} of ${totalPreviousPages}`;

      renderGroup(document.getElementById("current-players"), current, "current");
      renderGroup(document.getElementById("previous-players"), previousPageItems, "previous");
      renderPager(previous.length);
    }

    function wirePager() {
      document.getElementById("prev-page").addEventListener("click", () => {
        if (previousPage <= 1) return;

        previousPage--;
        render();
        scrollPreviousSectionIntoView();
      });

      document.getElementById("next-page").addEventListener("click", () => {
        if (previousPage >= lastPreviousTotalPages) return;

        previousPage++;
        render();
        scrollPreviousSectionIntoView();
      });
    }

    async function main() {
      try {
        const cacheBust = Date.now();

        const [playersRes, currentRes, playerIndexRes] = await Promise.all([
          fetch(`Data/players.json?v=${cacheBust}`),
          fetch(`Data/current.json?v=${cacheBust}`),
          fetch(`Data/player-index.json?v=${cacheBust}`)
        ]);

        if (!playersRes.ok) {
          throw new Error(`Could not load Data/players.json (HTTP ${playersRes.status})`);
        }

        if (!currentRes.ok) {
          throw new Error(`Could not load Data/current.json (HTTP ${currentRes.status})`);
        }

        if (!playerIndexRes.ok) {
          throw new Error(`Could not load Data/player-index.json (HTTP ${playerIndexRes.status})`);
        }

        allPlayers = await playersRes.json();
        currentData = await currentRes.json();
        playerIndex = await playerIndexRes.json();

        rebuildPlayerIndexMaps();
        buildCurrentKeys();
        wirePager();
        render();

        document.getElementById("search").addEventListener("input", () => {
          previousPage = 1;
          render();
        });
      } catch (err) {
        console.error(err);
        document.querySelector("main").innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
